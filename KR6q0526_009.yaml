body:
  text: 嗣法門人今辯重編讚釋迦文佛佛身充滿於法界普現一切群生前即今拈香插花者是群生低頭作禮者是群生還見佛身麼咦夜行人只貪明月不覺和衣渡水寒月影橫空遍十方隨波蕩漾浴寒光臨流不覺全身在卻令他人為著忙咦是甚麼古佛不在劫先今佛不在目前白毫光吐秋月圓無雲萬里潭中妍隨筆而畫縱口而讚又安知夫當處常湛然四十九年一場熱鬧唇不蓋齒手長于袖末後拈花掩面而走帶累兒孫將無作有只管向前全不顧後渾身裏許合掌稽首無以為讚臘寒梅瘦無相中生畫不真分明覿面現全身毫光舉目成瞻仰腳下渾忘千輻輪誰為諸佛師而乃開知見日用本寂然電光徒自閃韶陽擅全機一棒全身現全身現霜葉染空山西風濯寒練咦雪山像寥寥劫外絕知音流水高山韻獨深半面嬌嬈君自委多情不欲盡披襟栴檀像忉利摹來第一尊靈山曾記付兒孫老僧不是韶陽子一任千峰聽月猿阿彌陀佛明月隨波注大江波波相接影橫長臨流坐愛清光滿不覺和身入醉鄉除卻四十八願收起母陀羅臂兒孫口向誰開西方何處卓地一任梅花雪裏寒香盡春殘空有鼻觀世音大士悲心一片玉壺寒影落溪流遠近看覿體分明沁毛骨碧霄深夜撼闌干大士之心如流水遇曲逢直無迴止只今溪雲海月間時時示人人不委隨其所重靡不週去其所畏如措地我亦曾承大士恩口不能言心如醉願與拈香擇火人盡未來身同頂禮大士無相如鏡中像大士無聲如空谷響物遯聲銷大道指掌無眼而見色不能倣無耳而聞非聲外賞處聲色中絕聲色想舉念不為是超情理而往逸樂與憂患折旋兼俯仰冥冥漠漠間夜半日輪朗大士不捨我我自成欺枉普告敬禮者斷然入儔儻眼聲耳色言思路絕大士於中布廣長舌善聽如聾善說如啞打失布袋呼牛作馬我唯心知讚不可盡一味頂禮堅固深信書與不退合掌瞻視視所視者宛然無二無二分別攀仰弗及面門突出大地歷歷咦臘月梅花燄寒夜光如雪千手千眼從何處起一時俱到在水鏡裏或慈或威亦悲亦喜如日中影無有終始覓之弗得非聲色比言思斷處似則絕似遂以為然是則未是惟古與今人莫能擬然而凡聖愚哲均樂利焉以為可恃智絕真空體應群物物豈他物有感斯通空非頑空無遠弗屆來無所從去無所至苦樂如夢覺迷一致祇此深慈弗休弗憩是故稽首觀音大士眾生悲極感自現不踰眾生悲感中自悲自感還自現大士無心水月同月印千江江影透大悲三昧所成就大士如鏡照一切心大士如月清光普臨萬象歷歷隨感而寂慈能攝慢悲以化執機器靡定同歸靜正但辦肯心何疑於聖我昔早年將悟未悟稽首皈誠曾獲冥護夢裏投機如箭鋒拄賓主出入有語無語越三十年宛爾昨日凡一念至鐵與磁石願汝小子但堅信此通身是佛不似一物隨物現形作不請客示彼群生應念而得在形色中非聲非色超聲色外不離動寂千手目兮赴眾感之無端返聞聞兮會萬機以冥一合掌低頭應自知莫待當來問彌勒落筆已遭人貶剝何如文彩未彰時婆心不覺全身露笑殺深山老古錐佛之一字永不喜聞矧百千億盎粹氤氳麗大慈日布正覺雲寂感一致悲智攸分循聲而應普視人群瞻彼瑞容稽首慇懃願汝英哲發自心忻合掌讚嘆無第二人道以無心得相以有心現無心割截平有心莊嚴展無心無罪福福罪有心見割截與莊嚴有無心轉變一人成兩心兩人圓一念積精遂密藏至誠忻佛面大士無緣慈照臨同時遍各以佛子根真實通方便大士像為葉俗士所施比丘今球疑別紙截去上幅懼而裱之藏笥中比丘今帾請供乞讚焚香作其上萬卉千叢待化工微雲細霧澹和風是誰不在空濛裏祇有枝頭春獨濃一泓水樹橫秋色半枕松風歸鶴聲箇裏未能忘宿習因人幻出百千情仰吾師之深慈兮置十二類生於懷中隨所求而各給兮知根欲之無窮天與人之不可頓易兮聊止啼以黃葉妄無體而必終兮爾乃需之情竭望東方之既白兮猶濛濛其復晦同乎迷若相濡兮誰獨當機感之會入大冶而不自知兮感天澤之一勺時忽遘而頓醒兮悔從前之昧略顧吾身之獨遭兮幾旦暮而失之覺而後知其將告兮歎虛白之靡移匪覃恩之浪浪兮孰執手而同歸底乾慧以極果兮誓始終而相師釋及門之洗心兮禮頂踵而陳詞一念能觀萬類心耳中雲樹眼中音靈光在處堪瞻仰五體爐前非古今容光豈問山高下遺影誰論水淺深不識塞鴻秋月意且隨光影散煩襟大士靈通多在忍土以無緣慈哀五濁苦感應道交如子得母水中月影非去非到空谷響聲前後之步我以心眼觀大士處幾喪目前而啞然住能非所觀所非能覷絕待而歔有語無語以示禪者如箭鋒拄俯仰折旋無容顧佇信口而呼縱目所注神光儼然不可思慮大悲觀音為物作矩共此未來皈命頂禮普賢大士心本無生示現生示現之中無有我無我我所虛心境誑惑世間與同事一切世間悉如幻識取如幻真實現差別無非根本智根本差別無有二文殊為唱普賢和二妙圓成如來住何人以此微妙筆繪出普賢無相身騎象直向華屋中一毛頭上帝珠重布袋和尚大地一布袋誰當司其橐展口收不得舉足徒躑躅雙眼笑不休滿腹安不著寒潭無底春風有腳青霄絕點雲觸斷驪龍角莫莫未離兜率已在人間祇為尋人不肯住山閱盡天下惟有一笑寬著肚皮一文亦要逢人便道是真彌勒而我以為不似一物奉勸孟八郎李四張三難覆藏十八羅漢偶讀蘇子瞻文至十八羅漢讚失笑曰大智人面前有三尺暗洵非虛語取而別之第一尊者結跏正坐蠻奴側立有鬼使者稽顙於前侍者取其書而獻之咨爾四人拜跪坐立知與不知各有其失千載之下令我笑殺棒之不能請代以筆第二尊者合掌趺坐蠻奴捧櫝於前老人發之中有琉璃器貯舍利十數伊何以見合掌而嘿蠻奴捧之老人發之宛如琉璃中有一物若曰舍利莫販賣佛第三尊者扶烏木養和正坐下有白沐猴獻果侍者執盤受之彼扶木者未嘗不是嗟爾白猴亦能爾爾執盤而受意不在果所得已多顛倒則箇第四尊者側坐屈三指荅胡人之問下有蠻奴捧函童子戲捕龜者尊者以手胡人以口蠻奴捧函童子戲捕萬世如見貧兒驟富獨我野人不覺笑倒第五尊者臨淵濤抱膝而坐神女出水中蠻奴受其書臨彼深淵不可錯足抱膝何為如虫禦木神女躍出蠻奴受書非此則彼如之何如第六尊者右手支頤左手撫稚獅子顧視侍者摘瓜而剖之右手支頤左手撫獅顧視侍者其色怡怡但令人見不許人知罪歸家主何以謝之第七尊者臨水側坐有龍出焉吐珠其手中胡人持短錫杖蠻奴捧缽而立奪頷下珠不無尊者何似驪龍有而能捨笑殺旁觀胡漢兒一杖挑翻須彌山一缽啗乾滄溟水咦我也放不得爾第八尊者並坐而立加肘其上侍者汲水過前有神人涌出於地捧盤獻寶尊者善說侍者善聽惟有神人倒行正令何以復之如驢覷井第九尊者食已拓缽持數珠誦咒而坐下有童子搆火具茶又有埋筒注水蓮池中者食已拓缽宴然坐地口誦手持誰堪聽視唯二童子擇火注水不可道著拈鼻失嘴第十尊者執經正坐有仙人侍女焚香於前正坐者誰匪示匪默告汝仙人焚香即得大地山河叢林草木無有少法與爾為物是故尊者執經而一第十一尊者趺坐焚香侍者拱手胡人捧函而立趺不是坐焚不是香侍者胡人眼短鼻長六十二見應難避秋雨松風聲瑯瑯第十二尊者正坐入定枯木中其神騰出于上有大蟒出其下尊者正坐如木亦爾神出其上蟒出其下畢竟何似似不似秋風起吹折門前一株松夜半背手摸枕子第十三尊者倚杖垂足側坐侍者捧函而立有虎過前有童子怖慝而竊窺之倚杖垂足不可方比俊哉大虫卻會斯旨童子何為故曰是汝第十四尊者持鈴杵正坐誦咒侍者整衣于右胡人橫短錫跪坐於左有虯一角若仰訴者持鈴誦咒鳥飛兔走侍者整衣胡人跪坐若人不會有虯一角所仰而訴言之鑿鑿第十五尊者鬚眉皆白袖手趺坐胡人拜伏于前蠻奴手持拄杖侍者合掌而立頭白齒黃老不知止引得胡蠻如狂欲死彼田舍翁逢人笑底東村孟八曾有言恭敬不如無禮第十六尊者橫如意趺坐下有童子發香篆侍者注水花盤中如意不如香篆不香鏡花水月能令人狂深夜鳥歌獨坐欄杆依稀似曲別調宮商第十七尊者臨水側坐仰觀飛鶴其一下集侍者以手拊之有童子提竹籃取果實投水中飛鳥在天下集其一侍者拊之探手而得童子提籃戲投果實為之奈何是物非物試問尊者不可語塞第十八尊者植拂支頤瞪目而坐下有二童子破石榴以獻植拂支頤瞪目而坐俯視二童幾失其我匪馬而牛可以知過所以智者鼾然而臥南院顒和尚一條楖栗活如龍水盡山窮特地通法乳千年流不竭無師真智古今同本師空隱和尚黃巖見底即今見底無以為真孰云其似達磨何曾離西天六祖不往黃梅寺想起舊時非冤家總由你面前一片香貴圖你愧死且道是知恩兒且道是忘恩子正要與天下人擬議明鏡當臺兮曜神光乎夜堂西飆栗冽兮蘸秋水之杲陽望儼慈氏兮近之而不可狎蕩蕩乎博嶠之遺風兮當其機而知石頭路滑悲晚近之羊質兮尚虎皮之燦燦侈炎日之峻步兮寧深雲之泛泛念石住之微言兮余小子猶虔虔坐以待旦自讚像得者箇還像得那箇麼且道者箇與那箇相去多少咦畢竟眼居眉下依然鼻搭上唇汝形短小汝量急狹汝眼深闊汝情疏達汝志孤而遠汝心不可測有時雷轟電忽有時青天白日問汝汝不知人亦無能物唯有齊雲頑石頭終日與渠相對默呵呵呵破衲蒙頭一道翁推移與世無拘執繪亦得不繪亦得天下萬世誰人識畫得似恐不是畫不似現成底叨叨兩月暇圍中大類春禽啼早起切忌明眼人祇怕認得你無處可遮攔百花生碓嘴千山剩人可和尚一滴曹源向北湍順流容易逆流難神龍破浪無尋處留得威獰紙上寒偈示獨露禪人一聲塗毒鼓遠近聞皆死誰知死人堆活人出身處木馬嘶如雷泥牛耕海底若問麻三斤為道祇者是示喜維那病中撒手臥長空渠東汝亦東霜天明月落無語度秋風題繡芙蓉石榴芙蓉如面石榴裙錦帨金針特地真若作目前境物會拈花辜負昔時人中秋玩月寄熊魚山內閣齊雲山中遍界圓明纔一半那邊消息許誰親大家舉起雲門餅須憶齊雲山裏人別熊魚山呈偈擘破微塵出箇人虛空逼塞莫為鄰分明內外渾無物萬兩黃金難買貧刻訶林語錄謝諸檀越文彩纔彰音信通多君端的辨來風須知熊耳山頭事不在楞伽四卷中四十九年一字無如何野老卻叨叨垂鉤千尺深潭意極目清波憶巨鰲示巖侍者生佛俱無無亦無無中有路絕糊塗欲教那畔相應去夜半日輪光較殊示翁子鄭居士會得日用事無別何妨嫁女又婚男請看直下團圜處莫被無生兩字瞞治生產業不相違湖海江山直捷時盡道長安風物盛不知身已在皇畿示無二禪人將心炤心心成境特地知非離是非首既斷故無斷者出頭疲鱉似烏雞示守德禪人大德從何來回頭須一顧灼然是箇人無勞更遮互秋至暑自消山深寒先到遷流任歲時一老一不老示明雪禪人參高峰落枕子因緣垂絲千尺深潭意三寸離鉤道罕傳不達拈花權上事枉隨死句識中懸情矜真鑑迷將去悟入玄機喪目前大法自來非瑣瑣分明有語不能詮示巖侍者有齒焚身千古誡自來賊不打貧兒從教大地春光滿竹屋老僧猶未知示程雪池居士六月雪花飛滿池蘸人肌骨透羅帷金鱗未遇江湖闊好趁秋風理釣絲示梁同菴居士天地萬物本同根銀波雪浪月無痕頂門放出摩醯眼一顆明珠落玉盤別復禮法師真妄偈覺妄示有真有真妄即起了得真本無妄亦一時止全體是妄情全體是真理大道絕悟迷迷悟有終始智者識好惡動念入生死示臺設禪人一箇鐵崑崙要入全無路忽然身是鐵有口難分訴咦直教哮吼動林泉始信從來瞌睡虎示非巖禪人不用一文錢買得箇𨍏轢用則隨地鑽不用放離腳雖非世罕奇有時用得著咦一日擲向人天前始知秦時曾撲落示萬賴禪人此道從來不可傳何勞向我覓言詮漚和有句如無句截斷波流機自玄示哲喬禪人病中一靈真性竟奚之撒手長空自在時祇者來兮須記取與麼去也莫遲疑波翻陽燄伊誰力影落空花獨我知古佛有言不借借相應珍重兩莖眉示體盡禪人妙明體盡是何時不許儂渠獨自知但看枝頭黃葉脫海天春色到羅帷警夜萬緣既去慎莫追尋此心不休輪迴何已大德咬釘截鐵安忍其中久久點頭方知冷煖初夜繫念觀空等諸散亂況甘懈怠錯過好時大德十方坐斷一念萬年瞥爾知非全身裏許中夜坐候鐘聲孤迥迥地後念不續當處圓明大德從生至死舍此別無更勿異緣外生枝節後夜示月千上座昨日今朝事不同莫將花柳寫春容分明撲倒倩扶起一棒當前消息通示臺設禪人晨起荷鋤出摳衣帶月歸一間茅蓋屋半傍石巖棲紫竹連成壁梅花蹋作泥鳥聲終日噪山色入簾窺復云會麼若問南泉路趙州東院西示通復禪人一處通來處處通森羅萬象有無中更須直進竿頭步北斗南看望不窮題鏡示諸禪面目分明不是他光輝常滿隱朝霞當臺影落無人處夜半流鶯到碧紗見頭狂走實堪憐盡日東西影裏旋珍重顏容須自惜莫教零落在人前示旋菴監寺分明覿面本來人不用澄凝湛寂身安住且觀時節到一翻提起一翻新示鐵花禪人耀耀光明纔一半那邊消息許誰知莫教蹋步向前去鐵樹花開應有時示光半禪人寂炤光明剛一半烏啼月落夜如何碧潭深夜無人處努力翻身宜捷過示幻生李居士與世推移寄此身隨流認得幻中人不妨擊楫同波浪一曲蘆江別調春警眾但有一毫頭便是一毫頭若欲了生死于今須自由饒汝拔山力難將意自收情與理所羈如麵中著油明明知不可猶尚費持籌豈況迷頭去逝逝無迴流汝意不可信汝心不可偷曠劫如長夜誰能代汝憂汝但劃然斷應時而展眸無有當情者生死安能留智者勿需待幻妄多夷猶自瞞匪他瞞展轉何日休此予熟計之特為諸人謀切用惺惺著努力莫悠悠示平物何居士須知物物本來平輕重由渠但有名名義未形當著眼森羅萬象箇中呈示見一侍者一見桃花更不疑數枝紅綻自相宜招攜直入千峰裏溪月山雲似舊時示足兩書記足子乞我四句偈特地為將一句酬誰信江南三月裏鷓鴣啼暮萬峰頭示塵外禪人塵外識得萬事皆畢無畢不畢著靴水立山頂撐船海底火發㘞地一聲始知天下古今善知識之舌乞米偈忍饑修道世間稀但願知音莫掩扉或者忽逢甘贄老滿船帶得月明歸示無方監寺欲知萬法皆如夢須悟能生萬法人根塵不到非光影鐵樹花開朵朵新妙靜主呈船子頌卻示滄茫巨浸浪滔滔只怕無風又著篙多少弄潮人在岸等閒餘韻落波濤示止言知客不是者箇道理不是者箇道理不是者箇道理偈云瞥爾情非昔無心路更賒暗明冥合處特地見周遮海底泥牛吼山頭石女嗟不因秋漸暮方睹東籬花若能圓會得與汝共龍華示高煦發居士西風初起白雲少東院新涼黃葉多影裏仙人君自委莫成孤負妙伽陀示撲非薪道者古者撲落薪便知非他物而今日用中何故黑如漆黑如漆萬古徽猷是今日咦是什麼示何見性居士有為有漏天真事無悟無迷盡性功記得廬山三峽石一杯招隱醉春風咦多少人作境話會題宗譜一部五燈會元何曾說著宗門無端留下姓名忙煞今日兒孫還有不忙底麼仞禪試道看乞米食飯須知來處布施須看受處一施一受分明成佛作祖公據贈陸太守孝山鐫佛還他陸大夫南泉真箇赤鬚鬍含冰滿口不言水蕩漾寒潮知有無寄示海幢監院解虎一心內外絕纖塵更欲從人問主賓千里寄聲無別語秋風江上浪如銀寄壽劉持平撫軍中丞福祿總難量法眼光垂越大方更祝高提心地印靈山付囑與天長示住力地居士得地而住甚深忍象王行處力堪誇為君指註其中意雲淨天空見月華示法遠禪人舉起竹篦子眨眼成千里馬足不曾停攔街瞌睡底讀華嚴三賢十聖空中跡行布圓融鏡裏痕動念總歸魔界攝觀心聊與異生論涅槃本際隨生死般若行深失寂喧法海只今同夢幻休將相似入玄門信滿已窮生滅事十方諸佛現全身離波覓海深何極即色觀空際絕倫世間出世乘須歷功到無功覺豈真心相無初情盡見重重華藏目前人祇是一區無影地種蘭栽艾總隨人敷華結實非他力蟠蔭盤株豈有因已達法源心似海未窮真際惑如塵樓閣見聞都不就百城煙水自疏親佛法偈佛法從來沒短長極難靜裏不商量明明說破依前是到底還他石敢當心法雖空習未乾難言習氣不相干一回過了一回在夢裏泥犁骨亦寒此事難欺老作家可憐龍質盡成蛇多年諦審俱生事一剎那中萬劫賒示諸子助參萬里長空不是空更無南北與西東頂門有眼黑如日煮鐵山成失鄧通五湖四海絕疏親一統山河萬國春口是禍門須縝密莫教錯認捉刀人別七佛偈毗婆尸佛留心早直至于今未悄然祇為當時曾有偈皆空何似受生前身心幻出已無性善惡誰為起造人捉敗佛陀生陷獄將知升墜有來因心無不應因境有境有何言心本無身心起滅誰家事堪笑慈尊不丈夫見即是身了即心無勞更向佛邊尋性空何用言如幻鞭起泥牛入海深佛不見身即是佛有知轉見佛成魔從來大智無忻怖省事高眠不較多性淨即是身心淨幻化寧當淨性生祇為婆心銷夢事同行終日不知名本言法法不曾法無法原因法立名法既本無無豈有葛藤從此斷還生讀首山念室中示僧偈手持足蹋寧虧汝五十三參更有誰只是心頭猶未瞥樓前彈指不移時直下何勞更問人貪他言句喪其真目前根境多生累撥轉頭來莫厭貧讀曹山寂旨訣偶作先聖轉他歸背後面前有路不須行正中妙葉天真事莫向儂渠判濁清休誇尊貴誕功成血脈全歸異類行龍袖拂開天路闊象王回顧出常情無身無事落頑空有事無身較異同隔縠音容情未瞥十年形影夢還通夢軒書壁四首勤修焉可更蹉跎百歲光陰七十過盡道阿僧祇劫遠剎那安住竟如何勇如大敵已當前白刃交馳馬不旋一箭定知穿石虎莫教回首哭蒼天念念不移日正中日輪孤照九霄空莫嫌覿面無回互相續當誰辨異同知生應盡直教盡理事圓融識未乾般若無私虛偽滅倚天長劍薄雲寒銘棲賢舍利塔銘佛性甚光明能破一切暗佛性甚堅利能斷一切物流被于百骸結成五色珠表此堅光體法化無有二念我遺教者睹珠如佛在一粒細如粟供養福無異況聚千萬珠瞻仰發夙慧極果攝微因感應通心臂佛是已成佛我是未成佛果即在因中當念無終始我以此一心供養諸如來獲睹佛真身朝暮常頂禮金輪觸神光三十年于此今復聞棲賢古塔示瑰異將建窣堵坡作銘寄千里佛身不可讚我讚非言句願佛鑑我心與佛身無極遂我今日願心光澤營衛有理必有事本舉末自至廣及諸未來學佛到佛地海幢舍利塔銘佛在眾生中如日處霾翳霾翳非可久日光徹空際佛身如虛空佛心如光霽光極與空入空光交相蔽結成幻摩尼五色非堅脆我識如來心隨順示真諦假名為舍利金石不能甈現在與當來百福之所逮群動匪無心遇境生幽滯寂感總隨緣形神不相儷佛以主攝賓金剛見精慧我汝但迴光彈指消陰瞪如日之在天百物無疵癘此以論性功豈為形骸勵我昔在金輪蒙光滌夙瞖棲賢發神異今復流法系慧日照嶺南丹霞若先契次第及海幢貽爾大厥裔隆隆薄青霄百道金光麗萬世福人天皇風永勿替丹霞舍利塔銘心光徹內外如珠入五色珠與色無性非離亦非即非即超形骸非離浹營衛月在千波中波波搖清霽凡聖唯一心湛昏成二諦示生死涅槃而實無堅脆脆以別生死堅光表性義本從心生色迷色迺有二蚌含明月珠體合百骸粹領納鏡中像想即妙觀智流注皆真常分別非明記如是五蘊身與法身何異祇因一念迷情生分穢淨淨穢悟由心當念絕邪正佛以此智證法化無同別示現別中同同中別自晰光耀百千年福被我遺教神光觸金輪仰瞻如夢覺棲賢發瑰異感激當其運移光照嶺南慈曜無遠近佛子學聚沙燔土紫金斕崔巍海螺巔晶晶逼霄漢舉目道與會布髮形俱泮見聞起遐情究此未來際念念盡圓明身與心毋戾鳴尺銘一聲霹靂攀仰弗及打破髑髏驚起彌勒禪板銘有則定有祇是不覺一棒打翻秦時𨍏轢室左壁銘可以終隱哀我後人可以終默誰迪先民毋尚孤潔任他愛嗔四眾之式不淄不磷深心堅忍盡未來身右壁銘內無繫念外無長物一瓶一缽一杖一笠要行便行要住便住無愧古人無欺後嗣慎乃典型永垂來祀為妙峰禪人銘衣七十老翁之衲寒時寒殺熱時熱殺今屬妙峰且作麼生打發咦石頭路滑竹篦銘雷峰舉起竹篦有緣當下知歸背觸盡情說與不打自招何疑咦是什麼水雲團研銘爾本無名託乎雲水雲盡水窮惟一堅粹夫嘗遇之顧鑑之外解空閣新製研銘混沌以前無黑白未剖人文先誕石海嶽成形天梵來聖愚凡哲多奇蹟陸亙一片坐臥常鐫得不得非所擇深山大小空嶙峋千年路滑猶荒僻解空老人補南天攫取端巖不盈尺欲蘸毫端染太虛一畫大千青碧碧鍾王懷褚戰龍蛇如蟲禦木何狼藉珍重雲中似虎形香水磨礱生羽翮研銘惟一密堅德之清玄隱文彩於既彰而無傳禪床銘聖人無己誰當寶凡萬象體玄圓鑑自爾緣感普周而恆處此慎汝後昆勿立規矩笠銘林下不須愁烈日巖隈豈畏雨淋漓分明頭面從遮蓋蹋磴穿雲那箇知拄杖銘年既邁而弗衰兮壯力由伊予亦因高下以相諧兮豈旦暮之能離著地兮荊披撐空兮雲隨直趨兮不顧運足兮自知追前烈兮啟後武兮將舍是焉其誰我憑汝力汝得我立汝我兮同心不可轉兮匪石絕夷險以進止兮遵先賢之遺軼行終古而勿替兮挈斯人以躋乎峻極禪床銘無夢無想亦無主羞見鐵花生碓嘴老牯牛無名字一口嚼爛金剛圈倒在泥塗裏夜半被虱咬背手摹著枕子切忌從頭起禪几銘千聖覓不得如是而穩坐我亦從中證萬靈同一墮
