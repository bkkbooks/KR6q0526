body:
  text: 嗣法門人今辨重編舉古舉世尊初生一手指天一手指地周行七步目顧四方曰天上天下唯吾獨尊雲門云我當時若見一棒打殺與狗子食貴圖天下太平師曰世尊扶頭雲門把尾看來兩尊宿都為他人著忙殊不知總不曾動著毫髮要且古往今來受瞞不少噫祇今還有不受人瞞者麼舉二祖問達磨諸佛法印可得聞乎磨曰諸佛法印不從人得祖曰我心未寧乞師安心磨曰將心來與汝安祖曰覓心了不可得磨曰與汝安心竟師曰既云諸佛法印不從人得又云將心來與汝安達磨大師恰如將一千斤擔子放二祖肩上御來刖去雙足教他疾行相似雖然用盡伎倆且道有甚麼交涉舉鳥窠和尚因侍者會通一日欲辭乃問汝今日何往者曰某甲為法出家和尚不垂慈誨今往諸方參佛法去窠曰若是佛法吾此間亦有少許者云如何是和尚此間佛法鳥窠於身上拈起布毛吹之侍者因此大悟師曰此在鳥窠分上即得若是侍者恁麼悟去三十年未夢見在舉忠國師三喚侍者侍者三應國師云將謂吾辜負汝誰知汝辜負吾師曰國師辜負侍者駟不及舌侍者辜負國師罔極難酬大衆要會但莫向喚侍者處侍者應諾處作商量許爾具衲僧少分舉歸宗鏟草次有僧來參忽有一蛇過宗以鉏斷之僧云久響歸宗原來是箇粗行沙門宗曰爾粗我粗僧曰如何是粗宗豎起鉏頭僧曰如何是細宗作斬蛇勢僧曰與麼則依而行之宗曰爾甚麼處見我斬蛇僧無對師曰歸宗斬蛇疑殺天下人祇今還識老漢面目麼驀舉拂子云歸宗鼻孔一時穿卻了也若也會得不曾增得諸人分毫只是坐斷山僧舌頭去縱饒不會亦不曾減得諸人分毫只是一向任山僧口說手擎無人捉敗放下拂子喝一喝舉魯祖尋常見僧來便面壁南泉聞云我尋常向師僧道佛未出世時會取尚不得一箇半箇他恁麼驢年去師曰魯祖面壁已是葛藤南泉播揚他人長短是何心行明眼人總好一場笑具舉鄧州丹霞天然禪師過慧林遇天大寒取木佛燒火向院主呵曰何得燒我木佛霞以拄杖撥灰曰吾燒取舍利主曰木佛何有舍利霞曰既無舍利更取兩尊燒主自後眉鬚墮落師曰人見燒木佛便以為過量見鬚眉墮落便以為猶有者箇所以如此若恁麼要見丹霞院主面目驢年去大衆且待者些子見解盡時爾自瞥地在舉趙州示衆云泥佛不度水木佛不度火金佛不度爐真佛內裏坐師曰泥佛不度水木佛不度火金佛不度爐作麼生是真佛內裏坐還會麼不會山僧今日再與說過舉僧遊五臺問一婆子曰臺山路向甚麼處去婆曰驀直去僧便去婆曰好箇阿師又恁麼去後有僧舉似趙州州曰待我勘過來明日州便去問臺山向甚麼處去婆曰驀直去州便行婆曰好箇阿師又恁麼去州歸院謂僧曰臺山婆子為汝勘破了也師曰試道婆子畢竟有過沒過且作麼生是趙州勘破處雖然如此我又早知爾了也舉趙州一日在東司上見遠侍者過驀召文遠遠應諾州曰東司上不可與汝說佛法師曰既召文遠為甚又道東司上不可與汝說佛法且道畢竟有說沒說舉大愚辭歸宗宗問甚處去愚云諸方學五味禪去宗云諸方有五味禪我者裏祇有一味愚云如何是和尚一味禪宗驀口便打忽然大悟云嗄我會也宗云道道愚擬開口宗又打趁出師曰兩度喫棒若作一味禪會又向歸宗虀甕裏淹殺不干歸宗事舉僧問大隨劫火洞然大千俱壞未審者箇壞不壞隨曰壞僧云恁麼則隨他去也隨云隨他去師曰者僧若是伶俐漢一聞言下便合拗折拄杖放下腰包向者裏住山去猶較些子雖然如是蚤遲八刻舉靈雲和尚因長生問混沌未分時如何雲曰露柱懷胎生云分後如何雲曰如片雲點太清生云未審太清還受點也無雲不對生云恁麼則含生不來也雲亦不對生云直得純清絶點時如何雲曰猶是真常流注生云如何是真常流注雲曰似鏡常明生云未審向上還有事也無曰有生云如何是向上事雲曰打破鏡來與汝相見師曰靈雲兩不對試問大衆即今還構得也無縱饒構得且喜沒交涉又如打破鏡來與相見且道打破鏡是甚麼時節大衆即今相見還是打破鏡不打破鏡假使有人出云早與汝相見了也且喜沒交涉會麼舉嚴陽尊者初參趙州問一物不將來時如何州曰放下著陽曰既是一物不將來放下箇甚麼州曰放不下擔取去嚴陽於言下大悟師曰嚴陽大似誤用假銀被人攔腮一摑尚不知非更嘵嘵辨成色高下趙州雖則提持正令也只作死馬醫殊令旁觀者哂咦啼得血流無用處不如緘口過殘春舉仰山問僧近離甚處僧云向南仰拈起拄杖云彼中還說者箇麼僧云不說仰云不說者箇還說那箇麼僧云不說仰召大德參堂去僧便去仰復召大德僧應諾仰云近前來僧近前仰便打師曰仰山首尾俱全祇是不遇知音山僧若是者僧待伊云近前來便近前與一掌云者瞎漢猶作恁麼去就不惟自己有出身之路亦乃省得他人氣力仰山得此如飲甘露舉王常侍敬初見睦州一日州問曰今日何故入院遲初曰看打毬來州曰人打毬馬打毬初曰人打毬州曰人困麼初曰困州曰馬困麼初曰困州曰露柱困麼初惘然歸至私第中夜忽然有省明日見州曰某甲會得昨日事也州曰露柱困麼初曰困州遂許之師曰眼觀東南意在西北睦州老婆心切若無王常侍道箇困字不幾弄巧成拙乎且什麼處是王常侍道困處大衆慎勿向開口處會平常處會絶消息處會亦勿向無會處會此皆風力所轉終成敗壞舉臨濟大師應機多用喝會下參徒亦學喝濟曰汝等總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲者裏分得賓主也無爾若分不得已後不得學老僧喝師曰且道兩人齊喝汝從什麼處分賓主汝若分得龜毛長三尺汝若分不得亦龜毛長三尺汝若總不與麼又是平地上喫跌作麼生喝一喝云賓主歷然舉大覺參臨濟大師濟舉起拂子覺敷坐具濟擲下拂子覺收坐具參堂去僧衆曰此僧莫是和尚親故不禮拜又不喫棒師聞令喚覺覺至濟曰大衆道汝不禮拜又不喫棒莫是長老親故覺珍重下去師曰臨濟大覺畢竟相見在甚麼處及聞僧衆話卻喚覺來舉似一遭且道還有意旨也無假如當時僧衆無者話臨濟還合更有話也無具眼者試辨看舉興化存獎和尚僧問四方八面來時如何化云打中間底僧作禮興化曰我昨日赴箇村齊中途遇一陳卒風暴雨卻向古廟裏避得過師曰打中間話大似春水漲溪忽然怒決奔注如駛祇是興化不合更道後段惹得後人依樣畫葫蘆恰如自把髻投衙一般更有種杜撰底云正是打中間底樣子或云爾還認得興化麼且喜沒交涉雖然如是畢竟如何良久云山僧從來不解妄語到此只合鈍置舉興化和尚見同參來才上法堂化便喝僧亦喝化又喝僧亦喝化近前拈棒僧又喝化曰爾看者瞎漢猶作主在僧擬議化直打下法堂侍者請問適來那僧有甚觸忤和尚化曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到者裏卻去不得似者般瞎漢不打便待何時者禮拜師曰者僧既有權有實有照有用為甚興化將手向伊面前橫兩橫便去不得大衆須知此事大有差別不得草草于今要會但看那裏是興化橫兩橫處汝若在者裏識得破已後不受天下人瞞雖然如是還識興化納敗闕麼舉洛浦元安禪師遊歷罷直往夾山按山頂上卓菴經年夾山知乃修書令僧馳往浦接得便坐卻再展手索僧無對浦便打云歸去舉似和尚僧回舉似夾山山云者僧看書三日內必來若不看書斯人救不得夾山卻令人伺其出菴便與燒其居果三日後出菴來人謂菴中火起浦亦不顧直到夾山見夾山不禮拜乃當面叉手而立山云雞栖鳳窠非其同類出去浦曰自遠趨風請師一接山云目前無闍黎此間無老僧浦便喝山云住住且莫草草匆匆雲月是同溪山各別截斷天下人舌頭即不無爭教無舌人解語浦佇思山便打師曰洛浦一喝有甚麼過處卻來被夾山幾句胡言漢語即便納敗且道利害在那裏所以山僧常道不是師家瞞汝祇要汝灼然不受師家瞞去方才了得不然莫道無事好舉雪峰常謂玄沙曰有箇濟南長老問無有答不得者一日到雪峰峰令訪玄沙沙問曰古人道此事唯我能知長老作麼生際曰須知有不求知者沙曰山頭老漢喫許多辛苦作麼師曰恁麼看將起來蚤是玄沙喫許多辛苦若山僧當時待際南到來但與相見縱然無語肺肝如燭且道在甚麼處具眼舉蜆子和尚居無定所自印心於洞山混俗閩川常日沿江岸採蝦蜆充腹暮即臥東山白馬廟紙錢中居民目為蜆子和尚華嚴靜和尚聞之欲決真僞先潛入紙錢中深夜蜆子歸靜扭住問曰如何是祖師西來意遽答曰神前酒臺盤師曰蜆子和尚似則似矣終是做賊人心虛當時若被扭住即與拓開云作麼作麼已後更無一人能奈蜆子何華嚴便與麼放過也打失一隻眼在舉僧問乾峰十方薄伽梵一路涅槃門未審路頭在甚麼處峰以拄杖畫一畫云在者裏僧請益雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盤傾會麼會麼師曰乾峰有口道不出雲門道得卻無口須是兩箇縛作一束拋向東洋大海卻來山僧與爾說箇譬喻且道譬喻箇甚麼參舉南院問風穴南方一棒作麼生商量穴云作奇特商量穴卻問南院此間作麼生商量院拈拄杖橫按云棒下無生忍臨機不見師師曰恁麼相為可為徹頭徹腦披肝瀝膽所以風穴一生氣宇如王到此處真如春雨雪消解衣適體南院古佛粉身碎骨未足為報舉和山示衆云習學謂之聞絶學謂之鄰過此二者是謂真過僧問如何是真過山曰解打鼓如何是真諦山曰解打鼓即心是佛即不問如何是非心非佛山曰解打鼓向上人來如何接山曰解打鼓師曰和山到者田地絶不容易雖然須知恩大難酬何以故若不恁麼和山爭奈若也恁麼爭奈和山咦過得栗棘蓬是好手舉石霜慈明和尚冬日傍僧堂作此其下注云若人識得不離四威儀中師曰大衆會麼汝若會去猶較山僧一線道在汝若不會橫亙法界逼塞虛空諸人且向什麼處蹲坐良久云可惜許舉楊岐會和尚示衆云雪雪處處光輝明皎潔黃河凍鎖絶纖流赫日光中須迸裂那吒頂上喫蒺藜金剛腳下流鮮血又示衆云踏著稱鎚硬似鐵啞子得夢向誰說須彌頂上浪滔天大洋海底遭火熱師曰大衆饒爾與麼會得也是楊岐底不干諸人事又如即今山僧與麼舉似也是山僧底不干諸人事何不向諸人本分上道將一句來看速道速道良久云縱饒道得也祇得一半舉鹽官榜云一切衆生皆有佛性又溈山榜云一切衆生皆無佛性師云在鹽官太狼藉在溈山老婆禪即不無若論提唱宗門三生六十劫未夢見在舉僧問洞山如何是佛山答云麻三斤師云不許向舉起處承當不許作不思議會不許作隨處皆是會令大衆下語畢代云洎合忘卻又云多少時來也又云瞎舉六祖大師初到法性寺見兩僧諍論風幡一曰風動一曰幡動往復不已祖云不是風動不是幡動仁者心動師云風幡且置什麼處是心動處令衆下語畢師代云幾乎愧殺兩僧又云六祖大師聻又云十萬八千又云鉢盂安柄舉陳提刑參五祖演演云提刑曾讀小艷詩有云頻呼小玉元無事祇要檀郎認得聲提刑諾諾遂出時圓悟為侍者卻問云提刑會得和尚意麼演云他祇認得聲耳悟云只要檀郎認得聲既認得為什麼未在演云庭前柏樹子聻悟懡㦬後出見雞飛上欄杆鼓翼而啼乃自喜曰此豈不是聲入通所悟演遂肯之師云且道諾諾與庭前柏樹子是有差別是無差別若無差別為甚麼卻悟若有差別差別在什麼處令衆下語畢師代云不是一回射石虎幾乎誤殺李將軍又云伸手原在縮手裏又云將謂鬍鬚赤更有赤鬚鬍問答頌二十問答并頌有序威音以前虛空烜赫威音以後皂白分明無門之門建立誠非得已以楔出楔掃除卻有來由原佛祖之心祇為一事詳表遮之法屏絶岐途奪食驅耕情窮乃見懸崖撒手絶後方蘇金剛圈栗棘縫過得始稱好手如來禪祖師意悟來總是瞞人若果一回汗出不妨瓊樓玉殿現於一莖尚需有日活來未信影草探竿遂為剩語殘羹餿飯不中飽人陷虎拏龍尤欺智者問一切衆生從甚麼處迷起答云從悟處迷起頌曰一切衆生本來悟及知其悟又相違殺淫盜妄文殊智啼笑悲歡白牯機緣起見聞非一二情窮生死絶離微箇中若也無回顧撒手懸崖今古輝問諸佛為什麼出世答云老婆心切頌曰傅粉塗脂出畫堂為郎珍重卻羞郎落花有意徒勞爾流水無情祇自傷打草驚蛇張醜拙懸羊賣狗倍郎當何如閉口深藏舌免使明明落鑊湯問世尊四十九年說法利生一切恆沙菩薩聲聞羅漢畢竟證得什麼邊事答云將此身心奉塵剎是則名為報佛恩頌曰帝網重重復道森循環無盡絶追尋主賓互換現前用權實兼隆將護心親子不妨同客作當人何用覓威音山僧不敢輕於汝直捷行持無古今問三乘十二分既是權說為什麼不打頭便拈花直示費許多絡索作麼答云祇為汝不肯承當頌曰拈花蚤已傷苗稼豈況區區又說權匪謂就機披垢弊懸知大事信因緣止兒黃葉先慚我遮面紅羅祇為仙百萬人天深解此聊將金色作流傳問既有能度之人所度之衆則生佛判然凡聖自爾且道分別在什麼處答云即在汝分別處頌曰分別才生事宛然是非同異阿誰懸棚頭傀儡從君弄帳裏高低任我牽佛道垂成迂十劫泥犁建立等三禪相逢各辦緣何事祇為同眠覺被穿問設無凡聖為什麼神通窒礙宛爾不同此樂彼苦兩不相代答云又是從頭起頌曰神通窒礙孰安名最苦難忘凡聖情一念瞥興諸法具萬機休罷此身輕莫緣相想隨生滅但任浮漚泥濁清自是同床人各夢等閒容易獲心寧問凡聖若無因果應絶為什麼地獄天堂絲絲不爽答云既無凡聖喚甚麼作天堂地獄來頌曰若是有因須有果苟無凡聖亦奚妨虛空不與他釘橛大地還同何有鄉好鳥啼殘春夢足百花開盡夏天長牛頭馬面無人識穩跨銀鞍氣獨揚問古人云為善善無形為惡惡無相若能直下識透便會諸法無生乃因緣聚會業果宛然道理解脫無靈身心分別有實正恁麼時作何排遣答云何不向身心分別處排遣頌曰是誰泊泊浮漚裏何物藝藝萬象森切忌壞他諸法相寧須重覓涅槃心為貪解脫難憑理識得因緣豈諱今茅舍竹床安穩臥暫時岐路莫沈吟問巖頭云欲得易會但於聲色前不被萬境惑亂自然露裸裸自然無事然則聲色前不被惑亂之時是有主宰是沒主宰若有主宰便成兩箇若無主宰又憑什麼不被惑亂聻雖古人亦有云生死中無佛則無生死今四民浩浩業識茫茫可謂生死中無佛矣而生死宛然若但云四民浩浩亦有什麼諱處便銷繳了殊不知生死到來腳跟線斷終未免乘將去此時還措得手腳麼答云與我將聲色來看頌曰剎剎塵塵是什麼何勞於此更磋磨目前非境但由我當處無人祇任他生死之中最妙道去來有法卻成魔菩提煩惱皆名義爭管人非與鬼呵問真淨云事事無礙如意自在手把豬頭口誦淨戒趁出淫坊未還酒債此過量人事大非凡境然不審過量人當此亦還知是豬頭還知有淨戒否不知則必先枯心稿智令如木石相似始有少分相應然又與我宗直捷之旨相戾如知則明明淨穢兩塗拍盲不可與所謂硬作主宰因果撥無者有何差別耶答云知也祇是者箇道理不知也祇是者箇道理且道是什麼道理速道速道頌曰不是詩人莫獻詩更無劫外與今時張帆把纜非能手掩耳偷鈴謊阿誰大道必妨於小智反常方得號神奇一真凡聖猶存見好解灰囊示稚兒問學道祇為了生死悟性之人一期壽終畢竟向甚麼處去若謂向沒生滅處去既沒生滅又有甚麼處去若有處去便有趨向取舍若無趨向取捨則四生六道也少不得才出頭來果能一線穿過便沒甚麼事如或未然畢竟依前迷悶如歷代諸祖也有先生曾為善知識猶且一二十年行腳方才省得安知無因緣不湊一生兩生空過者所謂直下了得又了箇什麼不猶然話餅不可充饑歟答云且要了爾者一問來頌曰自是世間多忌諱波興平地浪滔滔四生六道迷中盡萬別千差悟後勞智者不如愚者得遣愁爭似莫愁高從來惟有安心法立雪齊腰千古豪問玄沙云真如凡聖地獄天堂只是療狂子之方虛空尚無改變大道豈有升沈悟則縱橫不離本際所以透關底人都不用分別他若好若惡若是若非隨事隨理總歸第一義諦矣然溈山云實際理地不受一塵佛事門中不捨一法佛事門中不捨一法則且置既縱橫不離本際不知喚什麼作塵即受亦有什麼過處若云見有塵則不受夫既見塵又何曾悟來若悟而仍有塵須不受者則猶待修持趨向正用得方著不知何以非狂子也答云龍蛇易辨衲子難瞞頌曰玄沙平實猶存古溈老周遮曲為今寂滅真如狂子意空花陽焰至人心祇因見立法難遣都為情忘智自深若欲縱橫無罣礙無絃琴裏有知音問禪道泛濫自古皆然于今為甚詳其病多從日用起滅處忽然認著箇明歷歷沒形段底將為是遞相傳授有同兒戲不知明歷歷底乃生滅門中收攝楞嚴謂則汝今日與諸衆生用攀緣心為自性者又阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心此世尊所以叱為前塵虛妄相想也以此為心則必惑為色身之內將身及山河虛空大地皆為生滅惟認一浮漚體以當常住此即同外道半生滅半不生滅之見所以世尊後來於萬物象前分明指示箇無是見無非見一條端的大路此乃金針雙鎖透出頂門若能悟得更何祖教之異學者將此章文義微細披剝久久自然模著者箇關捩若摸得著者箇關捩卻好平白商量所謂全不生滅者何以目前人物之身及山河大地祇見遷變惟有觀河之見始無童髦則何得不同於外道歟答驀豎起拂子云者箇是生滅底阿那箇是不生滅底者箇是不生滅底阿那箇是生滅底放下拂子云吽吽頌曰拂子說法還聞否是非喪盡莫追尋人知大地多遷變爭較浮漚日淺深反覆推窮虛相想隨緣自在法王心一椎便就無餘事物我升沈自古今問大慧在圓悟處悟一日上堂舉僧問雲門如何是諸佛出身處門云東山水上行若是天寧即不然如何是諸佛出身處薰風自南來殿閣生微涼慧於此領悟云據某甲悟處已快活受用矣而圓悟猶以為坐在淨裸裸處何也夫以大慧之養諸方推重其不肯承當者隱微處放不過耳到此已能自信自肯非圓悟誰能按之又薰風話可謂絶頂提唱知解測度不必具論祇如大慧既能踏著者箇關捩便當更無差別何以止得淨裸裸處然則同一句話悟有淺深耶後來令參有句無句始於相隨來也得大徹去則先所謂快活者到此別是一境界當時不得圓悟按住決定苟安於此不知亦可了事否若不可了事大慧爭肯自言快活若可了事又何必待後來一段始愜悟心耶且兩段悟處差別在那裏答云有快活不要被人回換作麼頌曰一句當門正眼開情知孟八與麼來可憐步步隨他轉何不明明獨自裁萬物象前須放去夜明簾外卻將回屈伸壯士元無借始覺從前滿面灰問無業國師云一毫聖凡情念未盡未免墮驢胎馬腹去白雲端云假使一毫聖凡情念淨盡亦未免墮驢胎馬腹去無業且置白雲意作麼生答以兩手拓地作驢鳴頌曰聖凡情盡復何存腳下無私自坦然坐卻虛玄猶有位掀翻黑白但隨緣別行一路迷荒草轉入千峰鎖暮煙喚作如如蚤已變披毛戴角紹真傳問洞山因僧問如何是佛山云麻三斤僧問趙州如何是祖師西來意州云庭前柏樹子此等語句可謂徹上巴鼻直下悟得參學事畢乃有知解相似者以為本分呈似之句以為絶法界際量之句大似吳道子畫人物逼真非真人物所以解悟之分毫釐有差天地懸隔也然亦頗有一切知解脫略灼然於者一句子親切悟來久久悟境銷停止存所見身心不副一時驚覺然後以佛之知見旋復破除若不破除放過不可正謂閨閣中物捨不盡皆為滲漏且道病在什麼處答云㘞錯錯頌曰庭前柏樹無多子殺活同時愧老僧有地知非親證悟無功更莫較相應雖能用藥尤防忌尚欲忘懷似未曾曳尾靈龜千古恨可憐開眼日騰騰問法眼一日指簾兩僧齊去捲簾眼云一得一失且道那箇是得那箇是失答云疑殺天下人得失且置畢竟法眼意作麼生答云賊頌曰明明白白絶商量碧眼難窺祕密藏劈破晴空看入路驚回醉夢任從長愛他得底憐他失贏得閒來博得忙石火電光留不住一回親到始相當問南院云諸方祇具啐啄同時眼不具啐啄同時用時有僧出問如何是啐啄同時用院云作家不啐啄啐啄同時失僧云猶未是某甲問處院云汝問處作麼生僧云失院便打其僧不肯後行腳至雲門聞衆中舉此話有云當時南院棒折那其僧始悟趨回省覲院已去世見風穴穴問云莫是當時問先師啐啄同時話底麼僧云是穴云汝當作麼生會僧云我當時如在燈影裏行相似穴云汝會也且道南院意作麼生莫是當時那僧錯答麼那僧云我當時如在燈影行相似為甚穴便云汝會也且什麼處是那僧會處答云那僧若會他後更解行棒在頌曰啐啄同時會也麼將軍布令急如梭疾雷不及知迥避眨眼元來已錯過影裏有人耽歲月棒中無句莫懡㦬行行忽憶當年事擊碎歸來兩鬢皤問興化上堂僧才出化便喝僧亦喝化又喝僧亦喝化拈拄杖僧又喝化云爾看瞎漢猶作主在僧擬議便打下堂去侍者後問云適來者僧有甚觸忤和尚化云適來他也有權也有實也有照也有用及乎我將手向伊面前橫兩橫他便去不得似者等瞎漢不打更待何時者僧敗缺則置畢竟興化意作麼生答云惟佛與佛乃能知之頌曰果然佛老卻成魔靈鷲峰前嶝岋多在處起煙知有火從來大海決興波金剛圈裏無繩縛荊棘林中把手過蚤是龜毛長丈二臨危也不奈伊何問馬祖大師云即心即佛又云非心非佛又云不是心不是佛不是物若悟底人三句即是一句一句即是三句正是無差別處有差別有差別處無差別此不必論矣祇如馬大師畢竟於囫圇中分別提唱還有意旨也無答云幡竿頭上耀紅旗頌曰崔巍萬丈石嶙峋併絶咽喉喪主賓混沌甫開黃赤道虛空鐫出印文新不圖行處狐蹤絶祇要儂家血脈真莫向枝頭獨惆悵滿園桃李可憐春
