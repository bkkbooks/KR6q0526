body:
  text: 嗣法門人今辨重編書問復二嚴藏主附來問古人云莫將間學解埋沒祖師心此事最忌册子上尋討所以骨董底衲僧門下一點也用不著乃宗鏡録又云正念思惟甚深法門有二種人能枯十二因緣大樹一者溫故不忘二者咨受新法證道歌亦排經論而自云於維摩經得悟心宗是豈相違耶又祖心禪師既悟見老黃龍曰大事本如此和尚何得教人看語下語百計搜尋黃龍云若不教汝如是搜尋窮到無可用心處自證自肯去則埋沒汝也後屢質雲門語龍云知是者般事便休汝用許多間心作麼圓悟亦云古人公案不必盡會但透得一則則知其餘皆然然古德於塔前勘驗至子湖狗不契便云此一不是餘一切不是圓悟於大慧徹後亦舉數則淆訛公案勘過始云今日方知吾不汝欺也然大慧於殃崛摩羅一則又數年在虎丘閲華嚴始瞥地設使圓悟當時恰舉此大慧將毋如子湖狗一場懡㦬圓悟將仍不肯乎然則舉公案果可驗人否古人望見便知端的如所云維那且喜大事了畢及者漢和骨頭都換了也豈別有道歟入道法門不可枚舉大約不出二種一者從體薦二者從緣薦然亦時節既至借路經過不是實法也所以古人有見桃花而悟有聞齋板聲而悟有聞舉古而悟讀經而悟要之有義無義總沒交涉都是自己疑團忽破觸處打翻不同思議湊泊故曰悟然悟亦有深淺古人云大疑大悟小疑小悟正謂此也悟之淺者或有識得自己著落處或有透得箇目前無過咎處或截斷舌頭或呼遣自在如此類人未嘗無悟為向上不能無事故第淺耳然淺中也有深處深中也有淺處種種差別畢竟要到不疑之地實有大頭腦在所以古人於學人分上多方鉗錘如拋一箇金剛圈栗棘縫向渠面前若稍涉疑滯便是命根未斷以此十度九回掉頭不顧正是深切相為黃龍云若不教如是披尋窮到無可用心處自證自肯則埋沒汝也及塔前勘驗至子湖狗不契便云此一不是餘一切皆不是旨哉斯論古人為人無過於此若圓悟所謂不必盡會但透得一則則知其餘皆然此乃婆心急切處非謂教人撥置差別以塞疑端也然要斷絶自疑又不是區區向古人差別上卜度可以了得有種穿鑿之流縱饒摸得相似於本分事總沒干涉故知此事須從胸襟流出蓋天蓋地自是不疑自己不疑古人乃至不疑凡不疑聖不疑生不疑死咦此何等事到你鹵莽承當一時心識依通謬以為是他後禍事不少不可從頭問人謂之自誤大可傷耳就使深悟之士也有歲久月深待精煉明徹細微不覺始蕩然而盡虎丘之瞥大慧且然此所謂深中亦有淺也然善知識為人實有大頭腦在故圓悟當時不謂無眼大慧當時亦不謂絶疑此確然非了事人斷斷不能知此耳又附來問學者多向五蘊身田裏作主宰將真妄打作兩橛有人能一躍跳出倒用魔王印放出六門賊為護法善神亦庶幾無過矣然而心仍不得常住何也又黃蘗禪師云不可於淨性上轉作境解所言定慧鑑用歷歷寂寂惺惺皆是境上作解曹山特設四禁亦恐覺變為境也所以道似鏡長明猶是真常流注朗月當空猶是階下漢萬里無雲青天也須喫棒是謂荊棘林中下腳易夜明簾外轉身難今將心意識所有底一時放下放盡還放一如鏡破矣月落矣須彌山塞斷念無念矣然等間行處仍未得步步皆如又何也四祖謂牛頭曰但任心自在莫作觀行亦莫澄心是己然四祖十四歲悟道終其身脅不至席當其堆堆地坐與住心觀靜以踐履為究竟者如何差別古人譬如順水行舟但略把柁使不觸東西岸然詳不於此岸不於彼岸不於中流之義則無水亦無舟未審把甚麼柁若云未得如與佛無殊之牛頭未可輕嘗四祖之藥則所謂不落階級一超直入如來地者又遵何道也此事須有大休歇田地所謂悟者悟此也絶疑者絶此也踐履者踐履此也若悟處未到那田地而遽謂踐履則途路中決有參差之處正當此時不疑悟處不真卻執為踐履未到而欲以所知之心俟時候之熟真所謂東行而西向矣黃蘗云不可於淨性上作境解與曹山四禁等語此皆古人要人絶卻所知到真悟不疑之地使向去無犯手處若真休歇人於此自證自肯還有什麼常住不常住皆如不皆如正所謂行船不觸東西岸柁在當人更要把箇什麼雖然若到者裏須知還有一箇道處昔蓮花峰菴主常以拄杖驗人云古人到者裏為什麼不肯住二十年無有構者一日自著云為伊途路不得力復云畢竟如何以拄杖橫肩云楖栗橫挑不顧人直入千峰萬峰去古人親切為人更無藏覆惟是人不能構動傷藥忌耳且者箇消息亦無時節凡夫頓證與等覺而證更無優劣特地如此早遲八刻況區區乎又附來問仰山禪師一日坐次忽覺目前空洞洞地自身及佛殿僧堂山河大地一切皆無明日以告溈山禪師溈云此融通妄想淨盡之驗也我昔在百丈亦曾有此子他日説禪無有能過之者詳溈山離百丈住溈山八年而衆始集仰山問和尚浮漚識近來寧未溈云我無來經五年也仰云若恁麼和尚如今身前普超三昧頂溈云未在仰云性地浮漚尚寧然燈身前何故未溈云理則如是我未敢保任仰云如何是未敢保任處溈云汝莫口解脫汝豈不聞安秀二師被則天試入水始知長人到者裏鐵佛也須汗出寂子汝大須修行莫終日口吻夫融通妄想淨盡又數年而浮漚識始寧浮漚識無來經五年而仍未敢保任將知承當箇事大須仔細非心境兩無人我頓空未易相應湧泉四十九年尚有走作法王如中峰終身不肯居悟今人之視古人易知也而諸方以為一切無礙不肯認一些不到處生怕減了善知識名譽及夷考其行未免名聞利養繫其念簟食豆羹見於色古云自既粘縛能為他人解粘去縛無有是處然彼此亦安之豈時當末法有提唱此道者即是佛祖功臣始藉以流傳佛種不必問其到與不到耶山僧一向嘗道此事貴實不貴虛所謂虛者不但有恁麼理沒恁麼事直教有恁麼事不是本際地上時時刻刻塵塵剎剎增減不得底變易不得底皆云虛不云實推而言之就是黃面老胡四十九年放光動地依山僧道皆云虛不云實豈況溈仰父子乎所以溈山融通妄想淨盡之驗離百丈然後浮漚之識始寧此正貴實也不貴虛也貴常也不貴暫也至於浮漚之識無來五年而猶不敢保任則始終貴實而不貴虛也于今人見説涌泉四十九年瑞巖三十年與溈仰諸大老保持箇事慎重乃爾以為悟後穩密絶諸滲漏古人實落全在乎此便擬向行住坐臥處親他去歇他去不知渠之所謂實正古人之所謂虛也為甚如此祇為打頭不知實落去處所以二六時中尚且不識好惡正是精進反成懈怠耳昔溈山嘗向仰山云祇貴子眼正不貴子行履看溈山是箇穩密底人為什麼祇貴眼正將知行處不別若向者裏著到不妨省力便知溈山浮漚識寧正是箇時節涌泉四十九年後也祇是箇時節瑞巖三十年後也祇是箇時節得到者時節自知痛癢亦能知他人痛癢否則都是弄泥團漢自己且無自由分矧其他乎所以山僧向於此道頗肯論列十年於茲始知好惡只今惟有一味慚愧而已諸方真偽各有清夜流傳固自有功而妄談不能無過此龍天事非豫退藏之人所知也復熊魚山內閣來諭四病教山僧為一切人除卻截斷山僧舌頭則不無若以當無舌人語則猶未敢相許正使轉一語云死不死亦非病活不活亦非病盡情不盡情亦非病與麼不與麼總非病亦未是無舌人語何以故病即是藥藥即是病但知進前失卻背後今時禪流之不如古人均墮於此大慧昔曾悟薰風話而圓悟猶以為坐在淨裸裸處及後於相隨來也一句始解捉敗所以千聖出頭全推此著若到者裏猶有絲毛頭放不過處自己終未肯掉臂也書至此侍者入報云有客相候山僧云正答熊公書在且待少刻不覺隨筆寫上住持事繁懵懂若此三十痛棒其甘如蜜矣請公試下手看又山僧壓良為賤居士認奴作郎三十痛棒請與居士分之山僧甘甚居士還甘否他時後日不妨笑倒也咄秋氣滿林霜葉白一溪清冷鎮長流松杉種得添山色又被行人斬未休不可又作佛法會好與同菴若雲兩居士書凡大人出世則必有大順有大逆二者皆助道之因而無優劣其間也所謂大順者遇真善知識道眼明徹具大方便使我了了見性不犯手於向上不失足於旁塗而卒至於絶學無為之地首尾俱正權實兼隆初祖西來至於今日善知識諄切為人不知凡幾學人至誠巧值亦不知凡幾矣所謂大逆者恩愛纏擾冤懟牽掣毀辱迫逼疾病延綿衣食困乏中下之士望洋而卻不必言矣稍有智識亦未免左顧右盼瞻前慮後以至心志疑沮歲月遷延不知此正堅忍練達之處大根利器一眼覷破把得倒用一任橫拖直拽總不曾動著毫釐昔我世尊示降王宮時父王見太子寡嗜欲離喧瞶心竊憂之悅以妃嬪娛以玩好而太子之心終不可易及夜半踰城父王痛哭倒地欲絶百追不返以世尊千百世行菩薩道然後一生補處豈不能揀擇信心父王歡喜成就而乃示現若此故知恩愛難斷為道之切不妨於難斷中斷當其初斷也即以佛之神通廣大亦不能使父母歡喜成就而但能不為其中阻此後世一大榜樣也至於子弟則阿難羅睺羅皆為弟子嘗隨侍佛聞道受法天倫之樂非人間比矣然調達善星則家親作祟障礙百出以佛之神通廣大亦不能盡使其子弟人人樂從此又何説按調達善星自世尊初發菩提心時多生相逐俱為冥權由此觀之則一切障礙之人障礙之事直與善知識相成功等是皆助道之因而無優劣其間也毀辱則如入城瓦礫打擲疾病則如阿難乞乳困乏則如雪山六年一麻一麥盡世尊一身逆境俱備一生補處尤且如此況菩薩道中乎所以大力量人偏於難行中行難忍中忍不但不為少退且因之增長諸凡不相關切可以隨順不可缺權苟於道有妨於情易縱則中志須定而亦不見悻悻之色是在當人自具方便也稍有所聞專此寄囑惟珍重區區復凌卷支明府接公佳訊謂山僧闖開覺路攫碎虛空坐斷天下人舌頭從何處得者消息來慎莫認穿衣喫飯底遂謂可以終日食而不飽倘要飽即飽終日穿而不熱倘要熱即熱此不過硬作主宰一時呼遣似易殊不知臘月三十到來卻用不著落得畫餅耳又謂山僧一星火分照萬家一星火能不滅否若山僧仍有一星火何曾得不滅來豈但水中月不是就是天上月亦太遠在若要是則一切俱是到此境界不由汝不卻步佇思劍去已久刻舟何益耶公若有志向此門中討箇分曉須把從前認著底一時放下連放下底亦放下放到無可放時猛自提起僧問趙州如何是祖師西來意州云庭前柏樹子正當提時不得作道理會提來提去驀然道理俱盡意想不行從那裏撞破頂門露出摩醯眼孔不妨來山僧手裏吃一頓瞎棒也咄且置是事聞公為地方保安建大悲懺壇一段因緣世出世間兩兩俱得今日菩薩熱腸計唯出此恨山僧住持事繁不得遠來然大悲弘願一念至時非十方三世所能限量則又不知山僧遠公公遠山僧不妨道得一句使功德圓成廣利人天知非分外也一笑復楊文學無見十方諸佛與大地衆生同一心源而凡聖各別者迷與悟而已矣迷於心之本際則不見心而見境妄生分別而取捨由之取捨之情不已則業果之報相隨生死循環無有休息雖明知情虛業幻而終不能使自遏滅者目前之幻妄實有本來之真際無地也故欲了目前先當識取本來之地然又非舍目前別有所謂本來也善惡境也為善為惡者非境境有遷變非境無遷變此無遷變者即在遷變之中迷則與遷變者相流轉悟則遷變有盡而我無窮無窮之我所謂通晝夜亙古今始終萬物發揮鬼神極於妙用而退藏乎密生死不能繫業果不能酬人人成現而莫得其用者有待乎悟之也公欲悟此須屏卻從來取捨之情使分別暫息境見少停正當此時切忌忘卻或者豁然從夢得覺亦未可知若得到此又當知無始虛妄自今已後何以能令其終不與一切生滅和合須信實有倒斷之時而非謂更無別有遂任其莽蕩無礙也過此兩段不妨不遠千里圖一相見尚有本色鉗鎚承當未易所謂過得荊棘林是好手此時幸勿謂老天然返面無情也珍重珍重復英文學目青公聰慧人當世界亂離感夢幻之非久不肯與無識之輩終於沈迷又得良友見聞交洽知定有不可朽之業過於夢幻以故信之而不疑誠不疑之也但無始厚習與生俱來諸凡濡染逸偷之事私心實甘之是未可以一日之理而頓易其情也夫明於理之至極而使其心安住降伏其初猶未嘗無勉強之力矧於信而未明明而未至者乎故初心之士知信力與習氣不可敵則勉於離習所以存信也知幻妄之知暫而虛貪癡之情久而實則勉迫其知於必行汰其情以就理使虛者實之實者虛之然後日用之間舊染去而清明日生以清明之心觀於衆念始知衆念之非他物也若尚未離舊習則全身在妄而欲去妄覓真則去亦未必非真覓亦未必非妄更教誰為作主誰為解脫耶公苟向此一大事必須打迸一副身心一力放下一力擔起若猶徘徊岐路欲一無所捨而祈其或有所得世間豈有腰纏十萬貫騎鶴上楊州者哉體中佳勝不妨入山或未必相賺耳珍重復王侍郎園長承翰頓見本來面目此語實搔著山僧癢處但不知本來面目為誰見者又是阿誰既見已後與未見前還有差別否若有差別不可説本來若無差別用見作麼未免向公再覓皂白又承云煩惱試人既見本來喚什麼作煩惱若尚有煩惱待拂拭者恐未是到家消息祈勿草草入此門中不敢不直人來幸更有以慰也復林毅菴太守教外別傳之旨千説萬説不如一悟千説萬説説得絶似不如悟得底人默無一説亦不見古今人千説萬説我世尊涅槃會上謂四十九年未曾説著一字豈不信歟故曰悟得底人默無一説非謂默而無説之為是謂才開口早已不是了也然事不得一向所以六祖大師説箇凡夫即佛煩惱即菩提欲人直下承當故有即之一字大珠和尚説箇回煩惱作菩提回無明為大智欲人直下撥轉故有回之一字若於方便門中更一眨眼白雲萬里矣至於百丈牧牛安禪師拽鼻亦謂得底人向後行持若未真得且不知何者為牛牧又何物意識紛紜名相不實恐未是學人了手處也古靈贊謂蒙百丈指箇休歇處當看一箇處字若單單以放下二字釋之欲從何住足耶南泉云平常心正是者箇去處三祖云體無去住亦正是者箇去處即雲巖云如人夜半背手摸枕子及遍身手眼通身手眼亦正是者箇去處又如洞山麻三斤南泉斬貓山僧訶林一笑要總不出者箇去處者箇去處善知識以之自為亦復以之為人晦堂云還聞木犀花香麼瑞巖云主人翁惺惺著復云喏喏此亦大略可見矣所以隔房聞叉釧聲即是破戒只一句探竿子直使驢頭馬面一時逃躲不得至若金銀雜沓朱紫駢闐卻云好箇入路便是得底人眼孔要瞞一點不得也總之此一大事定須徹悟始得欲得徹悟不妨埋頭打迸一則話頭上日夜逼拶逼拶到無意味心情悶絶正是好時節萬萬不可放開一步向道理識解上著到若向道理識解上掉得箇相似越發會打葛藤雖有山僧無能為公何矣承下問據款結案亦方便中語且不可作實法會也無事請下顧或亦不相賺耳珍重復李田叔居士貪嗔癡自公有之亦可自公無之所謂無者譬之四支斷不復用之方為真實非可待其既滅而謂求之了不可得何難復起乎昔有俗士問天堂地獄於智藏禪師藏曰有士曰曾問徑山和尚皆云無而師獨云有何也藏曰居士有妻乎曰有徑山和尚有妻乎曰無之藏曰他道無即得今公若果求起處不可得則當不復有矣若在有中而謂其無只恐掩耳盜鈴他日瞞黑面居士不得耳不直則道不見唯公亮之與阿字侍者此字且勿示人非謂佛法有兩般正恐見未到實頭處不免以道理會卻成剩法耳汝從未曾做事即做事亦在山僧左右時有提誨此翻遠離不可不索性説破恐做事心勝不覺不知墮在無事甲裏才憬覺早成兩橛如此則全虧大人行履即做得事亦屬有為也仰觀古之大人不過行解相應而已必使解處即行處行處即解處方無滲漏若解過於行謂之見地中人日久歲深空成話餅所以善知識于學人雖愛之極而終不敢兩手分付者正謂此也麻三斤乾屎橛三腳驢子弄蹄行東山水上行如此悟得可謂見處明白矣二六時中心與事接目前止有事物尚無餘境餘心猶未見差別若到斂目趺足一切過去現在未來之境靜中臚然稍一踏上便無自存之地正恁麼時莫謂我使得他要踏便踏要踢便踢大恐踏上易踢去卻難縱使一回得勝兩回三回一定輸他耳金剛經云過去心不可得現在心不可得未來心不可得此不可得雖則本來如是然亦大人八識一刀手段本體功勳同時俱到若果能一切時中三際之境劃然而斷亦無劃然而斷之量則斂目趺足時即是應事接物時應事接物時即是斂目趺足時過量之人無所説示阿字汝道合作麼生所以山僧嘗舉僧問洞山如何是佛山云麻三斤僧問趙州如何是祖師西來意州云庭前柏樹子者箇話大有來由直須契證始得且不是道理且不是見解正如人問上座今朝吃飯也未答云食飯了也可中還容擬議麼又如波斯入大唐大唐人舉手波斯云烏招烏招且道從何處得道理來從何處得見解來然汝須是箇人不然又成窠臼今時俱落在者一箇窠臼所以血脈不真山僧不妨再一提起望置座右頻自省覽也若使別人看過所謂麻三斤庭前柏樹子渠也領過所謂過去心不可得現在心不可得未來心不可得渠且掉頭及乎一坐坐定過去事想一回現在事又想一回未來事又想一回憬覺起來正好著眼乃謂我雖無端闖入然此本來原自三際都不可得即今何曾動著又自想一回再或覺得全身放下一時麻三斤庭前柏樹子恍惚現前不覺不知已成心境縱使知非安頓手腳未定一箇昏沈伸開腳看看天大白矣下得床來事物交加混身輥入者裏一真一偽看從前靜地裏未妥則此處必定是偽又不自知只管向人謂我動處尚打得過恰好笑倒耳今時識得門頭戶底覷得古人七上八下底大約俱如此過日不可不察也山僧一向期汝過厚亦多見禪客七青八黃便自滿足甚且退失故欲汝一腳踏到底若根本不深厚雖使枝葉茂盛祇益狂肆於己無益於人有損既無以折高明之心亦未易塞流俗之口汝今在十字街頭正好一翻試驗自知深淺也秋涼珍嗇餘無所囑又來札云在世情事物中轉腦回頭頗知時節又云埋頭市肆步步向黑漆桶裏拶入若無後語則腳頭不闊若無前語則血脈不親吾宗所謂持書不到家與麼旨訣要在當人轉變不則又成實法也於此識得更須看洞山云與麼道即易相續也大難得底人於相續處脫卻今時那邊獨行獨步不為三際收攝然後向十字街頭就有為法裏作無為生活非人能測豈自所知山僧此翻不謂汝能為叢林出力所喜吾宗頗有趣向之士此道或不致寂寥耳見一亦肯拋棄身心向艱苦一路不妨便一與語也復楊震生居士阿字行乞江城持楊居士書歸書內問語忉怛山僧隨筆答去復有數字勉居士從自己腳跟下著到勿只向言句覓居士復有書求山僧開示言意諄切山僧終不敢無風起浪蓋謂此事非言句所到六祖大師云但信佛無言蓮華從口發古德亦云言多去道轉遠居士若信山僧話二六時中但須向言句不到處意想不行處看自己本命元辰著落看來看去忽然撞著露柱搕撲一覺始知平日言語時平日思想時錯過多少乃至鴉飛鵲噪風動雲起錯過多少甚而街頭市尾貴賤童叟是非人我若成若毀若好若惡錯過多少然到此處切忌作現成公案若作現成公案卻似不曾向言語不到處意想不行處一回汗出也尚有許多葛藤打不盡且不敢對居士盡情搬出恐添居士繩索亦欲居士就淨地裏豁開眼孔方來棲賢金井橋下白石磷磷青溪漫漫更有廣長舌為居士點破且不關天然老事復祖印禪人來問分貼四法界山僧今轉問公祇如某經文為什麼喚作事法界某經文為什麼喚作理法界某經文為什麼喚作事理無礙法界事事無礙法界倘不開者一隻眼則章分節解猶屬依通古人謂依經解義三世佛冤離經一字即同魔説也偈云懷州牛食禾益州馬腹脹天下覓醫人炙豬左膊上此杜順和尚法身頌與來問迥然然華嚴賢首宗是此老建立故即以此老湯頭為公對症公久善為疹候故又因公之明以通其暗公六脈無恙只左寸疲緩略披古方多掇酸棗仁取易應手若果中病源此後自當高抬藥價幸毋嫌先生時套作自調養計也一笑復願乘禪人此事貴悟不貴解于今人聞説即心即佛即向五蘊中認箇靈靈明明聞説非心非佛復撥去見聞覺知別求寂靜如麻三斤庭前柏樹子不現成承當即信口皆是種種邪説皆解也日者禪云某甲於此事如黑漆桶一樣山僧云正要你者箇漆桶但行住坐臥祇恁麼按住看看來看去自然一日迸斷自知老漢相為處不要解來札云不知在黑漆桶中求出身是不求出身是此正急切欲解也若有出身與不出身依前不安於黑漆桶而欲他日得真悟無有是處禪今去祇消仍前做事不問出身與不出身做到悶絶時祇管看不得打退鼓不許於黑漆桶上作一分道理忽然時節到一腳踏翻待相見始有喫棒分也復梁有聲居士離心意識參此古人直指語祇怕離不得不怕茫無把捉試看二六時中未曾提起話頭有人喚你食飯一等去食寒來一等討衣服穿還是茫無把捉麼何不向那裏悟將去若但聞與麼話便認著箇見聞覺知及一切現成等卻似不曾離心意識矣猶尚不醒且看僧問趙州如何是祖師西來意州云庭前柏樹子此一句容得汝心意識麼莫怕無滋味但恁麼提提來提去忽然時節到來不妨打失布袋便知好惡更不著忉忉耳尚有一話參禪大須拌身世若全身在世味裏又將心向佛法討些便宜好似腰纏十萬貫騎鶴上楊州老僧從來不見有此怪事復熊非熊居士天下唯聰明人可坐進此道然每見聰明人多為道障非聰明障道聰明而不了嘗為他塗所惑此聰明自障而住山翁遂以為聰明障道真冤煞矣讀來翰知公大聰明人然細玩尚不能脫然世網誰足為公絆足者大事因緣雖四聖六凡同一具足了與不了均為剩語然畢竟一回不可一向便為無事至於微細披剝廣大融通非朝夕事設使公才弱冠老僧尚以為當疾知時矧四十五十猶徘徊於道與俗之間此所謂聰明自障老僧終不敢謂聰明能障道也既不敢謂聰明障道則千秋大業捨聰明人吾誰與期絮絮叨叨真成習氣終知聰明人必不以為贅語耳千里奉酬惟此切切於聰明人前不作寒暄語祈相照於筆墨之外復淡歸監院天下古今無一箇不是懶人只是外面不曾撞著箇激發裏面不曾有箇幫手他到會抯起一面不懶底旗號招募一夥懶漢鳴金擊鼓卻要拏縛那山上水裏星散底懶強徒豎起不懶底話會日夜鼓行而前殊不知他全夥本是箇懶出身一時時節不到便自改頭換面做起那一翻事業忽然時節到來外面撞著箇懶激發中間驀自攢出一箇懶幫間來暗地裏把不懶底旗號一一替你都改作懶字一箇起頭一箇暗幫又一箇遊説不難一刻間鼓噪趕到中軍帳外把箇大將嚇得昏了半晌將息起來默自思量我元來是箇懶漢不知不覺弄到者裏好不喫苦何不趁此機會還我懶底窠臼卻又不是我要散夥卻把散夥底罪案推向別人他到占了箇懶便宜又不曾損他舊時不懶底名譽你道者箇是什麼人就是禪所謂箇老厭物釋迦如來者箇老厭物元是天下古今打頭一箇懶元帥何以知他是懶元帥你看他在菩提樹下才開眼見箇什麼明星得些懶本錢便道此事難信難知無開口處不如蚤取涅槃忽然驚起十方底老厭物箇箇都會害過那一翻懶魔障自己喫苦了亦要後來新充底懶軍教他嘗嘗滋味鼓起欲梵諸天八部總來勸請忽然拋下箇懶心腸便豎起箇不懶底幡竿招集一干懶菩薩懶聲聞都來講求箇不懶法門講來講去講得箇不耐煩卻不好自己打退鼓正悶悶時忽然撞著箇懶激發喚做什麼魔王要來勸請入滅你道者箇魔王因甚會作者等勾當因他亦是箇懶夥人所以徹底知得那老厭物從前一翻驚天動地總是因人成事水到渠成元是箇沒腰骨底所以一手搔著卻似推門落臼不然那老厭物若真是箇不懶底元帥正當魔王勸請不難説箇蚤哩有分教魔王退身三舍為什麼到要向阿難口裏討消息被阿難暗自窺得者老厭物懶根發了卻似承他風旨裝箇聾啞成就則箇你道阿難是什麼心行卻元來他亦是箇懶漢又把世尊做箇他底激發他到做箇世尊幫手便把不懶旗號換箇懶旗號自此做一箇大懶底教頭傳到後來徑有彰明較著向深山裏下箇懶山寨如大梅神鼎一輩水裏又有巖頭船子充箇懶水師陸路上又有箇普化谷泉一宗人作箇懶遊帥到于今居然分箇對敵互相勝負你若站腳不穩一翻翻轉要入那懶夥到自不難總元來者兩夥本是一夥總是箇懶出身不過時節不到便自改頭換面終是箇不牢底你道還好撥發他麼所以老漢挺著副脊梁硬著副嘴臉你道妨箇什麼寫至此不覺忍不住笑且道笑箇什麼笑老漢那一段間話是不要人倒那不懶底旗幟還是先開著一條懶後路有底説天下沒一箇終懶之人只是有著便與不著便和尚不過一時著激要且自己放下不得有底説和尚已是一箇懶底頭目目下耐煩不過十分有八九分腳軟了有底説和尚要尋懶路便教著人向前討箇下手著落者三段話合做一則公案畢竟作麼生和會且待點起鑼鼓大衆試揖著頭覷一覷各請下一轉語復凌世作司李色陰已消受陰明白新證未獲故解己亡此楞嚴修證菩薩未達方便有證有得于其中間自生疑礙不如我宗門下了則頓了若其未了只宜豎起脊梁不顧危險卻不可于塗路邊有所顧盼如竹篦子才舉起時汝作麼開口且無開口處如何更有設心處既無開口又無設心病于何生藥于何治瞥爾知歸內外豁然盡大地皆藥信手拈來消補互用正當此時豈復問人求活計耶連病數日正伏午寢接翰立復草草無餘語耳又公多時不入山有人從仁化來詢及始知令孫之變未免恩愛未得脫然何不正與麼時把平日參得底禪向者裏試試看若試不靈驗不妨把麻三斤話挺著脊梁一回廝併或者忽然粗來始信盡大地是兒孫十字街頭活人無數死人無數不妨張開兩塊皮笑了一回又哭了一回卻來丹霞頂𩕳與大衆玩月問什麼尖相圓相看老漢如何打發莫只閉著書房堆堆地懊惱才拭了兩滴熱淚便執起筆引什麼仰山石室玩月希圖老漢答句禪話與公作解悶老漢不學古禿廝者等間工夫説尖説圓説隱説顯祇有白棒一條待世作入山且看是尖是圓是不尖不圓道不來時且莫怪老漢索性也承布施拜謝何時望螺峰一步殊切與梵音禪人下山時忘與禪語至下院始憶之筆紙不便茲直歲還山專書此寄囑凡學人在善知識座下日久能具正信稍有根性未有全無所窺須知日用俯仰折旋明明無第二人然騎聲蓋色不能無礙此未得穩妥者粗而易知也乃有目前無一物當處亦無人一句當空八萬生滅門一時頓盡到明眼人前猶未肯點首者且道過在何處衲子十年二十年抖擻不下止爭一反覆間耳念禪此番應死心無異緣復除典客不謂無事正要禪於人事紛紜裏薦取力量更大也疑情不可多礙膺之物破則無不破始知盡大地銷歸自己所謂聖人無己靡所不己也歲月易過善為用心切囑切囑與錢牧齋宗伯人有譽隆當世讀其書始恨相知之晚貧道於居士是也耳居士名久矣得之傳頌祇增疑著去春捧心經鈔居士真我法龍象也真空一門般若六百卷讚歎尊重悟此則百千三昧無量義海彈指圓成居士非宿植靈根何能深入法界又何必教旨之非宗趣耶遠辱翰諭適先師示疾未能裁答轉盼秋風遽丁大事收涕正惟求所以銘吾師者今釋推文章高妙貧道謂此居士緒餘空智蕩群疑精識邁前哲天下後世鼎重一言吾師其不朽矣謹勒行狀專侍僧馳謁伏惟垂念法門俯賜允俞昔無盡居士為湛堂準公點出眼睛照耀天地愧貧道未能效妙喜躬謁然居士淵鑑過於古人知能遠矚千里之外與丹霞淡歸監院六月二十以先慈病自海幢趨雷峰僅得侍藥一月竟以七月二十順世所慰病中恩愛頓絶一意西方嘗夢睹慈相或以全身投蓮華中香極而醒臨化數日顏色光怡無痛苦狀念佛至氣盡似可希想下品耳去秋至此才周年兩丁人子弟之厄雖生人所不免然痛毒相連亦夢幻中一大愴惻六如入山詳詢近況知放身土木錢穀中不作苦樂想正吾門幸事因憶大地衆生無一事一念一刻不是佛之妙用祇坐不覺枉作箇衆生知見及乎覺得又枉作箇佛法知見拈一放一未見輸贏所以勞我祖師一棒一喝以自己風光作他人破睛底針刺若是皮下有血撩起便行更不回頭轉腦此間間不容髮若不大死便活轉來不免又刺頭上他機境如何是法身邊如何是法身向上者箇是體那箇是用者邊作麼生那邊又作麼生怎地是悟底怎地是踐履底把古人一期方便都做實法會去一似從上實有恁麼事豈不冤誣先聖今時人病多在此所以説得相似做處淆訛理既如此事亦復然真可謂虎皮羊質矣山僧于今不怕禪不會説亦不怕禪不會做祇怕説了做了眼孔定動急不得避被人拿住指良為盜有冤無訴耳便中不妨一句慰我勿但謂和尚既不許人眼孔定動又要人慰箇什麼便打發過箇裏大有來由真不得草草也復程周量中翰日從阿字石鑑悉公護法深心出於誠愨非夙植善根未易得此復承遠訊兼辱惠錫感荷彌切翰諭山野現前指示公意初入道欲得淺乎言之不知吾道正不離現前而具從上之理也夫眼所見者色耳所聞者聲今人之最現前耳然眼不到色處色不到眼處耳不到聲處聲亦不到耳處此在眼未見色前與既見色後耳未聞聲前與既聞聲後易知也若當眼與色會耳與聲接其中物我不分根塵交互乃愚者盲目聾耳之場即上哲全體大用之極是未可以言語構也所可言者眼在色時色不能奪眼耳在聲時聲不能奪耳唯耳目從無始來局於聞見妄成似聲似色之習暫時惑亂不能自覺遂滯長劫衆生日用所為真可憐憫也公試於聲色紛紜中斂目還見攝聞還耳則一時聲色直下冰銷縱觀世間猶如夢幻且不妨即此見聞廣作佛事若到此處尚有全體大用一段現成公案又待他時相見向棒頭上別通消息耳
