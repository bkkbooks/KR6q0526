body:
  text: 嗣法門人今辨重編上堂崇禎壬午住廣州訶林上堂師拈香祝聖畢復拈香云此一瓣香天日覆而不知高地日載而不知厚舉起則耀古騰今放下則傾湫倒嶽在山僧手裏以無名示人天目前而爍破爇向爐中專申供養見住羅浮華首臺堂上空隱獨和尚用酬法乳之恩遂就座問答別録乃云盡大地是我人安居之場盡日月歲時是我人安居之候從朝至暮穿衣喫飯掃地燒香搬柴運水迎賓待客乃至普天之下四民作息百務繁興盡是我人安居之事方寸之內是非生滅昏沈掉舉散亂禪寂盡是我人安居之心然既如此還有甚麼制可結諸兄弟事不得一向在佛法上須有箇宣揚底時節在諸人本分事上也有箇緣起底時節山僧承諸大居士大耆德請住此院今日為諸兄弟結制事不獲已聊赴箇時節願諸兄弟慎勿錯過驀豎拂子云大衆還會麼若在者裏得箇入路不妨慚愧昔日六祖大師受黃梅衣鉢隱獵人隊中十六年念時節將至才至此地一日行兩廡間見兩僧爭論一曰風動一曰幡動諸兄弟爾看者兩箇僧何等天然何等妙用正恁麼時爾要增減他一毫得麼爾要疑擬他一毫得麼叵耐他自己不知不覺所以六祖大師事不獲已才向他道不是風動不是幡動雖則把住去路硬按牛頭其實也是平地起波濤若是皮下有血一聞便醒正好慚愧從前何須更待六祖大師云仁者心動雖是和盤托出點簡將來猶是鉢盂安柄爾若於此窺得破不但歷代祖師瞞爾不得即黃面老子也要瞞爾不得當時四十九年橫説豎説猶沒者箇消息事不獲已才向百萬人天中拈青蓮花已是逗漏不少何況又道吾有正法眼藏涅槃妙心付與摩訶迦葉爭怪後代兒孫認指為月若是大聰慧人決不入他群隊為甚麼如此祇為向上原沒恁麼事亦沒有恁麼説今日山僧與爾諸人説破事不獲已隨邪打正若有伶俐衲僧攔胸把住問教口啞亦是山僧招得有麼有麼如無山僧自起還合自倒去也喝一喝云今日結制大衆珍重下座解制上堂九十日以前諸人從甚麼處來九十日以後諸人向甚麼處去正當九十日前後來去俱成戲論且問諸人即今在甚麼處安身立命時有僧出問云日落西山事若何師卓拄杖一卓進云四大分張時在何處安身立命師以拄杖橫一橫進云某甲不識師云大好箇不識僧禮拜歸衆師乃云要知者僧不識處正是諸人安身立命處汝若會得前此無結制者後此無解制者目前無聽法者此間無説法者若能如是山僧不妨與汝諸人結制不妨與汝諸人解制於本無生死中説有生死於現有生死中説無生死主賓互換棒喝交馳豈更有第二箇時節驀豎拂子云舉一不得舉二放過一著落在第二諸兄弟爾若喚作第一蚤已落第二了也爾若喚作第二不可更有第一汝若總不與麼猶是顢頇佛性儱侗真如畢竟作麼生擲下拂子云蘇嚕蘇嚕㗭哩㗭哩上堂山僧昨夜偶得一夢夢見一夥賊彼時慌忙得狠忽然醒來元是老鼠咬樓板今日普告大衆通知便歸方丈上堂圓明了徹猶落今時聞見俱捐且居意地隨流得妙勉強主張總不與麼頭角生也大衆須有脫身法始得上堂心不憶玄旨口不經玄談行不入凡聖之稠情不附生死之業如斯造詣已難其人何況拋磚打瓦作浪興波撥亂乾坤掀翻黑白汝若從之得毋纍乎儻其疑焉祇成自錯山僧到此啞而不言時節若來諸人自委何以故難言紅爐一點容易銷鎔須信百煉精金始無變色理解之與證悟似同不同見到之與行到一徹永徹稍存等待便非此宗立地圓成猶為鈍漢豈將魚目遂作明珠若是真人自知決擇上堂我有一句子久未向人道今日厚顏專為大衆良久云三千里外逢人不得錯舉上堂分明萬事雪填井又且婆和祇恁行不是眼開同作夢都緣露柱證無生露柱既證無生山僧及大衆合作麼生參參上堂心不自心因契道以名心道不自道因無心以名道所以道絶玄微心無體量若言有道有心猶是把箸拈匙見識若言無心無道依然靈龜曳尾之機明暗掀翻非其境界同時殺活豈是全提才到龍門已遭點額汝等諸人幸自好看上堂世尊拈花是一出好戲列代祖師拈椎豎拂橫説直説是一幅古畫幸自我者裏總無如是窠臼便歸方丈上堂舉古德問僧云何不看經僧云不識字德云何不問人僧展兩手云是甚麼字德無對師曰你看者箇古德到處勸人看經到處勸人問字分明一箇八字他也不識山僧亦有一箇字要問諸人遂豎起拳云諸人還識麼會書不擇筆點點是黃庭戊子九月再住訶林上堂驀豎拂子召大衆云還會麼放下拂子云真心無揀大道非遮體絶見聞而不離見聞之緣用同聲色而不是聲色之事如蟲禦木文彩偶彰對鏡看花心口俱喪所以掩室摩竭杜口毗耶固非玄妙之機豈墮功勳之位山僧六年以前一場敗闕已甘荒山匿影破衲蒙頭乃承諸當道諸鄉紳護法檀越長者居士寺中禪衲方外高流迫索再三苦辭不可只得俯順時機復升此座若論向上一門不可畫蛇添足須知千差無別何妨作浪興波一塵立而國家鼎盛萬機休而千聖不攜放開捏聚惟我能知殺活縱橫非凡可測一切處變易不得何勞掘地出空未生前面目儼然不用續鳧截鶴理貴從來事由今日未明八法枉自楷模已協宮商別諧音律喝一喝卓拄杖下座結制上堂年年三百六十日不曾動著毫釐今日無端截取九十日為汝諸人開爐結制承郝范兩大護法設供請山僧登座説法貴圖汝諸人直下明取者九十日底道理爾若明得九十日底道理從無始來至于今日總是者箇道理又從今日盡未來際也是者箇道理明得也是者箇道理明不得也是者箇道理既明得明不得總是者箇道理山僧今日又作麼生良久云不因紫陌花開蚤爭得黃鶯下柳條卓拄杖一下復舉陸亙大夫向南泉云肇法師也大奇特解道天地同根萬物一體南泉指庭前牡丹花云大夫時人見此一株花如夢相似若是訶林則不然儻有人問肇法師也大奇特解道天地同根萬物一體為向伊道白雲常在戶青靄數當峰且道與南泉相去多少上堂今日長至在處叢林熱鬧打普齋散嚫施吹法螺擊法鼓請堂頭老漢説箇應時及節底佛法惟我者裏冷啾啾地只有一箇栗棘蓬拋向諸人面前一任諸人吞吐山僧且問諸人吞底是吐底是不吞不吐底是若道吞底是還我栗棘蓬來若道吐底是爭奈目前何不吞不吐咽殺闍黎總不與麼辜負佳節作麼生速道速道上堂戊子臘月八日寺中耆舊設供請山僧上堂要為大衆舉揚世尊睹明星那一則陳腐公案大衆如今那一箇不夜夜睹何曾少箇什麼為甚總在迷裏就如世尊當日何曾多箇什麼為甚卻悟故知此事大有因緣時節時節若至其理自彰在世尊分上雖是自彰底時節其如祖宗門下正好喫棒且道差別在甚麼處驀豎拄杖云只為拄杖子不甘所以三千年後帶纍山僧人天衆前不免説破喝一喝云向下文長付在來日下座解制上堂一期之內諸人還構得也無構得也三十棒構不得也三十棒諸人作麼生你若腦後無眼直饒喝乾滄海棒倒須彌猶是硬作主張茫茫業識所以道末後一句始透牢關把住要津不通凡聖若到此間山僧也須喫棒只是無人下手衆中還有下手底麼有僧出才禮拜師云伏惟珍重下座浴佛上堂驀豎拄杖云釋迦老子生也生也諸人在甚麼處見得汝若見得也好三十棒汝若不見得也好三十棒且作麼生昔雲門大師雖則擒賊先擒王殊不知消息一漏遍地荊棘帶纍山僧一條熱棒橫搠豎搠左搠右搠搠到天明依舊可憐生擲下拄杖云維那今日不得普請住雷峰上堂境不可離心不可見照不及地寂不通方凡外二乘迷外覓悟三賢十地悟了還迷體妙難思情忘自合諸有智者咸推此宗初入門來須知藥忌上堂舉僧問投子如何是十身調御投子下繩床立又問凡聖相去多少投子亦下繩床立雲門有偈曰投子下繩床今朝為舉揚驢前馬後漢切忌錯承當師云雷峰亦有一偈驢前馬後今皆是縱不承當也枉然祇為雲門曾道破雷峰不免費重拈且道雷峰意旨與雲門有優劣也無良久云祇因為客久回首話偏長上堂喚作拂子則孤負山僧不喚作拂子則孤負大衆孤負山僧即今向大衆説過孤負大衆山僧祇得噤口早晚隨大衆拖出拖入咦露柱不解鐙籠意一夜癡呆立到明上堂徹底凡夫日用中河沙諸佛共無窮剎那欻爾千差起夢裏徒勞説異同大衆且道即今是夢不是夢祇知貪程不覺蹉路不蹉路不許夜行投明須到驀豎拂子云投子大師來也多少人在者裏死活不得喝一喝上堂不是麻三斤分明乾矢橛打殺鱉鼻蛇放出摩天鶻趙州勘破婆子威獰如虎為什麼被劉鐵磨一錐便倒何似我老博山密移一步祇如雷峰又作麼生鴨腳木不鴨腳木遂鼓掌云料掉沒交涉上堂中秋又到皓魄重輝雲散長空影同滄海山河景仰童叟歡呼以兩手作圓相云祇各人分上者一箇為什麼略不著眼復以手拋向後云一回心目分明極萬古清光錯過多為什麼分明又道錯過莫將水中便當天上遂高聲喚大衆云可惜許上堂豎拂子云盡大地四聖六凡總要出者箇不得祇是不許覷著覷著即禍事生不覷著跛鱉盲龜一時拽脫十字街頭逢觀音三家村裏趁彌勒一聲社鼓喧天卻原來白廟前大王慶節遂拍手云呵呵呵沒交涉上堂豎拂子云人人盡有者箇消息為什麼不會雖然不會三世諸佛亦祇得噤口縮項讓他出一頭地祇是他奈何不得及乎奈何得又不相似汝諸人作麼生折合以拂子書空作旵字云若無增上慢人方便有分上堂一從攪動干戈後戡定中原匪太平回憶桑麻雞犬日十分難復舊時情大衆舊時情作麼生以拂子拂一拂復左右顧云若將容易得定作現成看上堂古人道在眼曰見在耳曰聞在鼻嗅香在口談論在手執持在足運奔識者知是佛性不識喚作精魂華首云識者喚作精魂不識卻是佛性若雷峰則不然識與不識總是精魂為什麼如此我王庫內無如是刀上堂舉法眼捲簾話乃云法眼指簾逐鹿不見山全身入荒草二僧捲簾雖則不奈何佛眼也難睹法眼云一得一失便是老婆心切要且眉毛安在若在雷峰門下總用不著喝一喝云多少人要定當者一喝不得自恣上堂道無所得惟有寡過我世尊在然燈佛所無有少法可得故號大覺能仁六祖大師云但能見已過即與道相當後代善知識亦云兄弟東去西去直須向萬里無寸草處去驀豎拂子云識得拂子三大老性命在者裏橫拖直拽放下拂子云更有一般奇特事梧桐一葉下秋庭長至上堂豎拂子云是陰是陽作麼説箇來復底道理放下拂子云一回夢覺渾忘卻始解今年是去年臘八上堂睹星始覺從來舊萬里雲霄信步歸難忘熟處成孤負爭怪雷峰別有機驀豎拂子云安得不孤負上堂世尊拈青蓮花歷代祖師天下老和尚豎拂子喚作拈花豎拂入地獄如箭射不喚作拈花豎拂入地獄如箭射驀豎拂子云多少人在者裏放過不得上堂山僧平常東邊上西邊下與諸人道什麼如今到者裏又作麼生雖然已被人點簡不少上堂明明開眼見著側耳聽著滿口道著為什麼不會汝若會勘破天下老古錐汝若不會天下老古錐猶較一籌在且道那一籌參上堂大道不曾離寒山霜滿枝特地尋言語回頭錯過伊既已錯過又道不離謂是究竟卻成解嘲簡點將來放過不可諸人且作麼生復左右顧視良久住廬山棲賢上堂師云上下和平古今一致是非共轍生死同條正是白雲萬里豈況更多行腳上士貴在明宗汗馬功高終非王種上堂左右顧云便與麼去過在諸人不與麼去過在山僧過在諸人是山僧境界山僧不知過在山僧是諸人境界諸人不覺山僧境界即在諸人面前諸人境界卻在山僧背後恁麼會去許汝具超方眼若論向上猶較一線道在元旦上堂昨夜三更獅子點頭驚起袈裟嶺一腳踢翻震動山谷哮吼林木各與三十棒發還本處不許動著普告大衆今日元旦且當蓋覆著勿使外人聞此怪事上堂囫圇一句非智所知知亦不得得亦不真不到情盡理窮安知休咎所以從上諸祖唯有默契三腳驢子自解弄蹄六耳獼猴非人能辨直得木馬追風千里匪疾泥牛飲海全渤須乾無量義海百千妙門現前具足眨眼錯過曠劫難逢上堂在處現前不能安住常隨背後必欲追尋即使信手拈來何似埋頭向去命根不斷差別難蠲儻遇其人不消一拶上堂文殊競發千波普賢晴空一亙晴空之競發而不紛千波之一亙而匪寂始信二人同心其利斷金同心之言其臭如蘭且道是甚麼人境界上堂斷惑證真水中撈月安禪入定空裏栽花忘見守知曹溪斥為不解方便夜鐘潭月玄沙謂之生死岸頭過此以往不許汝知動靜顯藏當名何等上堂窮諸玄辨若一毫置於太虛竭世樞機似一滴投於巨壑諸人還知周金剛當時安身立命處麼不可總在黑地裏坐紅日下山燒海底白猿歸洞嘯峰深臘八上堂能睹是人所睹是境若説因睹會心附物顯理黃面老子煞要買草鞋行腳始得既不如是當年睹明星悟箇甚麼霜白滿天清較雪日黃鋪地晃如金蓬頭抱膝何曾徹一碗香麋飽到今你看數百千祀俗氣猶未除在繼住羅浮華首上堂先師開法此地二十餘年幢幡指處龍象駢臻所蒙椎拂記莂祇是山僧與千山去年千山報寂今年先師又見背藐爾一身肩此重擔茲承護法宰官暨各山耆年大衲屬山僧繼主此山念先師根本重地遞代相承不可無統今日升座普告大衆且道合談何事豎拂子云是博山底是先師底是山僧底若道三祇是箇拂子若道一分明博山傳先師先師傳山僧大衆是三非三是一非一把定乾坤一句作麼生道以拂子作相云曹溪一滴無今古華首長空自暗明喝一喝卓拄杖下座上堂悟到十分行到十分始知不曾動著祖翁田地雖然如是猶是田庫翁見識何以故不見道千年田八百主上堂舉六祖大師偈云本從化身生淨性淨性常在化身中性使化身行正道當來圓滿真無窮師云大衆即今語底默底是化身動底靜底是化身那箇是淨性又作麼行正道良久云適來是什麼乾矢橛切忌作語默動靜商量不商量金井潭邊古石梁上堂舉僧問趙州學人乍入叢林乞師指示州云食粥了也未僧云食粥了州云洗鉢盂去其僧大悟師雷者也是平常人事我問你答悟在那裏尋常佛殿裏僧堂前廚庫三門汝諸人茫然處即諸佛悄然處且道茫然底受錐劄悄然底受錐劄待汝緇素得出鷂子過新羅繼住海幢上堂海幢剎竿先師豎未久忽爾倒卻今日承諸護法暨各山諸上座請山僧繼主此席山僧特來了先師未了公案且道先師有什麼未了公案目前殿宇待新堂寮待備百廢待舉豈不是先師未了底事緇白諸公深淺大小機感隨時豈不是先師未了底人驀豎拄杖云祇如者箇有什麼不了大衆乾坤上下山川流峙世運興衰人事得失從上來有什麼道處無端指注全是全不是全提半提還當得宗乘事麼今日不免為先師當衆説過卓拄杖上堂豎竹篦子云與麼自救有分若論宗門下事未夢見在然古人往往以此示人教你與麼悟不是便與麼去到者裏伶俐始得今時具者箇眼不道全無祇是少汝諸人參學一番大須皂白毫釐有差過重山嶽上堂臨濟下克符道者嘗有偈云儂家住處豈堪隈炭裏藏身幾萬回不觸波瀾招慶月動人雲雨鼓山雷甘露滅謂與價祖五位君臣折合還歸炭裏坐同一旨趣非苟然者後代兒孫競以臨濟洞上互相低昂真可一笑海幢也有一偈與諸人助參一句當塗絶古今門門有路莫沈吟烏雞久在煤山裏祇要渠儂鐵石心上堂此事如夢得覺如久病得良醫如重霧日初出如在巨浸中得筏如夜行中塗獲炬如叢人中認得所生父母實實有與麼事不是道理思量所詣到得與麼猶是一期之説須知更有亙古亙今一句良久大衆禮拜起首座出衆云者一句不是亙古亙今師以竹篦子擲案座便退上堂祇麼是法身邊與麼是法身向上者箇是雲門三句臨濟三玄那箇是洞上五位溈仰三生法眼根境一一打合得圓滿無滲漏正是病深不可救藥大死一回卻活轉來始知三頭八臂神出鬼沒是什麼間事驀豎竹篦子云病也病也還掙扎得出麼就者裏大有奮迅三昧祇是不許人知以竹篦子擊案上堂豎竹篦子云有什麼指示祇是你不肯承當大須知有從上立地處莫祇向迦葉門下淹沒咦者箇眼如優鉢曇華此宗安得不濫浴佛上堂未離兜率已降王宮未出母胎度人已畢且道淨飯王宮中果有悉達太子麼當時睹史多天又什麼人説法作麼生説箇未離已降底道理卓拄杖一下云此非你諸人明得底不如禮拜了退繼住芥菴結夏上堂九十日待汝構取且構取箇什麼古人云護生須用殺殺盡始安居豎竹篦子云者箇作麼生殺以竹篦擊案云若不揮劍漁父棲巢上堂無身有事超岐路無事無身落始終大衆作麼生是無身豎竹篦子云莫向者箇會作麼生是有事不可總無者箇然雖如是是什麼熱碗鳴聲便擲下竹篦子上堂一拳拳倒黃鶴樓一等拳頭祗是勞而無功一踢踢翻鸚鵡洲大好腳尖不知退步有意氣時添意氣也是虛張不風流處也風流面毛長三尺大衆批判便批判了也若是芥菴又作麼生良久云四卷楞伽遮老眼一聲彌勒到新秋上堂南泉斬貓歸宗斬蛇喚作斬貓斬蛇入地獄如箭射不喚作斬貓斬蛇入地獄如箭射畢竟合作麼生豎竹篦子云竹篦子還入地獄也無險師誕日上堂任性出興非一異但隨方便説緣生饒君高具摩醯眼不許當途涉謂情大衆既不許涉謂情即今事作麼生上堂盡大地在烜赫虛空裏總無一箇知恩設有知恩不免旁觀竊笑且道解笑者是什麼人以竹篦子指露柱云大衆莫輕覷他上堂一四七臘月梅花寒徹骨七四一海底燈籠光蔽日一種風流兩處看間殺東村王二十呵呵呵有利無利不離行市除夕上堂世間做年多用水牯牛芥菴亦有一頭要與諸人度歲祇是老漢不解宰割且請大衆著力豎竹篦子云宰割一任宰割但不許傷他皮骨汝作麼生下手若下手不得莫道芥菴淡薄上堂豎竹篦子云者箇決定不從蔥嶺將來為什麼達磨祖師未航海以前并無人道著既航海後還有助揚底道理麼放下竹篦子云啞子喫黃蓮又云三斤麻一匹布良久云咦有什麼交涉住丹霞上堂天然自是住丹霞今古殊同驗作家遠岫千層朝座直平江百里繞門斜大衆還鑑賞麼若乃鑑賞不妨入得丹霞門升得丹霞堂大衆即是山僧山僧卻不是大衆其或未然日日丹霞同門出入同堂上下山僧即是大衆大衆且不是山僧與麼舉揚猶是門庭施設山僧三十年笑具且從今日止須知深山裏更有好商量麼帶霧鋤雲去穿蘿擔月回卓拄杖一下元旦上堂元正啓祚萬象咸新山川新草木新氣運新人事新且道拄杖子還有新舊也無若無舊安得有今日若無新今日相見底豈不是大衆祇如新舊不到一句又作麼生豎拄杖云山僧年邁離伊一步不得浴佛上堂一切法不生一切法不滅隨緣現世間如鏡花水月當生實不生當滅何曾滅靈山尚儼然丹霞如是説驀豎拄杖云大衆還見麼如來世尊在汝諸人面門出入為什麼如聾似盲今日復在丹霞拄杖頭與汝諸人相見未證據者請看復卓拄杖云大衆還聞麼既聞矣更不聞既見矣更不見見聞如空華萬法了一電突出大好山滿目難分辨更擬問如何惡水當頭濺喝一喝上堂去年雷峰夏九十今夏丹霞一百二一任諸人顛倒顛跳不出雲門乾矢橛乾矢橛棒頭有眼明如日打得著驪龍拗角折打不著木馬追風疾上堂一二三四五六水邊林下千足萬足一回喫撲青黃赤緑切忌撞著孟八郎打你驢頭嚗嚗何以故黑漆盤裏不分麥菽長至上堂內含陽曜外積陰霾仁智見同百姓日用天地蔽塞元氣潛藏人事希夷萬機休謝大衆安住正在此時一念瞥興轉見淆亂上堂卓拄杖左右顧云元是舊年人卻看新曆日曆日年年新儂渠刻刻故既刻刻故為什麼總向新年新月新日裏相見一輪紅曜安知歲鏡裏森羅不是空上堂維摩居士入不二法門東坡嘗有頌云譬之蠟炬作鐙燭不以火點終不明乃至維摩默然處三十二説皆光焰妙喜老人謂其筆端有口善説法要老僧看將起來也只是隨邪東坡祇肯維摩默然處殊不知三十二説總是火各各光焰不相假借丹霞今日亦有一頌譬之丹霞竹坡竹千竿萬竿高凌虛昨夜一竿風吹折以尺量來五丈餘且道與古人相去多少師誕日上堂一切人有二種想一世諦流布想二倒想一切聖人有世諦流布想而無倒想我丹霞老僧隨世諦流布説今年六十有一説今日十月十四內外諸公隨世諦流布都來與老僧慶生老僧亦隨世諦流布受於供養禮拜是老僧與諸公總在世諦中還有第一義諦麼若有世諦而無第一義諦是凡夫法若舍世諦別有第一義諦是聲聞法若即世諦即第一義諦是菩薩法若就目前不是世諦亦非第一義諦任心所擬隨緣即宗無有是非亦無無是非之量是如來法我衲僧家又作麼生卓拄杖一下云大衆會麼老僧六十一年前祇與麼來即今亦祇與麼盡未來際亦祇與麼若在者裏構得不妨與四聖六凡同入老僧無量壽海目前無有諸人此間亦無老僧縱目所視縱耳所聽縱口所説不知誰之所為而佛事周圓法音普遍且道是甚麼人境界歲歲高山青突兀年年流水緑潺湲浴佛日上堂好好箇太平世界無端撞入淨飯王宮大怪小驚當時建立且道建立得箇什麼後來韶陽老子極力推倒且道推倒得箇什麼都來丹霞手裏一捏粉碎會麼不識赤鬚鬍依然鬍鬚赤卓拄杖住歸宗上堂剎竿依舊毒鼓從新祖令親行魔外潛息然燈身前不容擬議迦葉門下許有激揚一句根由當衆決擇問答畢云天清地寧江深嶽峙風動雲起晝朗夜昏聖主垂衣良臣補袞四民浩浩百氏騰騰現成公案還有指示也無若無指示老僧堪作甚麼若有指示大衆何曾具足所以遇賤即貴寶几珍御豈是元無遇貴即賤白牯狸奴應非別有揖搦並用貴在當機從上真宗祇言仍舊恁麼也不得不恁麼也不得恁麼不恁麼總不得石頭極口在仍舊上猶為指蹤極則之談我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時道揚眉瞬目者是揚眉瞬目者不是馬祖用盡氣力亦不過在仍舊上虛縱虛奪臨濟得大愚點破始解未到黃檗時消息俱胝得天龍一指受用平生末後在童子指頭上施全殺手段顯全活風猷亦不過在仍舊上善為去就始知直下承當錯過不少翻身跳出轉見無端直饒三頭八臂鼻直眉橫到者裏總要喫歸宗痛棒始得且道歸宗又作麼生卓拄杖云將此身心奉塵剎是則名為報佛恩下座上堂正月已過二月初來諸人箇箇委悉惟有拄杖子總沒分曉且道委悉底是沒分曉底是全是全不是卓拄杖云道士帔白襴知非真措大上堂舉破灶墮云鏡凹照人瘦鏡凸照人肥不如打破鏡還我舊面皮師云大衆如何是鏡現山河大地者如何是人山河大地且道鏡作麼生打破面皮作麼生還舊卓拄杖一下云會麼霜天月落夜將半誰共澄潭照影寒上堂歸宗斬蛇若作舉鋤下鋤會大似釘樁搖櫓若作一斬兩斷會大似劈破虛空不可但道箇南斗七北斗八便當得既當不得合作麼生上堂文殊三處過夏有一句子要人信迦葉欲行正令有一句子要人疑疑句即信句信句即疑句疑信裏錯過疑信裏薦取呵呵呵日出衆峰青雲深不知處上堂端陽到來了文殊普賢觀音在拄杖頭諍論佛法各持一説如鬥快龍舟相似汝諸人為老僧捉下有功者賞有過者誅咦總是有過且作麼生誅喝一喝云狗銜赦書諸侯避路上堂譬如明鏡現衆色像像不入鏡裏鏡不到像邊而森羅宛然空明自爾到者裏須知數點平田白千株東嶺青豈不是諸人分上黃鶴樓詩猶未輪到你題在上堂舉百丈野狐因緣師云不落天上月不昧庭前花花月不相到分明在目前在目前移床就月共花眠還會麼不會明日普請與大衆再説一過上堂盡十方三世都來是箇無孔鐵鎚用得便用沒更絲毫頭與你為緣為對若要覓箇縫兒有所牽挽大似日下孤燈添得多少光焰不如當下撲滅豈不痛快卓拄杖一下云快快上堂龍女成佛善星生墮箇裏不曾間隔毫釐又宛爾一起一倒為是道眼明昧為是業果懸殊良久云幸自無人祇對喝一喝至棲賢上堂赤眼常因刺史李渤初住棲賢後居歸宗傳燈載歸宗智常禪師老僧二十年前亦因燈巖文公曾住棲賢後付法子覞長老繼席今來歸宗重得相過承覞長老啓請升座置得一語要問大衆祇如智常禪師住棲賢時住歸宗時所有舉揚與老僧前住棲賢今住歸宗正當過此為大衆鼓兩片皮且道是同是異若道是異人隔數世地距數十里而道無古今道無遠近若道是同同在甚麼處卓拄杖一下云會麼東海龍王打鼓西海龍王撞鐘金輪峰頂霹靂一聲玉淵潭裏淙淙晝夜兩山衲子你來我往摩肩接踵聚頭付耳畢竟明得箇甚麼邊事于此折合歸宗即是棲賢棲賢即是歸宗主即是伴伴即是主主伴即是拄杖子拄杖子即是箇甚麼五老峰高猶在後七賢聯峙且居傍卓拄杖一下結制上堂從上來事諸佛無開口處豈更有指示于人歷代祖師天下善知識橫説豎説祇是發揮者箇道理大衆既開口不得指示人不得又發揮箇甚麼卓拄杖云會麼昨日有人從嶺上來不得五羊信江淮一帶四五十文一斗粟飯袋子還有向廬山死灰裏爆出麼現前一衆幸無枝葉九十日內老僧不教你參禪不教你學道祇要你二時粥飯不咬破一粒米堂裏堂外往來出入不踏著一寸土張眼不見色人不喚你作瞎漢側耳不聞聲人不喚你作聾漢已後天下無奈你何還肯麼肯則歸宗今日失利擲下拄杖云賺殺廣南蠻長至上堂一陽來復萬象從新一陽即是萬象此日全彰萬象不是一陽本際無二從此日去為聖為賢即易從本際來為愚為凡即難何以故日有投江影水無留月心
