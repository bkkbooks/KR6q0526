body:
  text: 嗣法門人今辨重編普説除夕普説今夕是除夕盡一年之日謂之除古人比之人之死日盡一人之生謂之死所以道臘月三十日到來一年自正月初一日起直至除夕那一年有無得失至除夕交結明白過此夕便是來年事人生自出胎至捨壽那一生善惡苦樂至死日交結明白過此日便是第二生事古人又道臘月三十日到來你作麼生做手腳正説我和你未到死日一切善惡猶有轉變所當勉力不可臨時著忙若到死時入悶絶位便要做主張不得從悶絶位出又有中陰後陰既隔了陰便同醉夢正如人今生不能復憶前生底事你作麼生措辦一切衆生遇得良友善見善聞以此見聞在順逆境便會生起那欣慕警懼底心一般做起善事來祇是後來遇著惡友那惡知惡見便會把前時善心一退退沒了謂之為善不終那做惡底打頭亦祇遇著惡友發起愛憎便會為惡若是遇得好人聞得些子因果干係一回回頭便會向聖賢路上此皆現生現知現見不似他生難做手腳大衆何不趁著色力康健祇消得你一念憬覺那一念憬覺不但把一生底業緣一劃劃斷就是無始劫來千生萬死一切業緣亦祇在者一念憬覺如湯沃冰大衆一生如是千生萬生亦祇如是總由迷妄起諸過咎迷自己覺念合一切塵緣妄起惑業如夢如幻都不可得雖不可得而此迷妄馳逐不已不能自返要待緣起若能藉良友因緣忽然憬覺此一念憬覺能滅三祇業因最是有力不同迷妄隨境顛倒無有真實大衆然雖如是儘有一般憬覺不過幾時便見退失你道病在那裏祇由你不曾向自己根源上徹底識得所以不能立得那決定底心大衆作麼生是根源根源又如何徹底大衆者事不得容易亦不可作艱難想老僧今晚打開寶藏任諸人趁販不必定要十年五年你若伶俐驀直向前老僧看你立地構去大衆祇如諸人現前遇著寒你便知去穿衣飢便知食飯逢人贊歎你便生欣喜被人呵責你便生煩惱者一段明白靈妙不是我有你沒底就是三世諸佛歷代祖師古今善知識亦不曾多了你分毫祇是你從來不曾一日識取祇管將者靈妙底心向外邊境緣上生愛生憎妄取繩縛于今若肯回頭向那知寒知暖知好知歹底一回承當不教你更有等待是你此心從無始來千生萬生在六道三塗中千般惑業萬種升沈到于今不曾少欠者知寒知暖知好知歹底與老僧無異與諸佛諸祖無異你祇須直下承當直下體認你者箇明白靈妙之心從本以來與一切境界元不相到一切境界埋沒你不得一切境界流轉你不得你既徹底識得那根源了便當就那根源上立一箇決定之心大衆那決定之心又如何立你豈不是徹底識得那根源本不與一切境界相到你于今就當隨順著那根源決定不與一切境界相到你豈不是徹底識得那根源不為一切境界埋沒不隨一切境界流轉你于今就隨順著那根源決定不為一切境界埋沒決定不隨一切境界流轉者箇喚做頭正尾正古人云有頭無尾終是不貴便是者箇道理達磨云行解相應名之曰祖解到十分便能行到十分行到十分方是解到十分所謂以始覺合還本覺本始合一無古無今不同莽蕩妄招殃禍大衆你道于今説禪底差別在那裏他一般説徹底識得根源他一般説識得那根源不與一切境界相到不為一切境界埋沒不隨一切境界流轉説便説了到得境界當前一般從前起惑一般從前作業既有惑業難逃苦繫大衆那一種人弄到差別境上他還不肯慚愧更説道我雖到差別境上亦元不與我根源相到那一切境界埋沒我不得流轉我不得是亦便是祇如今世間作業底人亦未嘗與那根源相到那一切業緣埋沒得到那裏流轉得到那裏祇是目前奈何不得一切衆生業緣如夢如幻因既夢幻果亦復然雖然因果同是夢幻若無一回真實著到一回決定倒斷那無始俱生不與你一時干休你者虛知虛解亦同夢幻與那無始俱生抵敵不過所謂道力不勝業力也似者等亦説擔荷如來豈不慚愧大衆從來歷代祖師古今善知識不是別有長處亦祇是徹底識得那一箇根源不與一切境界相到便直下隨順決定不與一切境界相到徹底識得那一箇根源不為一切境界埋沒不隨一切境界流轉便直下隨順決定不為一切境界埋沒不隨一切境界流轉於一切日用自既如是以此為人亦復如是逢人問著如何是佛便云麻三斤如何是祖師西來意便云庭前柏樹子者箇正是從徹底根源上立決定心一箇大榜樣也于今人聞説麻三斤庭前柏樹子他便作一箇不思議會或作現成會或作隨處都是會或作全身裏許會你説恁麼見識亦當得徹底麼既不徹底遇一切差別境界自然露出手腳所謂佛法與身心打作兩橛你諸人行腳一番須要具眼遇著真實去處切不可錯過真實師友難得好山水難值于今既聚在一塊大須努力老僧不要你參什麼禪不要你學什麼道祇教你自己將現前知寒知暖知好知歹底那一箇直捷根源直下承當你試體究看你無始來至于今日祇有者一箇靈妙底心經不可説不可説生死升沈不曾少欠毫釐你者知寒知暖知好知歹底元不曾與一切境界相到既徹底識得你便隨順他決定不與一切境界相到你者知寒知暖知好知歹底元不曾為一切境界埋沒不曾隨一切境界流轉你便隨順他決定不為一切境界埋沒不隨一切境界流轉者一箇徹底決定底心源不但了卻者一生生死直教無始劫來百千萬億生死一時了卻就把者了一切生死底心正要你向一切生死海裏頭出頭沒建立祖宗一切法門為一切衆生開百億方便如水中月如鏡裏華無出無沒無染無雜入三塗六道為一切衆生作了因不作生因乘願力不隨業力你若自不能了如何了得他人迷情未盡於三界內一定無自由分莫開大口瞞老僧不過底老僧祇教你在根源上徹底立一箇決定心祇將此心無有不辦即將此心入一切生死做出一箇華嚴法界來大衆你看那華嚴菩薩十信滿心且道信箇什麼亦祇是信得箇自己根源徹頭徹腦就者根源上立決定心便入住位經云佛子住此地即是佛受用常在於其中經行及坐臥所以十住初心便與佛齊了無階級你道為箇什麼祇為者一箇根源十方三世一切如來同行同住同入一切法界作一切佛事更無差別若入住位便起行向以理入事還向於理事理交融步步實踐如入十地從初至十悲智相扶把自利底事向利他處圓滿卻把利他底事向自利處融釋至十一地全悲無智直至成佛以後一切行願皆從悲起十方三世一切法界無聖無凡無自無他無延無促無不是普賢行願處無不是普賢放身命處你説到者田地轟天轟地不是神通變化亦非法爾如然卻元來祇是我和你于今現前一箇直捷根源更無他事到者裏實無華嚴境界可得亦無什麼悲智亦無十地境界亦無行向可得無有住與不住信與不信亦無徹底不徹底決定不決定亦無説與麼事底亦無聽與麼話底大衆今夕是除夕各各向衣鉢下坐地報鐘起來與你新年相見只是還有一句遂豎拄杖云切不得動著者箇卓一卓解夏普説老僧兩三月來強半是患舌瘡少與諸人説話今日自恣且問諸人還曾構得者箇事麼若道一切現成豈不一夏虛過若必有所構作麼生又説箇本有大衆本有本不有本無本不無本無本不無所以鹽官道一切衆生皆有佛性本有本不有所以溈山道一切衆生皆無佛性到者裏伶俐衲僧不難識解依通然須悟始得昔我世尊拈青蓮華在百萬人天中顧視大衆且道是何等徽猷古今商量都向舉起處會金色頭陀破顏微笑又向笑裏承當此豈不是解後來阿難尊者問迦葉尊者云師兄世尊傳錦襴袈裟外別傳何事迦葉喚阿難阿難應諾迦葉云倒卻門前剎竿著于今人也都在迦葉喚處阿難應處作箇直捷根源謂有者箇直捷根源卻教向目前動用裏流通去所以道倒卻門前剎竿著若果如是為什麼趙州有僧問云學人乍入叢林乞師指示趙州云喫粥了也未僧云喫粥了也州云洗鉢盂去他何曾有什麼直捷根源亦便就目前動用處指示有底卻云直捷根源即在目前動用裏目前動用也即有直捷根源又引青原行思禪師見六祖話當時行思禪師初到曹溪便問當何所務即不落階級曹溪云汝曾作什麼來思云聖諦亦不為曹溪云落何階級思云聖諦尚不為何階級之有曹溪深肯之大衆你看聖諦亦不為正是沒量大人八識一刀底手段你若在者裏下得那一刀便能一切時一切處一切念直得自由自在蕩蕩無礙于今人卻道聖邊事拈過一邊直教他在目前聲色裏倒臥橫眠始得又和會僧問青原云如何是祖師西來意原云廬陵米作麼價豈不是目前一句子囫圇無你思量處無你站腳處又引證石頭示藥山云恁麼也不得不恁麼也不得恁麼不恁麼總不得者便是一句子目前囫圇不可思量不可站腳底道理所以藥山不會後參馬祖祖云我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時道揚眉瞬目者是有時道揚眉瞬目者不是一時言下豁然此正是囫圇一句子在目前動用處點睛飛去也又云石頭是箇人境俱奪馬祖是箇人境俱不奪總與麼批判且道有什麼妙悟處又引睦州有僧問云以一重去一重即不問不以一重去一重時如何睦州云昨日栽茄子今朝種冬瓜又是目前一句子囫圇話了也大衆我丹霞以一重去一重絶無其人不以一重去一重滿目而是何以故茄子今年種得遲冬瓜秋後看大慧云茄子一任諸人橫咬豎咬冬瓜上試道將一句來我丹霞茄子冬瓜總任諸人橫咬豎咬祇是要下口不得大衆既總任諸人橫咬豎咬為什麼卻下口不得作麼生是下口不得底道理不可亦是目前囫圇一句子麼莫總作與麼解會解一任你解祇是無利益為什麼無利益大衆悟之與解極相似其實如雲泥之異祇為你作與麼解了二六時中有幾種用不著處那聲色關頭逢著便黏即不黏亦費許多撥置是一又方寸裏生滅亦有許多拈一放一底時節又道理上亦有許多杜撰與杜撰不得一時胸臆放不過底去處者亦是用不著既用不著不可又從頭問人只得推作行履不到噫佛法不是者箇道理古人也有行履底話卻是他悟得底即是他行底行底即是他悟得底未有悟處不曾圓滿卻向行履上圓滿譬如人家有一百畝田饒你耕耘得十分勤力灌溉得十分及時到成熟時亦只是一百畝田底稻子終不成耕出二百畝來人之學道亦復如是汝打頭見處如是饒你精勤踐履亦不過純熟得所見底未有見不圓滿卻靠著行履圓滿所以道打頭不遇作家到老終成骨董作家宗師就是十分老婆他方便裏亦自然有宗門手段你看歸宗當時有僧問如何是佛宗云我向汝道只恐汝不信僧云和尚誠言安敢不信宗云汝便是大衆汝看歸宗又不道汝怎底怎底便是怎底怎底便不是但云汝便是真可謂渾金璞玉不曾有些子逗遛亦無毛頭許剩義豈不是垂手處便有劋絶底道理其僧卻云如何保任可惜一鍋湯被一顆老鼠矢污卻猶幸歸宗始終是箇大人復云一翳在目空華亂墜者一句子從頂門上霹靂一聲直得湊泊無路于今人聞説汝便是卻向五蘊識田裏認箇主宰一認認著向行住坐臥處體貼一回又向古人册子上比量一回自然撞到箇穿不過底所在一定回頭在靜地裏打點潔淨所謂一翳在目空華亂墜喚做悟後保任又引證馬祖云自從胡亂後三十年不少鹽醬卻道馬祖是祖師中過量底他打發此事三十年猶費淨治之力大衆佛法不是者箇道理深山裏清水白米阿誰無分祇要你是箇人你若是箇人自然合他古轍又何勞續鳧截鶴不見南泉云我有一頭水牯牛擬向東溪牧不免犯國王水草擬向西溪牧也不免犯國王水草不如隨分喫些些總不見得大衆汝看隨分喫些些總不見得正是當時南泉悟得底一箇大總持即在一切時一切處得與麼跛跛挈挈他見人家男女不識好惡東溪西溪牽來放去終日不得著便不得已露布箇消息于今人卻説那邊者邊打成一塊要人向黑漆桶裏橫衝直撞撞來撞去撞到差別境界尚不知非卻謂大用現前不存軌則更引什麼古人過量話劋絶向上話殊不知者箇事無有向上向下一向不曾知痛癢底一回掉得自是有箇入處若果有箇真消息他亦自知轉變所謂到家罷問程作家相見一語便知得失不是別有箇什麼喚做向上何不看靈雲禪師當時見桃花悟道便有偈云三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至于今更不疑玄沙云諦當甚諦當敢保老兄未徹在後來有箇老宿云且道玄沙徹也未覺範禪師云靈雲一見不再見紅白枝枝不著花叵耐釣魚船上客卻來平地摝魚蝦你看者箇偈便知作家相見語句自有來由如兩鏡相對更無差互不是只管大話只管掠虛祇如有箇婆子供養一箇老僧二十年當令二八女子送供一日命女子抱住云正當恁麼時如何老僧云枯木倚寒巖三冬無暖氣女還報婆婆云我二十年只供養得箇俗漢遂趁出燒卻菴大衆此作家相見主賓縱奪自然可觀汝若不悟且勿錯解于今人卻道老僧是箇沈空守寂底觀他枯木倚寒巖三冬無暖氣語意可見所以婆子趁出燒卻菴又有解云老僧者話是箇句中無意底如麻三斤庭前柏樹子有什麼移動處祇是者婆子大有出格手段大衆恁麼則佛法有兩般有箇移動不得底又有箇出格底若不如是又成互異且仔細看勿只趁口快又臺山下有箇婆子在臺山路旁結箇草菴接待往來凡有僧問臺山路向什麼處去便云驀直去待僧去卻云好箇師僧又恁麼去也如此一二十年有人傳到趙州州云待我勘過來州便去如前問婆子亦如前答州遂還上堂云臺山婆子我為汝諸人勘破了也大衆且作麼生是趙州勘破婆子處也須向自己本分上折合看于今人都謂趙州眼睛爍破四天下面前不許人站地在就是黃面老子也須喫他一摑説只管説畢竟本分上那裏是不許人站地處莫只管隨人生解若是一向開大口不管落處我且問你祇如琅琊和尚有舉上座來參便問云在那裏來舉云浙中琊云船來陸來舉云船來琊云船在那裏舉云步下琊云不涉程途一句作麼生道舉以坐具摵兩摵云杜撰長老如麻似粟便出後琅琊問侍者云者箇是甚麼人者云就是舉師叔琊便下堂人事云適來莫怪觸犯舉云我在浙中久聞汝名原來見解只如此何得名播寰宇琊云慧覺罪過似琅琊祇麼退屈豈不是輸卻舉上座麼有底云琅琊到是主舉上座只做得箇賓大衆者又是大慧曾道過底于今知解之流多是回人餘唾將為己解試打點自己分上畢竟作麼生退屈處到是主本分上作麼折合莫祇靠人説話自己無自由分大衆此事須是妙悟若論見解莫道杜撰就是有箇理會不到真悟真證不免為作家簡點記得老僧少年曾入一箇保社聞兩僧夜話一箇云真是怪事僧問趙州狗子還有佛性也無州云無蠢動含靈皆有佛性為什麼狗子卻無一僧云你不可作有無之無趙州將出一柄劍光爍爍地汝才覷著便瞎卻汝眼觸著便橫尸萬里前僧云審如是後來有僧亦如是問趙州卻云有又作麼生後僧云凡看語録不可太板煞須是斷章取義汝若到有句又當作一切衆生皆有佛性會才是我當時不覺失笑後問一老宿宿云總不可在有無二字上作道理你只須看趙州舉處就如大隨有僧問劫火洞然大千俱壞未審者箇壞不壞大隨云壞僧云恁麼則隨他去也隨云隨他去祇如壞與隨他去不可亦在者兩句作道理亦只須看大隨舉處我當時不曾回他但肚裏思量果如是則趙州大隨道法亦未見長處于今三四十年了所謂海內名宿大衲見解亦何能出得者箇圈繢可見妙悟之難就如黃檗當時有箇黃面浙子三度問佛法的的大意三度被打你看老婆心切直是沒頭腦無你分雪處無你死活處恁地作略可謂絶諸攀仰于今人卻教人棒下會喚做棒頭指處果爾則臨濟之道掃地而盡安得復有今日又我洞上你道五位在那裏來在價祖過水睹影偈渠今正是我我今不是渠正是尊貴一路虛玄大道無著真宗你若在那裏會得一位即一切位一切位即一位一時具足無有深淺亦無前後就如老僧于今在法堂上有時亦在方丈有時亦在各堂寮你道那裏是深那裏是淺那裏是前那裏是後寶鏡三昧云重離六爻偏正回互此古人借世典相似處令人易曉于今人卻作實法那一爻如何如何者一爻又如何如何引伸觸類不休不歇説到説得玄妙祇是去道愈遠大衆者事不是如此達磨來正要你離言説相離心緣相為何反刺頭入膠盤裏饒爾學過五車才供二筆亦祇是箇讀書人若是祖宗門下未夢見在祇為者箇事極是平等自天子以至編戶各各具足不是我有你無底祇要你直下知他著落筆頭裏筆頭裏著落钁頭裏钁頭裏著落你若知他著落自為為人隨家豐儉不要你勉強外學你若勉強外學者箇叫做捨黃金逐土塊取笑識者大衆者事全貴真悟不道我住山人不重文字到是沒文字底悟得一分便是一分受用且無如許多文字道理障礙大衆悟得底拈來便用得解得極好總是人家屋裏事與你無干老僧在首座寮時曾見一箇老參喚做遍照渠曾遍參黃檗雲門壽昌博山至五六十歲已隱林下渠在博山曾與先師有舊聞先師住華首卻來相看我老僧見他老參常與相過一日坐石偶及云老師遍歷諸大老門殘羹餿飯拈放一邊畢竟還有商量處麼遍云衲子家捨此亦無可語者不嫌絡索試污眼看遂出偈相示卻把二十八宿編成四句我當時讀過但笑遍云不可只笑亦須有箇可否我見他再三再四言色卻是真實便云偈卻是只是汝未是遍云為什麼偈是我卻非聻老僧云公遍參知識耳朵裏聽得多了册子上見得亦多了方寸裏安排亦無有不盡了作偈下語豈復有不妥處只是道人須貴自知不可只管互相瞞昧遍乃定眼看老僧良久忽起合掌云真獅子兒難逃慧鑑真不謬為華首首座矣大衆者箇正是悟與解之別于今人豈真自欺只是我見難忘生怕人説他不會禪咦出家行腳一番圖箇什麼難道者些虛名尚看不破過了一夏又過一夏須臾便是二三十夏轉盼老到即病到病到即死到著甚來由只管馱箇包子到處向人屋簷下覷左覷右何不見有好山水可住只管住有師友可商量只管商量苦死遮頭蓋面有什麼著緊處試思量看珍重普説壯色不停喻如奔馬人命無常過於山水結夏以來不覺不知已過七十餘日老僧足疾久不與大衆相見念大衆大事因緣今日分明普告法華經云諸佛世尊唯以一大事因緣故出現於世云何名諸佛世尊唯以一大事因緣故出現於世諸佛世尊欲令衆生開佛知見使得清淨故出現于世欲示衆生佛之知見故出現于世欲令衆生悟佛知見故出現於世欲令衆生入佛知見道故出現於世大衆作麼生是衆生佛之知見祇如諸人適來聞鼓聲上法堂禮拜拱立聽老僧説法豈不是汝諸人佛之知見佛之知見既是衆生各各具足何用更開正是衆生各各具有佛之知見不能自開不能自示不能自悟不能自入便日日將佛之知見從眼門出為一切色塵之所留礙從耳門出為一切聲塵之所留礙從鼻門出為一切香塵之所留礙從舌門出為一切味塵之所留礙從身門出為一切觸塵之所留礙從意門出為一切法塵之所留礙大衆根塵無知識心自異佛頂經云根塵同源縛脫無二識性虛妄猶若空華六祖大師亦云色類自有道各不相妨惱祇是衆生直下不曾識得自己佛之知見必不能安住降伏于塵境上妄生分別既生分別便起愛憎既成愛憎便有取捨從生至生輪轉不已即我佛亦不能就在六根門頭使之自認何以故衆生沈迷已久雖在目前物我不分動涉塵境故我佛但説六塵是空是苦皆由識心招搖積集使之知苦斷集證滅修道其實為一佛乘故衆生不知方便誤為真實佛之知見卻成聲聞知見説十二因緣説因緣所生法此有即彼有使之離塵寂靜亦祇為一佛乘故衆生不知方便誤為真實佛之知見又為辟支佛知見説六波羅蜜為衆生慳貪心故菩薩以布施度為衆生淫逸心故菩薩以持戒度為衆生粗獷心故菩薩以忍辱度為衆生懶怠心故菩薩以精進度為衆生散亂心故菩薩以禪定度為衆生愚癡心故菩薩以智慧度亦祇為一佛乘故衆生不知方便誤為真實佛之知見于是又為菩薩知見大衆須知自人天聲聞緣覺菩薩總無第二人亦無第二法但於方便中微有所重便成種性豈惟聲聞緣覺菩薩即西天此土一切外道亦不曾於佛之知見外別有所從祇為錯亂修習遂成邪見不見數論師所立冥初生覺覺生我心此覺此心亦非別事祇是不能徹知本源自性真寂滅地無有初終亦無囂寂妄認目前緣慮以有生滅折念歸空泯絶聞見極于冥然以為本所生處還歸于此即此土老子亦云杳杳冥冥其中有精昏昏默默其中有物此之精物即彼覺心此謂杳冥昏默即同冥始總之奈目前不得別取靜默以自依托終成斷滅即如莊子亦是老子之流時人愛其議論出格文章高妙此正莊嚴世論能障正知見先佛所禁曾見十年前有一長老乃以拈提宗門徒見儒門孔子我法判為儒童菩薩便相比例不知菩薩有冥權有顯權所謂冥權者隱其所有而以粳秕因衆生根欲隨時設教此在菩薩內祕外現有如是事而指方便以為真實擇法何在若因時教所宗諂曲媚人以干時譽此心此行路人知之老僧嘗謂據座之人須是徹見法源方許辨別倒正參議權實至于立心猶當正大道人所為脫落名利復何所圖上承祖道下式後昆豈得濫觴至此近見海內禪席所謂見性明宗亦只認目前鑑覺置之聲色如衣敗絮行荊棘中已見敗闕一回憬覺然後提撕即使推向無生國裏豈為究竟如此見識與外道何異更有莽蕩招殃以為一切念皆非他念一切境皆非他境引證經語謂貪瞋癡即是戒定慧大衆此圓覺直指之語須是情窮理盡得大總持方堪覷著法華云佛所成就第一希有難解之法唯佛與佛方能究盡諸法實相所謂諸法如是相如是性如是體如是作如是力如是因如是緣如是果如是報如是本末究竟等大衆一切善法惡法聖法凡法皆有箇實相汝若悟知實相戒定慧且不可得何況貪瞋癡古人説箇貪瞋癡即是戒定慧要人當下聖凡情盡取捨頓忘今人説箇貪瞋癡即是戒定慧祇是隨順凡心恣情生滅楞伽云受淫怒癡性已然後妄想計著淫怒癡性非性明明是箇異色因安得不作異色因果如來説名為可憐愍大衆此事極是直捷極是現成祇是汝一時不肯擔荷便擬擔荷又成錯過不見我洞上價祖當時辭雲巖云他日有人問還邈得師真麼教某甲如何祇對雲巖良久大衆還會麼老僧謂橫亙十方豎窮三際于中世出世間一切理一切事有情無情是法非法總不出一箇良久眼孔定動總沒交涉你看雲巖復云祇者是亦是老婆心切亦是一箇探子果然價祖涉疑巖便云承當箇事大須審細後過水睹影乃有偈云渠今正是我我今不是渠大衆要知者兩句消息即是汝諸人適來聞鼓聲上法堂禮拜拱立聽老僧説法底時節便擬趨向蚤卻不是了也還更湊泊得麼又不見德山一日上堂云今夜不答話問話者三十棒真箇滿口道盡兩手分付一僧才出山便打直是痛快僧云某甲尚未問話和尚何故打某甲山見拏到賊不肯供招卻要他納些贓本便問汝是何處人僧云新羅山云未跨船舷好與三十棒若是者僧在那裏會得蚤遲八刻何況懡㦬又不見南嶽云此事如牛駕車車若不行打車即是打牛即是者箇話真如在千仞洪巖上驀面一推全死在那裏全活亦在那裏馬祖是箇根熟底時節到來如桶底脫相似後來有箇大慧卻云于今人皆云心喻牛法喻車不可除法只是除心且喜沒交涉者又是大慧老婆心切要向人容心處一回剷卻直教攀仰俱絶方堪紹續然雖如是亦只作死馬醫我老僧道自佛及祖天下一切善知識所有多言少語若深妙若劋絶總不曾道著箇事一毫頭許汝諸人還信得及麼就如老僧今日一場忉怛若有伶俐衲僧上來推倒禪床拽向階前痛捶一頓亦怪他不得有麼試出來下手看良久云如無老僧自起還合自倒去也喝一喝云自首免供卓拄杖下座普説吾宗門全貴真悟若不到真悟田地雖説至十成理窮極則要與此事無干我達磨初祖未來東土難道沒有大乘上師麼此皆得教乘祕密各有深證就其發明甚深摩訶衍法與吾宗極口理談亦不能過然轉身向上那一著子畢竟尚須一籌所謂三乘膽戰十地魂驚實非虛語蓋以那一著子非理可詮非意可構故自六祖以後易為機語使人自悟悟則句句皆真詮不悟則言言皆糟粕所以云我説是我底終不關汝事故有同一句子我説則是汝説則不是此豈重欺吾人煞有旨趣不可不諦信也雜華首列十信次十住次十行十回向十地終於等覺妙覺共五十二位豈不是行布儼然無可踰越乃古德云才入信門便登祖位夫歷代祖師傳佛心印與佛無殊而此以一信等無優劣良由雜華十信位中雖具足凡夫便灼然信得決定取佛大菩提果灼然信得十方諸佛不動智與自心無異灼然信得十方諸佛根本智與自身無異灼然信得十方諸佛十住十行十回向十地我亦能行灼然信得十方諸佛三昧十方諸佛神通十方諸佛智慧十方諸佛大悲十方諸佛自在我悉當得乃至信得十方諸佛經無量劫所修功德行滿位齊不移一念具此十心方滿信門李長者云十住初心便登聖性體齊諸佛此皆從十信滿心入住初位故云初發心住便成正覺也于今天下善知識從最初發明此事應與十信滿心無二無別若不確然悟得自心與佛平等一切位中智慧德相於自心中自信自肯其敢妄認法王自取僭竊耶若能自信自肯謂之無神通菩薩蹤迹不可尋何以故祇為他者一著子千穩萬穩腳跟下如水上葫蘆相似按著便轉轆轆地方寸裏豈更有不相應法流至第二念麼須知理與事合解與行齊尚不當事何況更大不見當時有箇亮座主初參馬祖祖問云見説座主大講得經論是否主云不敢祖云將什麼講主云將心講祖云心如工技兒意如和技者爭解講得主抗聲云心既講不得虛空莫講得麼祖云卻是虛空講得主不肯便出將下階祖召云座主主回首祖云是什麼主豁然大悟便禮拜祖云者鈍根阿師禮拜作麼主云某甲所講經論將謂無人能及今日被大師一問生平功業一時冰釋大衆你看馬大師何曾有什麼大法小法與他作解作會只是喚他一聲他便云平生功業一時冰釋者箇便是三賢十地一切神通妙用總在者一喚裏一時具足無欠無餘莫聞與麼道又向虛空裏著橛子自己生事無人能代又龍潭下有箇周金剛平日淹貫性相講金剛經注有青龍疏鈔語同學云一毛吞海海性無虧纖芥投鋒鋒利不動學與無學惟我知焉聞南方禪席氣為不平嘗曰出家兒千劫學威儀萬劫學細行不得成佛南方魔子敢言直指人心見性成佛我當摟其巢穴以報佛恩遂荷疏鈔出蜀途中見婆子賣餅便擬點心婆曰擔底是什麼周云青龍疏鈔婆曰講何經周云金剛婆云我有一問若答得便施點心若答不得請往別處經中云過去心不可得現在心不可得未來心不可得上座點那箇心周無語遂抵龍潭徑上法堂云久嚮龍潭及乎到來潭也不見龍也不現潭云子親到龍潭周不能答一夕侍立次潭曰更深何不下去周珍重便出卻回曰外面黑潭點紙燭度與周才接潭便吹滅周於此大悟便禮拜潭云子見箇什麼周云從今向去更不疑天下老和尚舌頭也來日龍潭升座謂衆云可中有箇漢子牙如劍樹口似血盤一棒打不回頭他時向孤峰頂上立吾道去在周便將疏鈔堆法堂前舉火炬曰窮諸玄辨若一毫置於太虛竭世樞機似一滴投於巨壑大衆者又是第二箇才得者一著子下落便解倒嶽傾湫向無名理處掀翻義海向無言説處把絶咽喉若非親從葛藤窠一回掣斷又安知吾宗門痛快直截大出常情大衆此猶是教中轉入宗乘更須知吾宗機要亦有關捩若不真悟真證得大總持往往於無理可伸無言可對處橫尸萬里又何能獨步丹霄出頭天外昔洛浦在臨濟會下學得箇賓主句便搖頭擺尾向夾山山前盤結草菴目視雲霄夾山知其未了一日遣人致書浦才接得便坐卻更伸手索取其僧無語浦云回去舉似和尚僧回舉似山云他若開書三日後必來若不開書救此人不得後三日密遣人往伺出菴便與燒卻浦不回顧徑抵夾山法堂上叉手而立山云雞棲鳳巢非其同類出去浦云自遠趨風師一接山云目前無闍黎此間無老僧浦便喝山云住住且莫草草匆匆雲月是同溪山各別截斷天下人舌頭則不無爭教無舌人解語大衆洛浦一喝何曾有過為什麼被夾山幾句間言語便自困折畢竟作麼生是無舌人語莫是麻三斤乾矢橛麼須知者一句子亦有差別驀擊竹篦云若與麼會便不是了也又擊云須是祇麼始得不見真點胸在慈明處已稱了事惟善侍者知其未徹一日山行善取一片瓦置石上云真兄你若在者裏下得一轉語便見穩當真不能答遽歸見慈明明云衲僧家當知時節解夏未久便到此著甚死急真云被善兄礙塞人明云來來我問你如何是佛法切要句真云無雲生嶺上有月落波心明遂詬罵云牙黃齒豁猶作者箇見識真淚下交頤不敢仰視明云你問我真理前問明云無雲生嶺上有月落波心真乃大悟言下禮拜汗下大衆者一則因緣是真點胸當時始用得著為伊平日在裏許千不移易萬不移易才問著已自全盤打動更被逼拶十分已死到九分九釐還丹入口全身活轉若是今時師弟子口耳相遞似此等機緣不知幾時早已按下暫聞舉起便與一狀領過且道有什麼交涉所以學人貴得真法器師家方有鉗錘分若真法器最初行腳蚤辦了一箇要了生死底志趣一切名聞利養總不干懷稍知痛癢便從頭打算那裏是我得力處那裏是我放不過處無始俱生習氣那一件是我輕底那一件是我重底境緣到時我還作得主麼若作主不得此事便休題了若作得主箇裏須有皂白試從心窩裏自己體驗果能如石人花鳥麼抑或以理遣情若是以理遣情于今現在佛法裏知休知咎不免尚憑他力若到一口氣不來他生隔陰現今得力底還用得著麼豈不是依前受人差排切莫引古人現成語云天堂地獄是老僧家常茶飯説則由你説説了時自己不妨從長畢竟還是汝悟底不濟事不可但道我行履未到須信悟不徹底無你行履分終日閉著眼坐坐到一箇念頭起來便一箇念頭打發勤坐多幾日心識稍停目前見得恬靜便自歡喜忽然有因緣放下幾時便自不堪似與麼行履行到彌勒下生亦未到你打成一片在大衆不妨平實商量若是大了當人必不如是不謂大了當人便無行履行履自別非汝境界説與汝不得既説不得只得教汝從頭悟去悟到徹底與古人把手同行時一切時一切處自知下落不合問人如或未然且當廣咨先輩不可硬作主張莫道悟不徹即使悟得有來由及乎行處淆訛不少何況麻三斤話尚不知前頭背後便自點胸點額請看風穴和尚居常自嘆云不意先師之道至我而絶時念法華在旁云某甲可人子麼穴云祇怕你放者部經不下華云此亦易事明日穴升座才云釋迦不説説迦葉不聞聞華便珍重下去至晚入室仍命著語華云動容揚古路不墮悄然機適真園頭至穴亦教著語真云鵓鳩樹上鳴穴云你作許多癡福作麼何不看念法華下語大衆鵓鳩樹上鳴一等是箇語話那裏是他作癡福處祇如動容揚古路不墮悄然機語脈亦自可曉且那裏是他長處後來有箇妙喜禪師卻云鵓鳩樹上鳴是箇有殺有活有照有用容易承當不得若是動容揚古路不墮悄然機且要自救還未了在大衆你看風穴妙喜皆是古來大老何故一取一不取且道眼孔在什麼處若向者裏得箇權衡方能批判古今入佛入魔皆有出身之路所以沒量大人自宗明白讀教乘便知言外之旨不為教理所縛辨宗趣便知從上來事不為當機所乘至於大小諸教同異得失或同而實異得而實失無不燎然如數黑白若不如是不但不能垂手他教甚且反為他教之所頇顢附會名言迷罔後學即如莊子云以指喻指之非指不若以非指喻指之非指以馬喻馬之非馬不若以非馬喻馬之非馬莊子本意在即指而會非指即馬而會非馬而乃曰以指喻不如以非指喻以馬喻不如以非馬喻是猶不能即指會非指即馬會非馬若能即指會非指即馬會非馬則何必以指喻不如以非指喻以馬喻不如以非馬喻是其胸中確然見指之不如非指故不欲以指喻而以非指喻見馬之不如非馬故不欲以馬喻而以非馬喻甚矣當生不生之難言也吾教以舍妄求真之非至理故有即妄明真之説豈知即妄明真猶為權示而況尚不至于即妄明真乎所以他教即擬議逼真其説至于即妄明真而止然説不及證以非證則説必不了古人云語證則不可示人説理則非證不了莊子意在即指非指即馬非馬而以指喻不如以非指喻以馬喻不如以非馬喻則豈非其不能親證故其説不圓吾宗門見解暫到而腳跟浮逼生滅流注尚有打發不得去處況他教耶夫他教恍惚聖言實從識解依通確有源本遞代相傳如莊子原本老子老子云常無欲以觀其妙常有欲以觀其徼亦即有而無即無而有之理與吾教不落有無之旨似是而非彼以有無相生此以有無俱遣相去殆百千倍矣不見云窅窅冥冥其中有精昏昏默默其中有物豈非以精物出於窅冥昏默耶是無知能生有知與西域冥初生覺何異則與此土無極生太極太極生兩儀何異由老子而上溯危微精一亦依稀此説故吾嘗謂神農黃帝堯舜之道其初與老子無兩學術後世雜以治道遂有仁義道德之紛然於外至於魯論所謂戒慎不睹恐懼不聞則又從外以原本乎內此孔氏大為儒術之宗也嘗味其誨由以知則曰知之為知之不知為不知是知也夫知是與物相及不知是與物不相及相及不相及皆境也而知無與焉此與吾教離諸分別別有自性豈不相近殊不知知與不知皆為所知為知為不知即屬能知能所必不相離離所存能根塵未脫即為生死根本故楞嚴阿難云而我以心推窮尋逐此能推者我將為心世尊所為咄之曰此非汝心也孔子又曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉此則知前知後所去能謝與吾教覺海湛然常照常寂像來鏡現像去鏡空體固無二然始問而空既叩而竭則未問時依於空寂若離空寂豈不茫然此亦一大關捩正須驗過始得總之諸教聖賢皆從性命自治發心當無是非而有深淺淺者為一世之教為事理函蓋為心境合一為聖凡之別為智愚之分過此以往非其境界矣故吾最不喜諸教附會亦最不喜諸教相非但就淺深各自諦當不獨深者知其淺之非別事淺者亦復知其深之未易造詣孔子云吾見老子其猶龍乎又曰西方有大聖人不治而不亂不言而信所謂既登其堂則必知其奧之尊深也吾願天下人各安其教以求至極然後旁通他教內外始終本末大小虛其心以互相低昂其為廢然豁然者不一而足矣又不但他教即吾宗門亦自有解有悟有證自見不及方能有所大及若恃聰明反成愚拙生死事大時不待人自欺自賺於人何與努力
