body:
  text: 嗣法門人今辯重編小參元旦小參云新年頭佛法有一人道得祇是無舌一人有舌卻又道不得且道者兩人那箇是親那箇是疏皁白得出分付缽袋子小參滿口道出滿口道不出滿口道出總沒爾諸人會處滿口道不出卻又處處分明一任爾諸人退隋且道退隋箇甚麼一任爾諸人承當且道承當箇甚麼請自揣度看依山僧道迷即在悟處悟即在迷處祇是各人因緣未到便奈何不得古人道時節既至其理自彰于今街頭市尾漁歌牧唱總皆十成完具十成奇特叵耐問著便乃突然被人喚做茫茫業識就是久參衲子聞山僧恁麼說難道當下沒有箇見處祇是聲色關頭生死去處猶未免疑懼被人喚做命根不斷大眾爾若者裏放不過便日日在諸佛境界中總沒爾受用處念念在眾生境界中總沒爾消遣處還說甚麼禪道佛法所以我者裏也沒有妙句玄言也沒有向上向下祇要爾知得著落爾若一日知他著落便識古今善知識休歇處原如此古今善知識指示人處也即在此不見香嚴在溈山一日山問曰聞爾在百丈先師處問一荅十問十荅百父母未生前試道將一句來看當時香嚴無言可對及回寮遍搜平日閱過書籍遍尋思平日佛法知見總沒有一句子酬得大眾此正香嚴不肯自欺處若是今時學者早晚呈見呈解有甚麼交涉難道瞞得善知識不過自瞞而已比後香嚴求溈山說破溈山祇是不肯說向他道云我說是我底總不干汝事者又是溈山徹底相為若是今時善知識早晚向他道箇元字腳賺煞人家男女不是溈山恁麼手段又爭得香嚴肯把文書焚卻自嘆云早知與佛法無緣不如做箇長行粥飯僧免役心神去也大眾此正是香嚴偷心死盡所以後來在荒院中因掘地擊竹瞥然踏翻那箇消息有偈云一擊忘所知更不假修持動容揚古路不墮悄然機處處沒蹤跡聲色外威儀諸方遠道者咸言上上機便拈香向大溈遙禮云和尚恩踰父母當時若為我說破安得有今日大眾香嚴到此時方纔洞見溈山相為處及乎仰山一勘再勘總要搖動不得祇為他灼然知得著落所以千差萬別一爐焲盡祇麼田地大不容易大眾還會麼良久豎拂子云聻小參法法皆真法法如幻法法皆真汝諸人擬向甚麼處揀擇法法如幻汝諸人擬向甚麼處執著大眾從朝至暮所作事業繇內及外原始要終曾有一絲毫頭善惡名相到你諸人分上麼祇是諸人自生分別曾有一絲毫頭決定不可捨決定不可取之法到你諸人分上麼祇是你諸人自為纏縛若在者裏悟得直是自由自在日日在烜赫虛空裏坐臥日日在烜赫虛空裏困眠千聖出頭也要覓你蹤跡不得自己亦復不知大眾即今幸自可憐生終日埋頭有何用懸崖撒手自圓成起來正好閒打鬨呵呵呵將謂天然長老元來是箇直儱侗還會麼山僧自離邵武擬還羅浮取道普慶承林德賓居士請遊獅子峰同合寺大眾懇山僧說法山僧固辭不已只得依樣葫蘆隨例顛倒若乃會得十字街頭相逢卻在三十三天上道故如或未然可惜獅子峰頭一場熱鬧卓拄杖小參從來無過暫借迴光纔落思量便不中用以拄杖卓一下云若作恁麼會蚤不中用了也又卓一下云須是與麼始得小參學道之士須求默契漸造玄關若墮理詮遂成湊泊但見佛法身心打作兩截繇來離微縛脫唯證方知陸亙大夫一日對南泉云肇法師也甚奇怪解道天地同根萬物一體南泉指庭前牡丹曰大夫時人見此一株花如夢相似大眾南泉者一句子立地喚回何等快捷後來雪竇頌深得此旨曰見聞覺知非一一山河不在鏡中觀正是打破琉璃碗手段又云霜天月落夜將半誰共澄潭炤影寒大眾還知雪竇親證處麼大似鬧市裏東鄰按拍西鄰喫酒小參舉天衣禪師云雁過長空影沈寒水雁無遺蹤之意水無留影之心師云大眾于今頭頂天足履地山河日月草木叢林城郭人物是非好醜時時有那四句消息何不疾急著眼你若者裏搆得多少省力雖然須知更有向上一路發化主小參今夏結制缺少資糧堂司書記為眾乞米山僧甚喜何以大眾聚在一處日間托缽元是佛制即結夏禁足亦為古道此行萬萬少不得獨大眾安居如何單煩兩公山僧有一句話堪為大眾解嘲家中穩坐底人途中受用途中得力底人家中穩坐若道是一如何菴裏人不知菴外事若道是二盡十方世界要總不離者裏大眾作麼生道還有道得底麼道得底出來好與三十拄杖寧使法堂一丈草免教他日謗山僧小參有不是有無不是無陽燄空花湛然常寂以理會之頓成心境思念想盡方契此宗錯過目前玄妙何益結夏小參驀豎拄杖云釋迦老子在拄杖頭出現了也大眾還見麼釋迦老子出廣長舌遍覆三千大千世界說誠實言是上座還知麼即今大明國裏無有能說法之人亦無有能聽法之眾爾擬向什麼處開口是上座合掌恭敬而白佛言誠如世尊所教人亦有言不因紫陌花開早爭得黃鶯下柳條世尊當時百萬人天中拈青蓮花豈不是者箇意旨是上座與大眾結夏安居僭登寶座亦不過者箇意旨若使一向爭知有恁麼事世尊乃破顏微笑曰因我帶累爾然須具得那一隻眼方有出頭分何以如此癡人前往往說夢不得故我此說本無所說現前大眾亦所不聞還賴是上座傳宣無令斷絕大眾是上座今日為世尊作一箇傳語人汝等當直會其道勿記吾言取障自心卓拄杖小參佛法因緣大有時節毫釐之差天地懸隔大眾作麼生是佛法時節就如今日端陽初五已前懸想者一箇時節豈不儼然畢竟不是端陽初五已後回想者一箇時節豈不儼然畢竟不是端陽何如正當初五念想俱息食角黍飲艾酒觀競渡下蓮舟人人如是家家皆然且道祇麼時節還有疑議否即此不疑議正諸佛之所護念百姓日用埋沒多少仁智見病錯過多少殊不知石火電光之中纔落佇顧便成差互驀豎拄杖云大眾穩踏龍船頭正好放身命莫貪標上錦失卻手中橈然雖如是古人又有言恁麼道則易相續也太難山僧當時被者兩句子喫了一驚于今看來大好笑倒遂以拄杖右邊卓一下云有甚麼難又以拄杖左邊卓一下云有甚麼難復云腳跟紅線斷隻隻摩天鷂喝一喝小參大道無道大心無心大意無意大言無言先聖舉似貴會其宗若有持循總歸生滅何以故此事如鏡裏花如水中月如水上泡如蜃樓如海市如影如電如夢如空中響應勿得言其有無虛實又如兔角如龜毛如石女兒如露柱懷胎如鐵船浮如海底火發勿得言其有無虛實又如木棉花如山中雲如草樹如巖壑如澗如城市中男女如善惡是非一切巨細公私諸事勿得言其有無虛實若在者裏腳跟穩踏也須另開眼孔別立生涯方能於凡聖叢中不見一法不失一人出入縱橫非常可測即山僧日前有所指陳皆為曲就若論向上未有其機是以古人云我若一向舉揚宗乘法堂前草深一丈須倩人看院始得今日還有人為山僧守院麼方丈後座屋壁疏漏尚蚤補緝著莫待來春雨淋頭小參思而知鬼家活計學而就二乘證修何似我祖宗門下人人古佛步步通玄但要汝行便行住便住坐便坐臥便臥語默動靜俯仰折旋總莫解會更不安排倘或時節一到全局贏來便與十方諸佛把手同行靈山一會儼然未散若猶未也十方諸佛與汝把手同行汝開眼也觀音恭承舉念也普賢祇候伸手觸翻文殊舉足踢倒彌勒驚起東海龍王呵呵大笑且道笑箇甚麼笑汝諸人鼻直眉橫眼深口闊饑來思食困則打眠山僧從旁忍耐不過纔與他道天下那有饑不食困不眠底人麼山僧還讓他一籌在東海龍王只得忍氣吞聲回宮去也大眾適來山僧為汝諸人出氣且汝諸人分上作麼生出氣速道速道小參今朝共慶端陽節不覺依稀又半年眨眼韶光容易過因緣大事倩誰肩大眾還知麼此事直如競渡若也會得千秋萬劫只在目前若也不會萬語千言還同說夢山僧今日說夢也大眾又作麼生復示偈云鱗甲威獰在目前幾人於此獨茫然分明舉掉波心險不覺回頭浪八千小參汝若為目前回換則不可不說別有汝若不為目前回換則不妨說無別有所以聲色有汝汝無聲色聲色之中無汝汝在聲色之中譬如鼓無鐘聲鐘無鼓響鐘鼓互交參聲響不相雜若能如是方便喚做塵中能作主句外絕離微若是向上全提猶欠一著且道欠那一著道道小參靈光獨曜迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛驀豎拂子云百丈大師來也諸人還見麼諸人莫聞大師言句便道會了解了大師當前覿面錯過放下拂子良久云適來許多葛藤向甚麼處去也坐久成勞不如散去小參今日七月十五十方諸佛同此自恣雷峰一眾亦同此自恣承現前護法檀越居士大德廣作供養請山僧登座說法且問山僧未登座已前作麼生如今登座又作麼生山僧不知大眾不是山僧大眾不知山僧不是大眾驀豎拄杖云拄杖子不知山僧與大眾不是拄杖子拄杖子亦不是非拄杖子亦不是畢竟是箇甚麼復橫按拄杖云眼見如盲口說如啞衲僧鼻孔大頭向下若也會得別有佳話若也不會他家自有黃金價黃金價無真假不見溈山水牯牛五字分明在脅下喝一喝元旦小參年新月新日新風旛堂亦新訶林與大眾遘此一會心目豁然各各將謂自無而有慶快生平亦還知年年此年月月此月日日此日昔之風旛堂今之風旛堂曾無得失豈有去來只是一向埋沒人間遂使年年月月日日可望而不可即知之而不能親到今日時節到來不待希求還其本有訶林與大眾據座底據座圍繞底圍繞說底說聽底聽坐臥行住俯仰周旋總在其中念想頓息所以道雖然舊閣閒田地一度贏來方始休贏底事且置作麼生說箇休底道理良久云目下重修莊嚴沿門打募土水經營全仗諸上座諸居士努力卓拄杖雷峰範銅世尊像小參山僧有一句子請問大眾古天然燒佛煨寒今天然沖寒安佛且道還有差別也無若說有差別古今不可有二道也若說無差別分明用處各異作麼說箇無差別的道理驀豎拄杖云會麼放下拄杖云彩雲影裏仙人現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇咦孟八郎又與麼去也元旦小參去年元旦風旛堂與諸人相見底即今年元日月林堂與諸人相見底今年元日與諸人相見底又即年年月月日日與諸人相見底山僧見底又即諸人見底諸人見底又即山僧見底山僧與諸人相見底又即山僧與諸人不見底所謂一步不動而遍歷道場隨緣赴感而長處此座於此會得如來禪敢保諸人委悉若是祖宗門下未夢見在且道祖宗門下又作麼生喝一喝云一人頒夏曆萬國奉春王卓拄杖小參僧問趙州萬法歸一一歸何處州云我在青州做一領布衫重七觔大眾還會得者一句子麼者一句子殺活齊行賓主一致會得者句子我山僧道十方三世一切諸佛或顯或密或權或實說五乘三藏十二分教也只做得者一句子註腳一切諸大菩薩聲聞緣覺得種種三昧持種種法行獲種種智也只做得者一句子註腳一切眾生有迷有悟有向有背凡因聖果善惡升沈三界六道輪轉無已須知盡向者一句子裏一咬百雜碎乃至山河大地日月星辰飛潛動植情與無情盡法界性包裹無餘也只消者一句子一印印定更無長短出沒成敗延促大眾還會麼即汝諸人行住坐臥夢時醒時語時默時無一事無一處無一時無一念無不現前無不具足者一句子著落無不是者一句子註腳還信得及麼我世尊說法四十九年最後拈青蓮花於百萬人天眾前大眾當知世尊舉處卻不許人向舉處會阿難問迦葉尊者世尊傳金襴袈裟外別傳何物者召阿難難應諾者云倒卻門前剎竿著也當知尊者道處卻不許人向道處會汝若會得便會得者一句子著落後來達磨初祖至我東土向少林九年面壁汝看他嘴都盧地不是無語且道語甚麼汝若會得便會得者一句子著落後與可大師道外息諸緣內心無喘心如牆壁乃可入道及至可大師云我已息諸緣祖云莫成斷滅去否可云不成斷滅且道既息諸緣因甚不成斷滅祇此不成斷滅底還有許多外緣內心息與不息底道理麼豈不勞而無功饒汝會得也只是者一句子註腳青原見六祖道箇聖諦亦不為既聖諦亦不為還假到曹溪作麼南嶽見六祖道箇說似一物即不中且道不似一物似箇什麼合作麼生道又云修證即不無污染即不得大眾既污染不得還修證箇甚麼空拳裏搦甚麼汁何不特地管取你作得者一句子註腳我石頭道恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生大眾他道恁麼也不得不恁麼也不得恁麼不恁麼總不得儘好了為甚麼老婆舌頭又道子作麼生石頭意在那裏縱饒會得也只是者一句子註腳龐居士問馬大師不與萬法為侶者是甚麼人馬大師云待汝一口吸盡西江水即向汝道山僧道馬大師好一箇大口只是不知慚愧大眾還曉得馬大師不知慚愧底大口麼也只是者一句子註腳南泉云三世諸佛不知有狸奴白牯卻知有山僧卻喜王老師見大不怕見小不欺只為他深悉病由大眾作麼生是王老師深悉底病由汝若會得不妨識得者一句子著落乃至五宗分派我洞上弘開五位末後道箇虛玄大道無著真宗須知位位中全具者一箇消息不是教汝杜譔長老逐句分疏支離配合卻回來自己大總持上總無理會處道是正偏回互理事交融做箇座主使下即得還與綱宗有交涉麼諸如臨濟三玄三要四料揀須知面目現在雲門三句不是強作法眼六義豈為區區溈仰九十七種圓相雖則大珠小珠落玉盤在作家分上一擲粉碎卻來伸手問你取還會麼大眾饒你一家家宗旨透脫都只是者一句子註腳所以古人一言一句棒打石人頭嚗嚗論實事不是知解穿鑿得來道理捏合得去古人云行解相應名之曰祖他解處即是行處行處即是解處不是今日如是解他日纔如是行古人如是行今人纔如是解有等禪和子在長連單上學得口頭滑溜如何是佛如何是祖師西來意如何是萬法歸一一歸何處燈籠露柱佛殿三門撥牌子過去道我會佛法我會禪道莫問他本分上事且作得箇知解道理看麼我在青州做一領布衫重七觔趙州只恁麼說大眾只恁麼舉且道眼孔在那裏莫只顢頇我山僧道者一句子最尊最貴最第一是佛是祖是菩薩是眾生是有情是無情是我是汝百千妙義無量法門總在者一句子裏不消一捏近時有種邪師大法不明見僧舉起問趙州意作麼生便道趙州將者一句子罵殺者僧且道趙州者一句子是罵殺者僧麼他也據師席數十年馳聲走譽難道只將者尖酸口角遮蓋得過謗他古人誤他後學儘教圖得供養禮拜莫撥無因果好你既不會不妨不荅不見當日雲居住山興化道擬借一問以為影草時如何居不能荅興化云情知和尚荅此話不得不如禮拜了退後二十年居纔道當時因他置得箇問頭奇特不敢辜負他于今想來不消道箇何必且道雲居是何等眼目卻如此貴重如此謹慎不可亦儱侗說一兩句搪塞去山僧每念末法濫觴不忍隨例顛倒尋常向者箇破院住兩年那箇破院住兩年痿痿羸羸只恁麼過時且要與大眾向古人真實行解相應處通箇消息便是諸人眼見得彌天遍地是善知識到別處叢林混三兩年也討箇拂子卻跟著者枯澹老子作甚麼無非一片至誠為生死事大我出家兒既棄了家緣眷屬富貴功名向沒滋味處無急得急恁般咬嚼還要圖名聞利養麼當知師家與學人須各具正眼始不互相鈍置錯過一生古云十度開口九度休去只恐無利益大眾且如何得開口有利益去今日晚參偶記起者則公案不免葛藤一上僧問趙州萬法歸一一歸何處州云我在青州做一領布衫重七觔大眾還會麼且作麼生會天暑久立小參理不忘則不可通之事事不忘則不能合理事理不忘則本心不露心不忘則道不妙道不妙則爐子𨁝跳不得且道爐子又作麼生忘大眾還有道得底麼試出來說看眾無對師云侍者明日設供不得用者箇除夕小參三界惟心萬法唯識只者八箇字從上諸佛諸祖秘密之旨盡於此矣為什麼後來說也說了解也解了只是不會你道病在那裏大眾你若識得病所在便解放身捨命你若曉得放身捨命則一塵一念無不具足六義十玄底道理此豈不是惟心此之唯心自在深密除佛一人無有能知其進止俯仰見聞去住之處又則一塵一念無不深悉五法三性根源此豈不是唯識此之唯識圓通無礙除佛一人亦無有能議其建立掃蕩之跡大眾依山僧言之總是無別不可於無別上強起分張捲亦由我舒亦由我是我屋裏事須是屋裏人方能舉措如意所以法華云無上兩足尊知法常無性佛種從緣起是故說一乘諸法住法位世間相常住此不可作因緣會因緣之法無有真實圓覺菩薩豈不深達法源底然尚須十千劫方得阿耨多羅三藐三菩提又不可作一合相會一合相者則是不可說但凡夫之人貪著其事大眾者不是小事須是英靈漢子一眼覷破便自全身輥入方許具大人之作有旋乾轉坤手段你若只管隈門傍戶說心說性說道說理有什麼了期更饒你盡力修得千手百臂神通變化到我棲賢手裏不消一捏捏教碎若要扶一扶扶教起何以故祇為棲賢識得他他是棲賢屋裏走使要且他不知棲賢欲識棲賢麼不出你腳頭腳底只是你自家瞞卻不是棲賢瞞你良久云雖然如是山僧還有一句要向大眾道千方易得一效難求大眾大須猛省莫待臘月三十來向長老口裏討活久立珍重小參盡法界只是一箇無明只為汝行住坐臥不知不覺忽然於自證分上起見相二分由是三細六麤流轉莫返便乃歸咎無明殊不知就在流轉處直見得原無許多只是渾然一箇無明從上諸佛諸祖亦不過在無明裏知而安之一切聖賢或知而不能安安而不能住乃有種性差別既種性差別則法門亦復差別由是四念處四正勤四如意足五根五力七覺支八聖道三十七助道品乃至四無量心十波羅蜜種種法門亦只要你安住不是與你生起所以傅大士云安住無明之明照大眾你直下全體是無明即全體是明照大眾知而安之便不消別覓汝若不能安住瞥爾突起便似生相續所以傅大士又云了達明照之無明了者深悉之謂達者無疑礙之謂深悉其本無而無疑礙其忽有便直下安於無明更無毫頭許費力你若向明照上除見泯相縱饒磨治到盡頭處亦只成得箇緣起佛所以圓覺云乃至證於如來清淨涅槃猶為我相大眾還會麼祇如山僧即今與麼說還是我相不是我相復云自首免供元旦小參大眾作麼生是新年頭底佛法舉起僧伽黎云會麼離四句絕百非你若於此得箇入路玉淵潭早為你諸人說了也五老峰早為你諸人說了也但與麼過時切忌錯會山僧今日舉似雖然無端不得不爾小參明見佛性向二六時中親他去合他去祇喚作修行人若論我宗門下還未夢見在豈不見瞿曇老子拈青蓮華舉似人天且道是什麼道理可是與汝說心說性說明說暗說離合親疏麼饒汝具大根器於石火電光裏掉得箇相似法亦須一回親證始得若不一回親證會則似易做處卻難歲久日深祇恐無利益不說全無縱有亦是修行邊事不與那事相干若論今時得一箇修行人已是罕有然我輩發心擔荷如來當此法末益宜立志除增上慢及撥無因果之流凡具慚愧不可欺心亂開大口我山僧在裏許二三十年到于今方敢與麼說汝等諸人豈當容易大眾須趁識力及盡方休小參諸人若向白月裏會即難為汝眼若向黑月裏會即難為汝足若總恁麼會即太破碎若總不恁麼會即太儱侗畢竟作麼生放過即不可不放過且不是者箇道理所以深山老宿別有長處不是作意彊為汝等諸人大須知有者一著子莫自滿假虛度流光小參三老峰為汝諸人印定了也汾淇岡為汝諸人印定了也山僧口裏絮叨叨地汝等諸人耳裏鬧聒聒地且道圖箇什麼若是伶俐衲僧纔聞舉便休去早遲八刻更待眼孔動定有什麼著到處歸堂歸堂師誕日小參是上座今年五十又一承華首老人寵𧶘隆重一時緇素遠近咸集為是上座慶生是上座謹仰體老人利益大眾之心特與舉似少結般若之緣諸善知識生是世諦然無有世諦則亦無第一義諦第一義諦即是不可說所可說者猶是世諦諸善知識生不可說然有因緣得以世諦說是故生亦可說菴提遮女云地水火風四緣未嘗自得有所和合而能隨其所宜是為生義與麼則和合為生離散為滅諸善知識還知和合非生離散非滅麼龍樹菩薩云因緣所生法我說即是無亦為是假名亦是中道義未曾有一法不從因緣生是故一切法無不是空者驀豎拂子云會麼是上座五十一年不曾有生底道理再過五十一年不曾有滅底道理即今現前無慶生之眾此處亦無當生之人一箇烜赫虛空上自四聖下訖六凡內極身根外窮器界從古到今未曾一刻移易祇是無人覺知諸善知識不知誠難知亦方便沒量大人更須知有文殊普賢境界始得有向有背有斷有續有始有終有得有失猶是末那用事偌大威光不能出現縱經塵劫勤苦修證終無自由分諸善知識還會麼若不會更聽取一偈浩劫與剎那迷情非本際本際隨情量迷終不能了因緣會遇時見有如是事見知不可得緣會即無生海底劫火發山頂石船浮若得此中意日午打三更復豎拂子云會麼一僧出云大眾不會請和尚更顯威光師以拂子拂兩拂復顧視左右僧云大眾禮拜師復云適來一段葛藤端用回向老人道法普周法身常住現前知識並及見聞發菩提心究竟佛地利樂有情永無疲厭珍重小參豎拂子云大眾纔與麼會早已無事生事參玄之士十箇五雙在者裏絆殺所以道鳳縈金鎖趨霄漢以何期直得處處破除猶是靈龜曳尾大眾大須知有若向上頭撥轉關捩便一腳蹋到底庶有少分語話在然雖如是也不得作死馬醫百丈再參巖頭撫掌六七八九機輪同別復豎拂子云會麼臘八小參世尊二千六百年前於此夜睹明星悟道如今人人有雙眼睛夜夜睹明星為什麼不悟良久云世尊打草驚蛇也祇惑亂有眼睛底忽遇著箇瞎漢又作麼生拈拄杖云將謂鬍鬚赤更有赤鬚鬍佛誕小參未離兜率已降王宮未出母胎度人已畢為什麼又道世尊初生周行七步目顧四方云天上天下惟我獨尊以拂子擊禪床云連皮帶殼應無價信手提來不值錢時有僧出喝一喝云老漢今日龍頭蛇尾即歸眾師直視云汝若會得一任一任如或未然祇恐祇恐僧復出禮拜師云大眾任則任什麼恐則恐何事不妨更疑到彌勒下生小參此事離言說相離心緣相多少人向言語斷處心行滅處亦不得得亦不真所以道動容揚古路不墮悄然機始愜風穴意餘外不無祇是與達磨一宗猶較一線道在大眾切須皂白始得小參舉世尊云一切法皆如幻化畢竟性空畢竟空中無有諍競令彼聞已鬥諍心息其心平等猶若虛空更不相求種種瑕隙由斯獲得大丈夫相所莊嚴身見者歡喜乃至證得清淨涅槃究竟安樂師豎拂子云是什麼到者裏說箇性空已堪噴飯何況若凡若聖若一切生滅心行猶如畫空及水中月大眾何不向拂子裏打箇筋斗出頭來與汝攜手河橋海岸觀競渡上下隨緣應物豈不是心胸明快然雖如是祇如十字街頭李四張三滿口糊塗一拳上一腳下又作麼生莫將意氣論今古自有通人一目平一目平三腳驢子弄蹄行小參舉龍樹菩薩云若不見般若是則名被縛若人見般若是亦名被縛若人見般若是則得解脫若不見般若是亦得解脫是事為希有甚深有大名譬如幻化物見而不可見師云大眾還識般若麼驀豎拂子云何不向未舉已前會然雖如是六祖從來不姓盧自恣小參不覺又是自恣大眾一夏已來還曾構得也未構得也祇在者裏構不得也祇在者裏總在者裏說什麼構得構不得大眾幸自可憐生待你暗地裏點頭錯過多少山僧與麼話恨得汝諸人不具眼亦喜得汝諸人不具眼何以如此豎拂子云描也不成畫不就縱有僧繇亦枉然小參驀豎拂子云者箇不是你會得底會得也是平地上喫撲遂高聲喚大眾云何不禮拜了退師誕日小參年年此日生日日此時死諸人祇解慶生不解慶死巖頭云雪峰與我同條生不與我同條死山僧亦云諸人與我同條生不與我同條死要會此意須從即今會父母未生以前消息始知山僧刻刻在諸人腳跟下同生同死諸人自瞞過卻來者裏慶讚雖然因我得禮你底事從頭起若是赤鬚鬍直得笑不止笑諸人事因人熱山僧隨例道謝遂拱手云有勞大眾繁用小參舉臺山婆子凡有僧問臺山路向什麼處去荅云驀直去其僧便去婆子云好箇阿師又恁麼去傳至趙州州云待我勘過始得趙州往如前問婆子亦如前荅州歸上堂云臺山婆子為汝勘破了也復舉一婆子供養一僧嘗遣二八女兒送飯一日令女抱住云正當恁麼時如何僧云枯木倚寒巖三冬無煖氣女歸覆婆婆曰二十年祇供養一箇俗漢遂趁出燒卻菴師云趙州勘破婆子五百揭石義婆子趁出者僧阮籍愧孫登大眾作麼生同是廣南人別有通霄路還會麼切忌逢人錯下註腳臘八日小參世尊當日睹明星與大眾如今俯仰上下顧視左右總無第二人為什麼不悟良久云幸自可憐剛不肯若為瞥地太生憎攜來蔥嶺還攜去賺殺兒孫入五燈大眾還有多少人怕入不得豈不絕倒小參春燈絢爛社鼓喧嘩莫道不當情者箇當情尤甚所以萬里無雲青天也須喫棒直教向聲色裏提取那一片大安樂田地方纔不費手腳大眾者一句子成褫多少人賺殺多少人行腳高流當知轉變小參舉一不得舉二放過一著落在第二驀豎拂子云喚作一早落卻第二了也且一如何舉良久云孟八郎又恁麼去也大眾久不散師笑云一眾總是俗漢小參耳目不到處會意言斷絕處會不如向聲色樅然是非交互薦取箇不驚異句大眾且不驚異句作麼生道良久云見怪不怪其怪自壞小參豎拂子云盡大地祇是者箇你向什麼處揀擇不揀擇莫明白且道還有過也無牛有角兔無角不如貓兒一隻腳小參舉竹篦云汝諸人即今眼見如盲耳聽如聾口說如啞有什麼不著到處為什麼不肯承當雖然如是更須步步有出身之路始得所以道但參活句莫參死句大眾作麼生是活句以竹篦左拍一下作麼生是死句以竹篦右拍一下復云曠野無行地崎嶇有路通小參大眾一切眾生從無始生死來祇是識心妄見流轉若不八識一刀世間流轉有麤境界出世間流轉又有細境界麤境界所謂色境界乃至法境界細境界所謂色非色境界法非法境界心境界非心境界乃至菩提涅槃境界若我祖師門下麻三斤乾矢橛庭前柏樹子狗子無佛性若祇與麼打發亦是細中之細總要出境界不得大眾于今三家村裏樵歌牧唱量晴較雨且道還有你者理會麼此豈不是境界你若在那裏得箇真實悟門是世間是出世間是如來是祖師方始皂白大眾聰明才辯到者裏一毫用不著須是置心一處久久自然拽脫努力小參上不慕諸聖下不重己靈古人恁麼道且道是什麼人分上事待要和會有什麼著到處蓋從上來不曾有者箇消息祇為慈悲之故諸人頂門眼豁當自證知即今且不可說破小參生與死善知識亦不能免不能免則老病猶人苦樂猶人總皆猶人善知識長處在那裏大眾善知識深知生死之故深知老病之因深知苦樂之本知而同之同而不均如水中有乳若果鵝王自非鴨類曹山云一切麤重底事不要免免則成變易去也菩提涅槃此等殃禍為不少大眾變易不變易惟我自知得底人三二十年潛行密用始於自肯終至於妙是非順逆非形跡所得類齊大眾汝但於實頭上一回瞥地久久自然證知若己若人若古若今若凡若聖異同差別泮然無疑大眾不移之地豈容易到須具大人之相慎勿隨順麤識久立小參如今人不了祇為未起恬然纔起突然既起猛然者是誰家屋裏事誰作奴郎何不徹底悟將去太古淳風去還肯麼小參茫然從何去悄然從何來來去不可得來去裏接取不關茫然悄然事小參豎起竹篦子云不是心不是佛不是物是箇什麼良久云咦將謂有恁麼事暇園小參雷峰十三年前承諸公命曾到此間今日重來與諸公相見且道相見底事作麼生卓拄杖一下云大眾十三年前亦祇為諸公讚歎三寶成就信根乃漸入漸深邇年來我宗門下事古岡大有人承當在去年復承見招正搔著山僧癢處此回願望倍奢非但現前諸公闔古岡一城人雷峰拄杖子要生按過總教成佛作祖去大眾雷峰拄杖子為什麼恁大威光祇為不肯具眼所以上不知上下不知下貴不知貴賤不知賤賢愚好醜是非得失祇是箇不知盡十方三世鼻孔一時穿卻到來者裏上不妨教下下不妨教上賤不妨教貴貴不妨教賤賢愚好醜是非得失一齊推倒一齊扶起大眾你看拄杖子恁大威光一場佛事且道於雷峰分上還有絲毫交涉麼試判看咦雷峰到處穿人鼻孔殊不知一箇鼻孔今日被諸公橫拖倒拽直得笑倒雖然如是且喜索頭還在手裏喝一喝卓拄杖小參若人欲了知三世一切佛應觀法界性一切惟心造大眾過去已過未來未至現在無住喚什麼作一切佛卓拄杖一下云急須著眼看仙人莫看仙人手中扇復云大眾佛法界菩薩法界聲聞緣覺法界六道四生法界作麼生說箇惟心底道理卓拄杖一下云相隨來也石頭土塊會麼若也未會雷峰且向第二頭為諸人葛藤去也豎拂子云還見麼見底不是色以拂子擊案云還聞麼聞底不是聲既不是聲色又是箇什麼昔東坡居士云溪聲盡是廣長舌山色無非清淨身夜來八萬四千偈今日明明舉似人看此偈可謂攪長河為酥酪變大地作黃金後來有箇長老卻云東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人且道具箇什麼眼便恁麼道不見道荊棘叢中著腳易月明簾外轉身難你若識得者箇長老方纔識得雷峰雷峰不曾向你紫羅帳裏撒珍珠你擬什麼處構切莫顢頇今日何聖傳居士為其亡過尊人見五老居士來暇園設供請山僧舉揚此事用資冥福大眾見五老居士做了一生佳公子做了一生賢縉紳居鄉清白德被里閭處家仁孝慈惠子弟但祇麼見得猶是世間相不祇麼見得世間相出世間相遂成兩橛且合作麼生卓拄杖云若在者一下透徹根源許你會得見五老居士本命元辰著落天上人間隨意自在總無第二人第二法雖然祇如資薦一句又作麼生道卓拄杖一下云頂門開了還教瞎為聖為凡絕是非小參汝諸人晝夜張眼看著側耳聞著鼻嗅舌嘗身觸意思何處不灼然為什麼不肯承當汝但過去未來現在一切夢覺虛妄相想一時按下祇與麼覷捕覷捕來覷捕去忽然打失布袋卻好來與汝箇本色鉗錐何以如此祇為汝從來不知與麼事將謂有多少奇特殊不知曠大劫來未曾剎那間歇所以僧問雲門如何是諸佛出身處門云東山水上行僧問洞山如何是佛山云麻三觔南泉東西溪話趙州勘破婆子話今人一等會為什麼不是者裏大有來由有底說識得後還要掃蹤滅跡何異靈龜曳尾有底說入得頭也要出得頭方合他向上有底說箇中無肯路總與麼打發不求妙悟說時相似做處淆訛理既如是事亦復然如蒼蠅子一般祇管向有氣臭處道法大概可見汝等諸人決要向者一路出離生死大須具超方眼目久立
