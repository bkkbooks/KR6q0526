body:
  text: 天然和尚像五老峰頭白雲萬頃淨成樓閣歸霞倒影坐斷密移振衣挈領齊古德之獅紶軼時賢之麈柄誰堪智通嗤減德而弗彰獨抱閒情擁孤光而自遠砥柱洞流楷模後學此吾老人南極一星使人景仰而不可即者也嗣法門人今無敬題天然是禪師語錄序諸佛為一大事因緣出現於世匪直自了有大悲大願焉悲大故其憂之也深願大故其任之也重昔風穴垂涕告首山曰不幸臨濟之道至吾而將墜矣誠憂之也其後再傳而有汾陽既放身命閉關堅臥郡守以名剎力致八請不答僧契聰者排闥讓之曰佛法大事靖退小節風穴常憂遇風則止幸而有先師今汝有力擔荷如來此何時而欲高眠耶汾陽瞿然起曰非公不聞此言趣辦嚴吾行矣誠任之也函修因是而深嘆古今人之不相及也道人撒手臥長空菩提真如猶為垢膩況復世間名聞利養豈似今時把箇死蛇頭逢人便賣痾漉漉地但知與兒乳酥不問消與不消此不過欲得門庭熱鬧耳善知識以本分接人其謂之何我大師以大悲願力復來閻浮橫挑楖栗直入千峰豈肯打入時流隊伍去春攜修出匡廬歷江南北拄杖邊不曾撩著半箇幾欲焚茅屋入深山偶以省覲歸僊城一時道俗迎主訶林乃翻然抱深憂而肩重任師冷硬之性壁立萬仞莫可仰扳百千妙義到他跟前一棒粉碎其所開示大要貴人不著法報化立處皆真如擊塗毒鼓聞者皆死大矣哉無為寂滅之幢也古人於此三二十年猶不奈何而我師纔搭緇衣便登祖位人將謂此道直易易耳亦知師之真參實證乎師嘗究理而坐十七晝夜不合眼以為必識盡功忘自然合他古轍始得任心自在後參黃巖因閱華嚴所得都亡其絕情過量之智已於無量佛所培養豈特三二十年而已今法語具在使天下後世知此百犬吠聲群盲相引時猶有人提唱斯事佛祖慧命庶幾不斷而後乃相安於無言此師之志也函修初曾認著露裸裸底幾恁禍事幸取決於師得箇轉身雖修與師皆從今華首和尚剃度於法門為弟昆然實受師資之益知師者宜莫若修故敢揭其大端如此崇禎壬午冬日同門弟子函修和南譔天然是禪師語錄序天然和尚以居士身夙慧頓發了悟上乘後從空隱老和尚剃度於廬山證明大法杖錫所經悲愍之懷溢於言際職書記者輯而成編付諸剞劂屬今轉恭為之序夫轉固無能序而亦無可序也憶丁亥秋轉與龐子若雲迎和尚結期弼唐將謂有言可循也有法可得也及參隨數月始知日星雲漢山嶽江河以至竹影松聲蟲鳴鳥語盡為和尚筆舌舍此而欲向一言一句之下承當箇事何異撥波求水然則是錄也又胡為乎來哉夫大聖人出現於世其中皆大有不獲已者眾生日見道而不見日聞道而不聞是不有見孰為不見是不有聞孰為不聞而要所見何見所聞何聞應必悄然自得亦復啞然自失靈山會上拈花微笑我佛世尊打頭一步蚤已逗漏不少然畢竟何如心行何如旨趣必使千百世而下猶有跛腳翁堪解報恩此世尊之為甘心即我和尚之為甘心也願天下後世得意忘言見聞都盡自度度他共臻無上云爾尚區區語句中求其罪過且與謗法等是則今轉所大懼也夫是則閱斯錄者所大懼也夫順治戊子孟春門弟子今轉梁殿華稽首恭序天然是禪師語錄序昔者宣聖振鐸于東方釋尊授衣于西土一則意盡象中一則心傳教外其皇皇焉牖世覺民之心固異致而同歸也自儒術既衰微言遂絕縉紳縫掖之輩高者攻于經學卑者溺于文詞而聖賢盡性知命之旨無復為之殫心矣釋尊諸祖乃以單提直指之說示彼正覺救此迷情于是聰明奇特之士厭迂儒之拘牽樂禪宗之超脫一言契旨片偈投機而所謂儒門澹泊收拾不住者張無盡以為達人之論深有以哉始壇經刱著文字踵增臨濟開玄要之宗洞山立君臣之義溈仰發體用之論雲門捷示三關法眼分呈六相究其捨妄歸真不離自性夫是以從事誠明之學者如濂溪嘗師鶴林姚江借塗蔥嶺不啻冥心而求之也本師天然和尚夙領儒宗久膺祖席身乘五衍心入三摩譬如洪鐘萬石有叩輒鳴遙源千頃無挹不注向在雷峰棲賢華首訶林諸山皆有語錄行世學人奉為津筏寶若琬琰矣迺者山靈初啟叢席旋興西堂澹公因南陽之舊基開東林之新剎秖園翬建緇侶雲臻爰從丙午冬仲奉本師以居焉師則性樂巖阿心悲塵剎既得棲真之境益弘樂育之懷或策杖而陵峰或披襟而笑月蒼松白雪歲見新篇紫玉青螺時聞佳什蓋已目擊道存無行不與矣然而钁頭斧子不廢鉗錘擊碓敲床更勤提命山中高弟以師法語彙錄成編命小子楷敘而梓之余惟儒門淆雜特闢禪關若悟本來同歸覺路而師先得淵源于孔孟繼聞秘密于迦文固知六通八正不同幻妄之談窗影風幡無取尖新之解也余嘗再訪檀林一瞻猊座見其登堂之彥濟濟趨蹌入室之英雍雍問辯雖杏壇講習遜此威嚴沂水詠歌同斯怡悅矣是錄也推原心性利濟人天有以佐吾儒道德齊禮之所不及公之諸方垂之奕葉將使慧日同光名山並壽海螺巖下永振威音錦石溪邊長流法乳豈徒拾拄杖之陳言資曲床之談柄已耶若夫佛法深微不從解入自非立雪數年未易領會又何敢于威儀談說之間管窺而蠡測也康熙庚戌上元當湖弟子陸世楷今亙和南謹撰天然是禪師語錄總目卷第一序三首塔銘行狀上堂卷第二小參卷第三小參卷第四普說卷第五普說茶話卷第六室中垂示卷第七舉古問荅頌卷第八問荅頌古卷第九讚偈銘卷第十書問卷第十一雜著卷第十二雜著佛事梅雪詩附
