body:
  text: 嗣法門人今辯重編普說普說汝諸人本分上各各有箇決不底田地祇是汝諸人不肯承當且道病在什麼處病在一切處放不過一切處放不過也祇是一處放不過一處放過即一切處放過一處放過一切處放過方纔親證得者一片田地從來不曾變異不由知見自疑永斷昔我洞山价祖初參南泉值泉為馬祖設供問大眾云馬祖還來麼价祖出云待有伴即來當時便為南泉器重後於忠國師處參無情說法話見溈山又見雲巖作偈云也大奇也大奇無情說法不思議若將耳聽終難會眼處聞聲方始知者箇豈不是价祖當時一切處放不過底影子麼大眾若放得過消得與麼道更有一箇驗處後辭雲巖巖問子向什麼處去祖云雖辭和尚未卜所居巖云幾時卻來祖云待和尚有住處即來又是一箇放不過巖云此一別難得相見祖云難得不相見又是一箇放不過還有一箇大放不過底贓證卻問百年後有人問還邈得師真否教某甲如何祇對巖云祇者是大眾祇者一句若不是徹底放下徹底撩起底人不免承當不去祖果涉疑巖便云闍黎承當箇事大須審細祖後過水睹影纔有箇口供道切忌從他覓迢迢與我疏我今獨自往處處得逢渠者豈不是從來一切處放不過到者裏方纔瞥地麼又道渠今正是我我今不是渠應須恁麼會方得契如如豈不是者一處放得過則一切處放得過又如大慧在湛堂會下堂云杲上座叫你頌也頌得拈也拈得普說小參也都做得祇是一件你在我方丈有禪出到外邊就沒了醒時有禪上單時就沒了大慧道正是某甲疑處者豈不是一切處放不過麼湛堂更有箇方便云何不將醒時底放在睡時睡時底放在醒時他依舊不會後在圓悟熏風自南來殿角生微涼語下得箇快活據他自家已似於一切處放得過了卻被圓悟按住道猶坐在淨裸裸處令他參有句無句一日請益圓悟荅五祖話有句無句如藤倚樹描也描不成畫也畫不就樹倒藤枯句歸何處相隨來也直到者裏方纔了卻豈不是一處放過則一切處放過又高峰當日睹真時已有箇悟入雪巖知其落處便問日間浩浩作得主麼峰云作得主夜間睡夢時作得主麼峰云作得主正睡著無夢無想無見無聞時主在什麼處峰便過不得者豈不是一切處放不過亦祇是此一處放不過後因枕子落地方纔打徹豈不是者一處放過則一切處放過大眾者一片田地始終不曾變異祇是汝一切處放不過便為一切處流轉一處放不過便為者一處障礙汝若直下一處放過一切處放過方能於者片田地上自肯自休亦復自知不曾荒蕪亦不消得我和你耕治自然教他出生箇菩提芽自然長養起十波羅蜜底苗子自然開敷十力四無畏十八不共法底華自然收成箇清淨智無礙智一切種智底稻子與十方三世無量香水海華藏世界一切黃面老子同一受用正與麼時節放過也祇是你底田地放不過也祇是你底田地放過不放過總是你底田地還有什麼變異不變異喝一喝者老漢祇管要人放得過自家兩片皮絮叨叨地猶自放不過在以拂子摵口云口是禍門普說佛未出世時正是妙祇是無人覺知所以出世來逗漏者箇消息本是借路經過反成垛生招箭後代兒孫不得真悟往往一切時一切處一切念總要回合到那妙上靜境界靜境界回合動境界動境界回合閒境界閒境界回合忙境界忙境界回合順境界順境界回合逆境界逆境界回合是境界是境界回合非境界非境界回合又錯引三十年不少鹽醬以為回合得力四十九年猶有走作以為回合不得力殊不知到家人實際理地與塗路上湊泊如霄與壤又如麻三觔庭前柏樹子鋸解秤錘一口吸盡西江水古人大休歇大總持從胸襟中流出與汝蓋天蓋地在今人分上祇成得箇所知之境到不如三家村賣柴漢晨朝起來挑一擔柴入城市裏換些事物傍晚還家煮熟飯飽食了洗腳上床一覺天明卻無如許管帶大眾此事有得則必有失是汝以有所得之心在本來田地上大似捏目生花愈精進愈加浮逼嘗見名重海內忽然狂發駭人聞見皆因打頭悟門不真在禪那上稍有所重不覺失念便成差互豈不見楞嚴五十種陰魔蓋為未曾發明遵聖言教深入禪境示有岐路不足為怪獨是擔荷如來時譽所歸疑誤後學良可浩歎此猶是老實人禪病若資性宕佚喜談過量纔掉得箇相似便一切棄置為伊方寸裏先靠著箇心外無法一切不可得底道理任意舉止隨順妄情以為行于非道方合佛道比于南泉斬貓歸宗斬蛇蜆子蝦蟆殊不知古人劍刃上事稍一眨眼血濺梵天豈更麤境公然狂肆今時禪病多出於此良由師家道眼不明纔見學人蹋上箇豁達見識便一印印破走到十字街頭尋箇趁飯底拏起拄杖穿州入縣忽然撞著箇不知就裏底護法檀越一搭搭上馳聲走譽做盡伎倆用盡心術總不出名聞利養四字更有顛躓不堪挂齒你道怎麼發得人信心于今世間人儘有從聖賢路上設心制行是我衲僧家稱為傳佛心印到有許多尷尬大眾一等行腳豈不飽聞飽見切莫隨順顛倒辜負初心老僧初住歸宗與新舊住諸人一時緣聚不妨從頭說破出家兒貴有高識但凡參禪做事須務實頭莫學虛頭大眾作麼生是虛頭從冊子上覓機覓境和會禪話是虛頭從心意識想認箇見聞覺知以為本命元辰是虛頭從舉起處承當是虛頭從石火電光掉箇不容疑議底是虛頭從平實上天是天地是地山是山水是水得用便用更不移易是虛頭大眾何以知他總是虛頭汝但當如上許體會時門外忽然有人喚汝一聲汝者體會底總沒了也若謂甕裏何曾走卻鱉又要許多體會作甚麼到者裏須是悟不可但與麼領略過便當得曾憶二十年前有箇時師判高峰落枕子因緣高峰因雪巖問云日間浩浩作得主麼峰云作得主又問夜間夢裏作得主麼峰云作得主又問既睡著無夢無想無見無聞主在什麼處峰不能荅一夜臥次推落枕子忽然大悟佢便判無夢無想無見無聞是文殊普賢境界將謂高峰當時是在無夢無想無見無聞處著到咦若祇麼悟又爭了得大眾參禪須要了得生死若但道理和會今日舉一則如何如何批判明日拈一則又如何如何批判生死到來你者批判底放過一邊畢竟作麼生打發又且不待生死到來就如今日用裏善惡諸緣一時拋向面前事不謀心心不謀事種子濃厚發生現行箇裏便有許多做手腳不辦去處不見雜華文殊師利菩薩問法首菩薩云如佛所說若眾生受持正法即能斷除一切煩惱何故復有受持正法而不能斷者隨貪恚癡隨慢隨覆隨忿隨恨隨嫉隨慳隨諂勢力所轉無能離心何故能受持正法而復于心行之內起諸煩惱法首菩薩以偈荅曰佛子善諦聽所問如實義非但以多聞能入如來法如人水所漂懼溺而渴死于法不修行多聞亦如是大眾此在教中雖已解悟還要修行若我宗門下行解一時俱到行解一時俱撤若已解了便去修行尚不當事何況解亦未圓行復參商瞞得人瞞得自己麼若要諦當從古來有箇絕好榜樣不嫌陳腐試一舉看我黃面老子當時在王宮裏一夜踰城走到雪山六年生受從跋伽阿羅邏迦蘭等六師一一各盡其長總不是了生死處後在菩提樹下三七思惟中夜睹明星出時豁然大悟成等正覺卻念此事無你開口處無你安排處直是難信難解便欲取般涅槃一時欲梵諸天同聲勸請乃憶過去諸佛說法儀式詣鹿野苑中為憍陳如五比丘轉四諦法輪大眾苦即是實如來說有苦諦是虛集即是實如來說有集諦是虛滅即是實如來說有滅諦是虛道即是實如來說有道諦是虛又十二有支無明即是實說無明緣滅是虛行即是實說行緣滅是虛識即是實說識緣滅是虛名色即是實說名色緣滅是虛六入即是實說六入緣滅是虛觸即是實說觸緣滅是虛受即是實說受緣滅是虛愛即是實說愛緣滅是虛取即是實說取緣滅是虛有即是實說有緣滅是虛生即是實說生緣滅是虛老病死憂悲苦惱即是實說老病死憂悲苦惱緣滅是虛又菩薩六度慳貪是實布施是虛污染是實持戒是虛嗔恚是實忍辱是虛懶怠是實精進是虛散亂是實禪定是虛愚癡是實般若是虛大眾實不自知因虛而知以虛為實反能障實何不更看法華會上如來為一大事因緣出現于世亦不能直指眾生知見惟令眾生開佛知見示佛知見悟佛知見入佛知見眾生與佛知見無二然不免閉此開彼隱此示彼迷此悟彼出此入彼是有轉變非不轉變猶為說虛不為說實直至臨般涅槃始云我四十九年不曾說著一字分明是將從前言教一劃劃斷于百萬人天上拈青蓮華顧視大眾惟有金色頭陀破顏微笑世尊云吾有正法眼藏涅槃妙心教外別傳付與摩訶迦葉自此乃有宗門之說流布將來大眾吾佛世尊成等正覺以來惟此拈華微笑之旨得名為實其餘一切言教皆名為虛然雖如是亦須具有超佛越祖之眼方堪承當若作實法則未拈華已前是箇甚麼既拈華已後又是箇甚麼所謂借路經過不則垛生招箭不見白雲端禪師有頌云盡道拈華微笑是不知將底驗宗風若云心眼同時證未免朦朧在夢中你看者四句頌直是徹骨徹髓前後諸祖諸善知識凡有人問如何是佛云麻三觔如何是祖師西來意云庭前柏樹子又有問其徒曰趙州庭前柏樹子意旨如何荅云先師無此語莫謗先師好你看他嫡骨血脈自是不走一線近代有底杜譔長老卻教人向棒頭指處會又有以麻三觔等語謂從無心三昧中流出自謂親切指示殊不知正是虛拳指上卻生實解遞相傳授漸漸失真後學小生祇看你祖傳底弔牌子又爭怪他菽麥不分所以行腳高士大須著眼你若不即具擇法但觀做處若真大人心地自是平穩言行自然相顧前不云乎但凡參禪做事須向實頭你若在實頭上著到一切施為動作自是不虛大眾又如何是做事底實頭做事底虛頭者裏亦有箇入理之談我且問你作麼生喚做事莫是叢林裏監寺有監寺底事副寺有副寺底事維那有維那底事知客有知客底事侍者書記監收直歲庄頭及餘一切諸職各各有應管底業務麼若以此為事則必以長連單上參得底為理恁麼則理不是事事不是理作麼生說箇事無礙理無礙若道長連單上參得底便是諸職事做底諸職事做底便是長連單上參得底謂之事理無礙法界須知更有信手拈來一毫頭獅子百千億毫頭獅子無論順逆大小當處全真謂之事事無礙法界若總與麼定當恰好做得箇座主使下何處復有宗門眼目何況更說某甲職事與某乙職事不著便某處堂頭好某處堂頭不好某保社規矩嚴謹某保社散誕較長度短辯是爭非只管終日聚著頭絮絮忉忉你道還有星子衲僧氣息麼龐蘊居士云日用事無別惟吾自偶諧頭頭非取捨處處莫張乖朱紫誰為號丘山絕點埃神通與妙用運水及搬柴他是箇俗漢到有些衲僧氣舉此一偈聊作指蹤若便與麼會且要做箇俗漢不得今日因安立職事不覺引出如許葛藤驀豎拄杖云且道還與者箇相應麼大般涅槃經云如來有時說于世諦而人以為第一義諦如來有時說第一義諦而人以為世諦若向者裏分疏得下方知古人道但參活句莫參死句若是死句下著到無你自由分直饒若玄若妙若體若用一一融會猶是死句作麼生說箇活句卓拄杖云不是不是普說因緣大事眾生慧命若授受失真佛種應斷歷代祖師喫盡生受方能在那裏獲大總持遇真法器猶自縝密非吝法也法運衰晚人心儇薄往往聰明之士托足清流挂名高蹈一以皮相遂有魚目明珠之誤日久逗漏悔何及矣南嶽讓禪師云遇非其人宜慎辭哉良以是耶嘗見善知識擇法不為不嚴乃以愛人之故甄收輒濫大陽平侍者大慧以為盡得大陽平實之旨而黃秀才終不免三丫路口之記賣薑漢豈不是五祖戒高弟而覺範以為賣師取名予每於此益仰慎辭之訓古人深達法源深明根欲非老於叢林未易知此老僧三十年謬膺師席所見所聞不可枚舉然以法眼觀之亦不足怪夫道有真則必有似有深則必有淺似者出於道外淺者猶在道中以道中之淺而欲其生滅淨盡人我頓撤此不達俱生現行之理將欲持法祇恐傷慈善知識之於學人應見及此而預為之防學人之於善知識亦應見及此而先為己地則師與資兩無負矣善知識為學人預防不過在道法上始之終之使無剩義而已學人先為己地亦不過在道法上既窺其體直窮其用使無空解而已古人云有頭無尾時如何終是不貴有尾無頭時如何雖飽無力頭正尾正時如何兒孫得力室內不知人止知有尾無頭之為無力而不知有頭無尾之為不貴遂使理則甚明情終難遣乃自解云一切法不可得一切心不可得夫法不可得心不可得盡天下人莫不皆然幻因猶在幻果難逃古人云何不道拽而不拽固昭昭可鑒也且舍頭亦無所謂尾麻三觔乾矢橛此頭之極正者也道則如是前後若何所以云句前句後正是學人難處大法不明正恁麼時猶有趨向劍去久矣君方刻舟不見趙州作沙彌時參見南泉泉云有主沙彌無主沙彌州云有主泉云主在什麼處州近前鞠躬云孟春猶寒伏惟和尚尊候萬福明日陞座州便出眾云如何是道泉云平常心是道州云還假趨向也無泉云擬向即乖州云不擬向爭知是道泉云道不屬知不屬不知知是妄覺不知是無記汝若深達不疑之道猶如太虛廓然無礙豈可強是非耶此趙州得體明用一箇大榜樣已解道孟春猶寒而復問云還假趨向也無此真得底人自審去就大眾不假趨向頭一句如是尾一句作麼生莫是隨緣消舊業更莫惹新災麼且道箇裏還有差別也無試細細諦當著古人有因問云和尚手裏是箇什麼便舉拄杖云老僧年邁離伊一步不得大眾作麼生說箇不離底道理莫便云者箇還離得麼且喜沒交涉大凡衲僧家體究言句須有來由於今人都是沒來由底取次批判明眼人笑汝在昔達磨大師望神州有大乘氣航海而來流通箇事掃除階級祇要汝特地承當頭正尾正不是但有其說二祖安心已竟一日復云外息諸緣內心無喘心如牆壁可以入道二祖由是七年乃有語云我已息諸緣磨云莫成斷滅否二祖云不成斷滅大眾此不成斷滅正是吾宗門頭一箇嫡真血脈後來讓禪師聞馬祖開堂密遣人往纔見陞座便出云作麼生馬祖云自從胡亂後三十年不少鹽醬大眾作麼生是馬大師不少鹽醬處也須知是箇血脈藥山在馬祖處悟得石頭禪一日在石上坐次石頭云子在此作什麼山云一物也不為頭云恁麼則閒坐也山云若閒坐即為也大眾藥山和尚既一物不為而又非閒坐箇中事作麼生譬如琴瑟箜篌琵琶縱有妙音若無妙指終不能發到者裏須知大有血脈在不得頇顢溈山祐禪師一日因香嚴仰山侍立忽舉手云於今恁麼者少不恁麼者多香嚴從東過西仰山從西過東溈山云者箇因緣三十年後如金擲地溈山當時法社如林已如此說可見無上妙諦今古寥寥汝若打頭不遇作家纔掉得箇相似便云本來具足暫時岐路枉受驅馳一日瞥地還其本有直下現成不犯工夫尋常無事不知不覺闖入聲色差別儼然有善根底暗地裏慚愧若多生染得魔種更增邪見所謂一切法不可得一切法無別道法凋零皆由此輩古人比之獅子身中虫自食獅子肉非餘外虫能食若是真實道流纔入頭來便思究竟決不肯流於岐路祇如祖師西來直指人心見性成佛汝於今自心自性可中見得如伸手見掌麼若果見得便知麻三觔正是者箇道理乾矢橛正是者箇道理乃至玄要偏正本體功勳一一透徹自然日用間相應與不相應不假問人未相應者自解方便做到相應有走作底做到無走作不曾打成一片底做到打成一片香林涌泉豈不是古來大老何曾蓋覆真實人說真實話祇要同道各自點簡不如今時自欺欺人天下狂慧固多老實底亦不少人不可欺去去來來總是自欺而已然自亦不可欺同是佛性一切好歹亦各自委只是名聞利養一時撇不下不免硬作主張日過一日一口氣不來時豈非禍事我老僧于今從自己著忙起奉勸諸人亦如是著忙未了事底請急了卻既了事底請乘朝氣一蹋到底臨濟大師云圓明方始了畢我洞山价祖亦云恁麼道即易相續也大難古人悟得的確一箇箇俱是頭正尾正不如今人祇要師家點頭便到處覓因緣終日做學問事事迴向出頭那邊自己腳跟下無始劫來麤重習氣尚不能消停萬一一剎那間聲譽在前利欲在後方寸裏百種偷心豈你一期之悟遏捺得住依然打入世諦隨他流轉莫聞與麼說便道老僧全重功勳箇裏大有分曉圭峰密禪師荅溫造尚書云但可以空寂為自體莫認色身以靈知為自心莫認妄念妄念若起都不隨之臨命終時自然業不能繫雖有中陰所向自由天上人間隨意寄託若愛惡之念已泯不受分段之身自然易短為長易麤為妙若微細流注一切寂滅圓覺大智朗然獨存即現百千億身度有緣眾生名之曰佛此圭峰為有習氣者言之也若老僧道體本空寂何分法化心自靈妙無有真妄於此頓徹時時空寂靈妙念念靈妙空寂分段如是變易亦如是一身如是百千億身亦復如是若見有色身不認有妄念不隨卻似不曾悟理晦堂老師荅韓宗古侍郎云心外無法者不知煩惱習氣是何物而欲盡之若起此念翻成認賊為子此晦堂為心外無法者而復云縱有煩惱習氣則以如來知見治之豈知如來知見不是治煩惱習氣之具迷如來知見即為眾生知見悟眾生知見即為如來知見涅槃云有智慧即無煩惱有煩惱則無智慧若見有煩惱習氣則如來知見必斷若如來知見斷即無煩惱習氣潔淨深坑可畏之處與無上菩提遠之遠矣故知真發明人他自知時曹山寂禪師云妙明體盡知傷觸力在逢緣不借中借是外紹不借是內紹是真王種隨緣任運血脈不斷故又云無身有事超岐路無事無身落始終悟得無身自然有事一切時中泯然無始終本末之異所謂兒孫得力室內不知未有室內不知兒孫可不得力也以要言之無論有習氣無習氣從最初發心以至佛地祇是一箇道理大須著意切莫閒過孤負己靈今與諸人約共住佳山水山深無事正宜體究老僧是箇老實頭一切門庭鬧熱讓與諸方一飯兩粥耐麤甘澹便與麼過時祇要與諸人隨根授道稍知痛痒便合徹底倘或失念上頭有人提挈汝在古人打發了尚埋頭眾中十年二十年且道意作麼生臨濟大師參得黃檗禪可謂千了百當卻後七年破夏入山密啟何事始知師資商榷深淺有時不可麤浮輕言過量明朝後日大有事在悔之已晚汝今現在座下及將來更有付授悉聽老僧遣發不得自請住山離師太蚤終難成立行同流俗非吾弟子久立珍重茶話除夕茶話今夕除夕天下人盡於此夕著忙惟有我衲僧家不然且道衲僧家具箇甚麼道理只是貧亦了得富亦了得乃至有無長短一切了得甚而是非好惡聲色無有不了之處不是無只是了德山云一切萬法皆由心生心若無生法無能住若達心地法門一切無礙遇非其人宜慎辭哉大眾作麼生說箇無礙底道理天下無嫌底法總是你不了便成繫縛不是隨事隨物而了了而後隨故隨而不隨大慧云汝但八識一刀此一刀斷則千刀萬刀應時而斷所以古人云行腳高士大須向聲色裏坐臥聲色裏困眠始得你若不了在者裏便生出許多趨避許多取舍且作麼生坐臥困眠平日胸次間未免疑滯何況臘月三十你若了便時時了念念了豈待臘月三十觸事遇物總有箇打發處而又不是離他人生世間一切是非善惡種種生滅你作麼生離而今儘有掉得箇不生滅底道理便擬向生滅邊淘汰以為踐履不知生滅又是箇甚麼你纔擬淘汰蚤是生滅如此見解正眼觀來總成外道你若了豈有恁麼事就是山僧恁麼說已是老婆心切故有落草之談既恁麼說猶是落草之談過此已往又作麼生開口無事歸堂茶話如今末世佛法凋零師家與學人俱順顛倒而不順正理山僧平時東廊下西廊上禪堂裏方丈裏與你諸人說長說短說是說非商古量今時情目下都不曾見你諸人著箇眼孔而今見山僧出來食茶便箇箇拈起紙筆記山僧說話難道今日纔是麼豈不是順顛倒就如趙州當日僧問學人乍入叢林乞師指示州云食粥了也未僧云食粥了也州云洗缽盂去其僧便悟尋常恁麼語句悟得幾箇多少人作佛法會只是見者僧云學人乍入叢林乞師指示便將趙州恁麼語句向日用處會向開口處會向舉起處會此豈不是順顛倒又如高亭簡參德山山隔江招手簡橫趨而去尋常舉手動足一切人總見他為甚麼無一箇半箇在者裏得箇消息纔聞高亭簡與麼悟便向招手處會不可總教人作野狐精去也又如會通侍者辭鳥窠往諸方學佛法窠云若論佛法我者裏亦有少許通云如何是和尚者裏佛法窠拈起布毛一吹通便悟不可又道吹布毛便是鳥窠佛法若不是為甚麼侍者悟去時有僧出問云從苗辨地因語識人高亭簡與德山相見為是神通妙用為是法爾如然師拈果子云會麼進云當初只為茅長短燒了原來地不平師云還見德山麼進云沒有兩箇師約住云過來過來僧近前師云一箇兩箇相去多少進云正是學人疑處師復以果子擊案一下進云畢竟有箇親切處師云何不放下僧禮拜師復云此事大難須實實在那裏了得纔好你看世尊當日拈花後頭便生出許多葛藤你若總作佛法會有甚麼了期須是觸著便知下落方纔曉得世尊為人處正在那裏破綻處亦正在那裏你更在那裏替他缽盂安柄說甚麼一箇兩箇三四五箇了得了不得說甚麼法身邊說甚麼向上說甚麼三玄三要五位君臣法眼根境雲門三句既說不得你又作麼會他似山僧恁麼說話難道沒有伶俐衲子一句句穿過為甚麼卻了不得且道病在甚麼處良久云無事歸堂除夕茶話今夕除夕天下人俱向家裏度歲惟我衲僧隨寓而安將謂無家可歸殊不知我衲僧以山河大地為家以四生六道為家以喜怒哀樂為家以是非得失為家以甘苦平險為家雖論劫在途中而不離家舍雲門大師云會則途中受用既在途中作麼生受用故知在在處處俱有到家消息世人有父母妻子之家而非安樂長久之計時節若到聚散無常悲歡相倚雖暫時在家而恆居途路雖然以道俗相較固有如是便宜若我衲僧到得在處為家腳跟安穩亦知還更有長處麼良久云明朝又是新年月今夜且看人送窮茶話此事現前不過汝若鉤索將來便見玄遠祇如即今大眾在者裏會茶某果子好食某果子不好食者一杯冷那一杯暖何等天真靈妙及乎問著如何是佛如何是祖師西來意便有許多承當許多指示且道過在什麼處古人道佛法在日用處迎賓送客處痾矢撒溺處纔恁麼卻又不是也雖然如是須要開者箇眼始得汝若未開者箇眼雖全體是佛卻全體是眾生境界汝若開者箇眼雖日在眾生中總是佛之妙用所以云知之一字眾妙之門然又道知之一字眾禍之門汝作麼生折合今晚華首監寺為新首座普茶特請山僧茶話適來幾句子且道是要諸人知是要諸人不知良久豎拂子云大眾多少人在者裏作知不知會大眾佛法不是者箇道理既不是者箇道理畢竟合作麼生以拂子左右拂云珍重茶話言不可以示道心不可以入玄所以從上先哲無心體合不言躬行老僧自見先師得此滋味便擬向深山窮谷力行古道詎意因緣不偶後來在者破院住三五年那破院住三五年住來住去便是二三十年十年前澹監寺深悉老僧此意曾向三吳替老僧尋箇住廬山因緣三回兩次祇是不成就如今想起來始知因緣合在者裏既有監寺一副身心又得副寺直歲庄頭暨山園大小職事前後發起亦同一副身心所以五年之間儼然叢席雖則老僧初心亦是諸人願力互相湊合不得不歸之夙緣老僧今日到來安置職事與大眾會茶不可無說遂舉盞子云大眾住山須要得者箇著落復云有得食有得呷便是我和你底活計食了呷了拿起鋤頭挑起匾擔向那青黯黯處去不管他高低平突鋤了一畦又翻一正當恁麼時佛也覷你不得若是具眼底埋頭在那裏日三月三必定到親證田地就是初心淺學總教生按著不許走作分毫久久自然觸著磕著大眾此是汝諸人本分上原自具足底不是彊為祇是暫時岐路你若肯收拾世間底心一按按在三寶上全身放下一肩挑起老僧不教你求禪學道大眾你便是禪你便是道更求箇什麼學箇什麼你若還起一箇求禪學道底心卻似出得醬缸又入虀甕從上佛祖雖有言句卻是教你向無言句處不是叫你在言句上作境致你若向言句上作境致與那沾滯麤重境緣有何分別總是解脫不得說甚麤細于今說心說性說玄說妙盡是惡口你又在他惡口上左思右量豈不東行西向古人道學到佛邊猶是雜用心何況其餘大眾于今世間人祇有兩種障每日下得床來門外門內若大若細一切境緣悲喜得失你若透他不過時隨順了他便是被他流轉若不隨順便有許多礙塞處謂之事障一回瞥地轉向自己又在自己正位上住著不得自在謂之理障豁然醒覺回向日用在日用上一切時一切處頭頭上明物物上了纔喚做事理無礙更須知有牛頭出馬面沒指東為西喚黃作白到得者田地若不知轉變古人喚作貼體汗衫最難脫卻到不如我和你食飽飯肩上作具東嶺上西嶺下更自親切祇是你不肯承當大眾天下無難行底事祇要自肯發心于今現住著好山水相聚底都是絕好師友又有許多菩薩替你起了房屋趕趁錢糧種種成就你還當下錯過擬向什麼處去何不趁色力康健持一片衣一口食與眾作息歲久月深自然暗自點頭老僧不教你無利益努力向前取辦一生豈不慶快還肯麼久坐茶話一切諸法皆唯是心有情無情同入法界不了此宗功歸生滅所以一切眾生界即是法界一切二乘界即是法界一切菩薩界即是法界一切諸佛界即是法界但一切界現則法界不現眾生界現則法界不現二乘界現則法界不現菩薩界現則法界不現諸佛界現則法界不現非無法界祇是不現若法界現時觀一切界如第五大如第六陰出頭天外誰是我般若就一切界冥合法界如水中鹽味色裏膠青不壞目前且共來往心相體信自有因緣然雖如是古人又道法界一真猶存見隔見在即凡情忘即佛拈卻藥忌慎莫追尋諸人到者裏須防打翻茶碗
