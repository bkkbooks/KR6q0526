body:
  text: 嗣法門人今辯重編雜著楞嚴宗趣論宗也者極乎道之所究也趣也者正乎道之所歸也匪宗則趣無所示匪趣則宗無所造故宗以宗乎趣者也趣以趣乎宗者也以祖意教意而言則祖宗也教趣也然祖亦有趣教亦有宗所謂祖意中具有教意教意中具有祖意也昔世尊百萬人天拈青蓮華笑視大眾者宗也復曰吾有涅槃妙心教外別傳付與摩訶迦葉者所謂趣也達磨大師少林面壁九年者宗也而可大師求佛法印而曰不從人得者所謂趣也六祖大師為明上座曰不思善不思惡正恁麼時阿那箇是明上座本來面目者趣也明省後復問密意祖曰與汝說者即非密也汝若反照密在汝邊者所謂宗也宗與趣先後迭用而總之匪宗則趣無所示匪趣則宗無所造也夫宗有二種機如僧問趙州如何是祖師西來意州曰庭前柏樹子又如臨濟三度問黃檗佛法的的大意三度喫棒此二種即是一種然殺活同時主賓一致自非深證之士未易語此苟無方便則道幾乎絕矣所以後代老宿因僧問庭前柏樹子意旨如何宿曰還聞簷前雨滴聲麼僧曰聞宿曰從此入其僧便悟臨濟往見大愚愚云黃檗老婆為汝困徹了也還來者裏問有過無過濟亦大悟故趣亦有二種即以左右乎宗之機旨以相發明否則機妙失宗反成毒藥也然則何以為教之宗乎曰祖之趣是也夫祖不可以意意者也不可以言言者也若教則以意顯無意以言顯無言故曰祖宗也教趣也而教即以祖之趣為宗教之趣則又以導乎宗之會極蕩乎宗之岐路也故祖不可無教者無趣則宗無所造也教而無祖則趣無所歸玄言妙義悉屬筌蹄所以世尊說法四十九年而曰未曾說一字者非謂掃言說之蹟也欲夫人之即教意而得祖意也故凡讀教而不識其宗之所本趣之所歸不善讀教者也楞嚴第一最初便云汝等當知一切眾生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉此一部經之本宗也然眾生久在迷中遺失心性循諸妄想一聞常住真心性淨明體如說他寶不知所認故如來特徵其發心緣於勝相將何所見誰為愛樂正選眾生六根門頭常在出入而不覺知者以為識取之路此一部經之本趣也凡用趣者必先之宗欲見宗者必先之趣所以佛告阿難云汝今現坐如來講堂觀祇陀林今何所在而阿難當面錯過乃隨機一揭云汝今堂中先何所見又急轉一語云汝矚林泉因何有見宗趣既定然後在大眾中舒金色臂摩阿難頂告大眾云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路使阿難與大眾知其宗之所究以識其趣之所歸也夫以常住真心性淨明體為宗則宜直指心性以為本趣何故七處徵窮二種分別既不濫收其能椎將又保任於見性良以眾生心性從本不覺隨緣生滅以此緣生與生緣滅與滅物我不分內外混亂若不屏絕根塵推窮能所則一靈真性終無自認之日所以當七處既窮生平所據矍然自失然後分別二種使知迷中心性盡屬攀緣用處分明枉自遺失即如阿難反認能推非不現前無別然而能須由境此處倘無照了猶帶前塵正使境謝能沈箇中若不知非亦同斷滅故知如來一咄破其迷妄而已而非破其非心也世尊曰咄此非汝心阿難曰此非我心當名何等世尊曰此是前塵虛妄相想而下文又云我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事乃知世尊拈卻前塵影事使之自認其心不欲其混於前塵影事枉自遺失其心也夫此心此性生佛無別所別者迷悟耳迷則全水是冰悟則全冰是水以冰非水而去之別求所謂水者非也沃其冰而水自宛然破其妄而心自宛然六祖曰淫性本是淨性因除淫即是淨性身又曰淨心在妄中但正無三障覺範曰全體是妄情全體是真理不了號無明了之即佛智正謂此也先破其妄心而使之自悟有體後許其見性而徐辨其無是非是照用後先主賓終始各隨機候不可定執也夫心性在於分別則為意根在於色像則為眼根此皆從眾生日用現前便有無上妙覺祇為混入前塵而分別無體紛紜物像而自他不辨所以如來奪彼前塵而獨顯全性擇於見中而孤露我體或意或眼舉一以明或縱或奪率多方便引客塵要識主人之無故往指頭手為達見性之無卷舒人有今昔見何童耄須知真性遺失遂循妄想以分置內外顛倒想滅則盡大地總是妙明見聞同一倒正誰分自是現前之緣心難盡暫悟終疑豈知八種之見性不還是汝非物尚猶不敢自認終是物我不分至於見在我前又成物我不化世尊曰若必其見現在汝前汝應以手確實指陳何者是見阿難曰舉手所指縱目所觀指皆是物無是見者世尊曰汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難曰我又思惟是萬象中微細發明無非見者蓋為眾生從無始來迷我為物不知是我非我認物為我不知是物非物是以如來既言其物我皆妄又言其物我皆真旨趣深玄盡思難測如曰見與見緣并所想相如虛空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是文殊曰我真文殊無是文殊若有是者是二文殊而我今者非無文殊於中實無是非二相說至此而常住真心性淨明體之宗旨始露所謂趣以導乎宗之會極蕩乎宗之岐路者也蕩是非是之岐路以合乎常住真心性淨明體之會極然後知世尊拈華達磨面壁祖意果不可以意意不可以言言者也然後知教之果以意顯無意以言顯無言者也則豈非世尊欲人即教意而得祖意哉然祖意中亦具有教意可以互相發明者如雲門大師云從上來是什麼事于今抑不得已且向諸人道盡大地有什麼物與汝為緣為對若有針鋒許與汝為隔為礙與我拈將來喚什麼作佛喚什麼作祖喚什麼作山河大地日月星辰將什麼為四大五蘊我與麼道蚤是三家村老婆說話咦是亦可以悟矣悟則直下便悟若眼孔定動未有不別生岐路者如阿難聞無是非是乃惑為自然又惑為因緣和合世尊更以明暗空塞四義獨顯見性欲其於四義之中頓離諸惑則曰離一切相即一切法汝今云何於中措心以諸世間戲論名相而得分別欲其於四相之中識取見精則曰見見之時見非是見見猶離見見不能及夫惑斷而見見則實相現前是非俱泯宗趣了然而阿難猶以見見為惑者此正迷悟之所由分也夫眾生之見精在四相中而妄生諸惑者為不能自見其見耳惑之所生似乎能所臚乎現前其實覺見由於無始即下文云妄為明覺覺非所明因明立所是矣此世尊特以二種妄見例今日以目觀見山河國土及諸眾生皆是無始見病所成也苟知其為病則見與所見了不可得亦無所諱直下巍巍是為何等故又云阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虛妄有生因緣別離虛妄名滅殊不知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得至哉無是非之旨可謂深切明著矣觀其言陰入處界及四大七大皆云如來藏又云畢竟無體本無自性俱無處所又云此皆識心分別計度俱無實義無非皆真皆妄之論旨趣深玄盡思難測故下文云猶非真非真云何見所見又云真非真恐迷我常不開演即此理也此特先發明之耳乃阿難及與大眾雖悟一切諸有皆即菩提妙明元心心精遍圓含裹十方猶不能知其生起則不能了其目前故又有忽生山河大地四大不相容之惑所以世尊再為指出覺明為咎也夫有所非覺無所非明性覺必明妄為明覺覺非所明因明立所所既妄立生汝妄能無同異中熾然成異此所謂生起之由也而又曰此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷則目前之山河大地可以蕩然此如來藏中離即離非是即非即不可世間及二乘權小以所知心而能測度也法華經云如來明見三界之相無有生死若退若出亦無在世及滅度者非實非虛非如非異不如三界見於三界之相如斯之事如來明見無有錯謬必如是會乃可謂以妙明不生不滅合如來藏而如來藏唯妙覺明圓照法界者也若眾生則不然眾生不達山河大地由於無始覺明所生以為萬法別有根本與我為緣為對殊不知法無自體皆由我識心而有分別若除分別萬法自如所謂非心非空非地水火風等即心即空即地水火風等也所以下文云根塵同原縛脫無二識性虛妄猶若空華又曰知見立知即無明本知見無見斯即涅槃無漏真淨云何於中更容他物正與法華如來明見之旨互相明證也阿難既聞覺明為世界之所生起而又疑眾生何因有此覺明之妄不知覺明之妄因迷自有迷則無因此無性之旨又非二乘權學所能知也夫無性則無分別以無分別而妄起分別故能所對待展轉相生無有休息苟能於分別之中而識取於無分別之體則體性露現根塵迥脫始知從上已來心本嘗住性自明淨本周法界一回覺悟更不復迷正所謂見見非見見不能及通達實相一切俱無也故曰識迷無因妄無所依尚無有生欲何為滅若是沒量大人於此直達本宗則靈山一會儼然未散奚阿難猶切切以攝伏攀緣為請哉亦慮末法有恁麼理無恁麼事也謂生佛同是一心則無生滅不生滅之別謂縛脫原無二致則無煩惱菩提之分固矣然智體無性無依不能自了遇緣方了若尚未遇了緣則如審詳因心至於二種根本非不曉然將謂轉日用生滅之心反而依不生滅地而能依所依蚤成生滅此處若不徹證忽會根塵代謝未有不爽然自失者昔高峰初年自以為有所發明矣雪巖欽揭曰日間浩浩作得主麼峰云作得又曰夜間夢裏作得主麼峰云作得又曰既睡著無夢無想無見無聞主在何處峰遂惘然噫此即阿難疑斷滅時耶所以世尊復舉聲聞二義使之自信自肯要必確知本心不與根塵和合無毛頭許夾帶然後獨步丹霄自解作活世尊曰若實無聞聞性已滅同於枯木鐘聲更擊復云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者又曰如重睡人眠熟床枕其家有人於彼睡時搗練舂米其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘即於夢中自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑於舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅如此指示正與雪巖同一機趣佛祖無二旨矣試觀高峰日間夢裏主宰分明可謂在聲色中不隨聲色也奚為無夢無想便乃徜然當此之時使雪巖再舉聲聞二義峰亦未必甘心直下及枕子落地一回脫穎豈他人所能回換此所謂遇了緣也又如審知煩惱皆由六根招搖塵境識性居中發生虛妄猶如空華本無所有此可以言解結矣然亦有永絕生死證於解脫未免猶為識心者始知生死解脫均名幻化捨結取結全病所知若非真妄俱捐亦無俱捐之量言思路絕廓爾現前則安知知見無見之旨不猶為所知障哉圓覺云彼知覺者猶如虛空知虛空者即空華相亦不可說無知覺性又云眾生迷於生死妄見流轉厭流轉者妄見涅槃以故不能入清淨覺非覺違拒諸能入者有諸能入非覺入故是故動念及與息念皆歸迷悶正謂此也阿難曰今日身心云何是結從何名解世尊曰根塵同原縛脫無二識性虛妄猶若空華又曰知見無見斯即涅槃又曰自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立解結大旨至矣盡矣然古今人亦未遂言下領者是誰之過哉昔石鞏以弋鹿過馬祖祖迓之鞏問還見鹿否祖曰汝是何人鞏曰獵者祖曰汝解射否鞏曰解射祖曰汝一箭射幾箇鞏曰一箭射一箇祖曰汝不解射鞏曰和尚解射否祖曰解射鞏曰一箭射幾箇祖曰一箭射一群鞏曰彼此生命何用射他一群祖曰汝既知如是何不自射鞏曰若教某甲自射直是無下手處祖曰者漢曠劫無明煩惱今者頓息若石鞏所謂遇了緣者也選擇圓通乃修持之理亦大有宗趣晦堂云心外無法者不知煩惱習氣為何物而欲盡之翻成認賊為子從上言說是隨病設藥縱有煩惱習氣但以如來之知見治之皆善權方便誘引之說若定有習氣可治卻是心外有法而可盡之譬如靈龜曳尾於途拂跡跡生可謂將心用心轉見病深也圭峰密公云若能悟本法身本自無生靈靈不昧了了常知無所從來亦無所去然多生習氣執以性成喜怒哀樂微細流注真理雖然頓達此情難以卒除須長覺察損之又損如風頓止波浪漸停豈可以一生所修便同佛地但可以空寂為自體莫認色身以真知為自心莫認妄念妄念若起都不隨之臨命終時自然業不能繫以二老較之則晦堂為宗而圭峰為趣眾生根器高下不齊苟廢圭峰之說則有執一切現成反認虛妄以為真實清涼所謂即妄為真如處陰影滅也所以溈山云若是真悟之人他自知時修與不修是兩頭話今雖從緣得一念頓悟自理猶有無始習氣未能淨除須教渠淨除現業流識即是修也不可別有一法教渠修行趨向從聞入理聞理深妙心自圓明不居惑地縱有百千妙義抑揚當時此乃得坐披衣自解作活始得以要言之則實際理地不受一塵萬行門中不捨一法若也單刀直入則凡聖情盡體露真常理事不二即如如佛溈山可謂宗趣俱備深得如來權實兼用之旨也故善達宗者不滯乎趣善會趣者不失其宗祖與教皆然也即如選耳圓通者謂從此入不從此住也一根返原六根解脫六解一亡者謂捨權歸實非即權為實也至於三決定義與三增進漸次猶治煩惱習氣之論也然亦去其所本無為見有煩惱習氣者言之耳非謂別有一法令其修治趣向也一切眾生不悟自心於自心中妄見境緣妄生取捨隨其取捨造十習因受六交報所謂以究竟無成畢竟有若能悟業無作當下妄息直見本心心心不別還於本無於所本無實不見心外復有一切煩惱即不言修可矣苟其未至於本無則四十四心及諸天品類層層位置要皆增進中有無輕重之驗去一分煩惱即證一分真實去之盡即證之極亦非別有所謂證也若別有證皆屬心外於五陰中心生聖解種種計度悉墮魔外豈知等妙二覺尚有一分極微細所知愚惟佛一人始稱見性然則常住真心性淨明體凡夫具足歷聖難盡推窮究竟不越吾宗為第一義諦也楞伽云佛語心為宗無門為法門故教中無量義海皆發無門之旨所謂趣也所謂正乎道之所歸者也禪醉十則禪醉者何謂也蒙周曰醉者之墜車雖疾弗死骨節與人同而犯害與人異其天全也予醉于禪而寱是猶墜車者矣寱而無解乎醉殆所謂骨節與人同而犯害與人異歟使天下之人因其寱而識其醉則予之得全乎天者亦將以全乎人之天也反而齁齁然鼾而弗之醒至足矣又安知其所謂疾歟一致知崔子石師問佛於天然曰某儒者將易而佛得乎天然曰儒不學佛佛不學儒儒不學儒佛不學佛吾聞道不相學亦不自學也相學者寇人自學者寇天皆道之所棄也雖然子儒者也吾與子言儒孔子曰致知在格物何說乎崔子不能對日有對而不侔天然進而語之曰天下一知而已矣無所謂物也自知窮而為物物又物物而物益不窮焉名之所昉乎狀之所紛乎義之所別乎類之所繁乎之數者盡天下之所謂眾人者日恫恫然而不自知所往而不自知所來喜喜之怒怒之哀哀之樂樂之不以為縛曷求其脫常憂不合孰冀乎離波波汩汩遂成古今是皆不知其為物而安然者也夫惡知乎安然者之為是而不知之為非乎夫惡知乎不知之為是而安然者之為非乎有智者惡其不知而以知為貨以物為利欲貨出而利返奔走道路物我兩衡主賓相易自以為知過眾人而不知其不若不知也自以為不安於罔而不知其不能安也天下黑白同異牝牡成毀而已矣知黑而黑知白而白知同而同知異而異知牝而牝知牡而牡知成而成知毀而毀固然者物猶不化矧其未至於固然者耶若舉父於子舉兄於弟舉夫於婦則人之父子兄弟夫婦是必啞然而獨不啞然於知黑白同異牝牡成毀者聖人之所以不能無言也言出而是人不知其非是言出而非人不知其非非是非者萬物之鄉也引知於物而非會物於知者也是故學聖者愚學愚者賢聖人遇愚而賢遇賢而愚知而不知不知而知物而不物不物而物物而不物物盡我也不物而物我盡物也物盡我者無物我盡物者無知無知而知不足言矣故曰藏天下於聖人易藏天下於天下難二近非道戊子夏阻饑於海雲其徒少食而讓天然喟然曰吾道其以人喪耶又一日食而任天然喟然曰吾道其以天喪耶內記巖子揖而前曰巖得間矣昔也食而讓夫子以為道非讓之所幾也今也任任斯近矣聞以人喪未聞天喪者也敢請天然曰君子猶惡其近之也適燕者八千里吳半之齊又半之人知夫齊近而吳遠也亦知乎近猶齊而遠猶吳乎吳與齊其有辯乎無辯耶半之又半之其有辯乎無辯耶人有宴處者解衣適體磅礡於無何有之鄉適適然爾忽而覺焉曰君子不以容飾眾不以私棄物吾囚首裸身吾不能使茅吾心而塞吾目也一旦峨冠冠之文衣衣之夏伏浹汗如注乃久而苦之曰甚矣吾之不能安其天也夫人出而拱揖入而偃息無是我也誰為非歟吾向者獨居寢處解衣磅礡無與人耳目奈何自困若是是眾人以天而吾獨以人也於是去冠還衣從乎其朔而後知向者之樂不假人也苦而後知其樂不假人之為然也傭者過之怪而問焉曰夫誰不莊於處眾而佚於自處耶而嘻嘻其幾得之若外加何為者人不能荅而終以為非傭者之所知其樂也嘻天下之士之去其仁義禮智以為道也亦若是已耳夫仁生於未仁義生於未義禮生於未禮智生於未智夫未仁非不仁未義非不義未禮非不禮未智非不智非不仁義禮智而後仁義禮智猶是未仁義禮智也而後未仁義禮智猶是仁義禮智也鶴脛長鳧脛短鶴不長其長故鶴鳧不短其短故鳧不長其長者之不能不鶴何異乎長其長者之不能鶴也不短其短者之不能不鳧何異乎短其短者之不能鳧也迷此者罔覺此者殆罔與殆皆道之所不共也三天不可合潛子為有得於天也日以合天之說造而餘以變物天然聞而歎撫而告之曰天可合乎天可合亦可離也天可離乎且而窮上下四維之蒼蒼之冥冥之蓬蓬之轟轟之烈烈之濛濛之潺潺之亭亭之森森之潑潑之汩汩之歷歷且而牖聰鑿明鏤思刻慮以求彷徨乎天之所以然天之所以不然譬西行者東馬首矣猶敝敝然曰若合若不合若離若不離言之倫與否不可得而正也語天者曰鵠不日浴而白烏不日黔而黑曰白與黑非人之所與也而白之而黑之誰將與乎鵠不自白有為白者烏不自黑有為黑者抑而知乎鵠不自鵠有為鵠者烏不自烏有為烏者鵠與烏方不能自天其天吾與若日滑滑乎天其白天其黑也然乎不然乎人有獻鹿者曰馬也人有進鐘者曰甕也則吾與若必相目而笑為勿足辯也何居乎鵠與烏而固之則何不仰觀翔而南麓者適適然不知其為南也不知其為翔於南者也奚似乎則何不仰觀乎翔而北麓者適適然不知其為北也不知其為翔於北者也奚似乎頃而南者復翔而北亦猶乎北也亦猶乎北者也頃而北者復翔而南亦猶乎南也亦猶乎南者也頃而南者北者相遇諸途且不知其為南者為北者且不知其非南者非北者且不知其非非南者非非北者上下頓易四維錯處人我相失名實俱喪吾與若且收而視塞而聰休而心志絕而內外之辯去而離微之知而今乃廓然于向之所謂白者非白也黑者非黑也則所謂鵠者非鵠也烏者非烏也天乎人乎颶風怒發不擇其號吾又惡知其為調調乎為刁刁乎吾與若一鵠烏也古與今一吾若也放乎六合之際舉乎褦襳之間無所與合安所得離哉四天不可非於是潛子爽然失戃然若有悟也曰天乎其不可以言言乎其不可以議議乎其不可以知知乎其不可以識識乎某也向者以言言天而不知是言非天也以議議天而不知是議非天也以知知天而不知是知非天也以識識天而不知是識非天也然則天無是而有非乎去其非而是自是不必是乎天然曰噫猶是合天之說也曩也子以合合知其不可合也而離之是又以離為合者也何離乎曰離非天者也何非乎曰落馬首穿牛鼻者也而且牛者誰耶而且馬者誰耶而且落而且穿者誰耶觀海者足地不得其海之全也身乎海而後上下四旁內外本末所見無非海者君子體道其初也如受其既也如棄其終也如未始受未始棄非去其受與棄之跡也夢涉水者覺不摳衣夢饜酒者覺不攤髮當其夢也廣廈高堂猶是椅席琴瑟猶是人物牛馬猶是車服玩好猶是而宴會而拱揖而談而笑而喜而怒而是而非無非夢者及其覺也高堂廣廈無別椅席琴瑟無別人物牛馬無別車服玩好無別亦宴會亦拱揖亦談亦笑亦喜亦怒亦是亦非無非覺者夫是覺者則必非夢者是夢者則必非覺者因而是夢覺者則必非非夢覺者非非夢覺者則必是非夢覺者而豈知欻然而夢亦欻然而覺欻然而覺又欻然而夢吾與若久相安於推移之中無有為是誰與為非無有為非誰與為是是亦一吾若也非亦一吾若夢亦一吾若也覺亦一吾若果且有是非夢覺乎哉果且無是非夢覺乎哉域之西有幻師者能使男女從口出若器若具若醴若饌又從男女出拜起坐立嘻笑怒罵無異真者聚觀如堵容貌音聲幾不可辯幻者曰諸而以幻我乎若亦幻也以若真乎吾亦真也然若之所謂真與幻者父母之所生一日百年之所異已耳然吾觀幻師如父母觀若之父母如幻師且奈何者吾又觀一日如百年觀若之百年如一日且奈何者且若能非吾吾亦非若若能自是吾亦是吾是非之權兩用真幻之數相窮古今皆然也諸君去矣吾不敢復以言惑矣於是收而器具攢而醴饌使從男女入男女從幻師入遠近觀者一時俱散五鴨腳木天地廣漠也萬物繁息也山川流峙也草木森秀也男女家室也人事同異也鴨腳木而已矣破子卷破顏而進曰自天地乎自萬物乎自山川乎自草木乎自男女乎自人事乎天然曰此固然之說也固然者不可以語道久矣卷曰非天地乎非萬物乎非山川乎非草木乎非男女乎非人事乎天然曰去物之理絕類之通猶聞聲而悟見色而明者之所為也卷曰然則天地非天地而天地也萬物非萬物而萬物也山川非山川而山川也草木非草木而草木也男女非男女而男女也人事非人事而人事也將為轉物而不若其轉己也轉物者同己轉己者同物同于己者己不可敗同於物者物莫能過歟天然曰噫所謂喪我者耶而未也夫物不勝絕我不欲喪聖人之道幾之者失之矣於是卷蘧蘧若夢之覺也曰卷得之矣夫惡知天地萬物山川草木男女人事之不可以我與耶夫惡知我之不可以我與耶夫子曰物不勝絕固哉物不勝絕也而又惡知其不絕者之猶絕耶夫子曰我不欲喪固哉我不欲喪也而又惡知其不喪者之猶喪耶劍刃之蜜舐之者傷毒蠱之水嘗之者亡思與慮智與故之為道寇也今而後卷得之矣天然咄而曰吾道墜矣卷瞿然起避席久而後言曰卷也向與道遠夫子猶進而語之靡有合也亦勿棄也今而卷若得之矣而夫子曰墜墜者何謂也然則卷皆非歟何為是者言畢壘足而立側而聽天然間然曰天下無有得道者也亦無有失道者也夫誰得而是而非之也耶鴨腳木而已矣以為是鴨腳木鴨腳木不受是也以為非鴨腳木鴨腳木不受非也然是亦不能外非亦不能外鴨腳木而已矣故吾知天地鴨腳木也萬物鴨腳木也山川男女鴨腳木也草木人事鴨腳木也而不知鴨腳木吾亦鴨腳木也若亦鴨腳木也而不知鴨腳木豈惟吾與若不知鴨腳木亦不知然而非無鴨腳木也此其所以為鴨腳木也夫此其所以為鴨腳木也夫六性習習之不可語於道者非性之所恆有也性之所恆有則習之所恆無者而已矣日為之而是不知其是日為之而非不知其非是與非非我之所得而有也我不得而有有之斯愚我不得而無無之斯蕩天地之曠古今之寥貴賤智劣勇怯情偽苦樂生死寵辱共相推于愚與蕩之域而不止者天下皆然也然則有之不可以無也而有之以為性無之不可以有也而無之以為習殆庶幾乎天然曰噫此道之所以不明歟夫習非我之所得而有則性亦非我之所得而有也久矣夫性非我之所得而無則習亦非我之所得而無也久矣性苟可有何異于習習若可無性亦難辯古之聖賢所為行仁蹈義體道服德莫不明於其故謂確乎我之性命所從出之原而不覺其習者至於興一念而非聖賢之正行一事而非天理之極則推之於見聞之數欲一一澄而汰之以訖于無有而試思一念之興興于何自一事之行行于何成以其非聖賢非天理也而曰此見聞之端從外而至乃向之行仁蹈義體道服德則又深切著明以為必自己出而堅持於無敝此直人情欣厭之所形耳安知乎是則皆是而非則皆非也耶皆是無是皆非無非無是而不有於其所有無非而不無於其所無是故性與習者人之所執而返之皆可以為道也易曰智者見之謂之智仁者見之謂之仁百姓日用而不知仁智是而百姓非耶百姓是而仁智非耶苟非其人道不虛行無傳之旨吾知更千萬祀而終不得或偽也已七百姓日用而不知百姓者聖人之所出也生於男女之間長乎飲食衣服之際言無異詞行無異軌囿乎見聞安其嗜好熙熙然處乎儔伍之中而不知天地之外委形耕鑿絕志漁樵蕩乎聲色貨利而不以為恥馳乎宮室輿馬遊獵伎樂而自以為樂甚讀古人之書模古人之作掇其詞以為文章華藻茹其理以為博聞精識布其德于倫物行誼之林大其業于功名節烈之事歷憂患而不悛處生死而無憾山川陵谷之浩瀚風雨雲煙之變忽草衣木食之絕俗微言玄義之深雄遇之若固然而不求其故取之一日之樂而棄若從無所遭之時奪之以忽然而不知懼縱之以百年而不知止盡天下古今之人未有能踰之者也君子曰此可用而不可用也其可用者聖人不得而及之也其不可用者聖人不得而驕之也匪惟不驕雖驕之而不可也花者香而已矣有鼻者所共聞也即而求之而有不可得已水中之月皓皓濯濯心目遇之適焉已耳而終不知其所至聖人之於百姓也無與為生而悠然其並生無與為長而茁然其並長言不可異不出百姓之無異行不可別不踰百姓之無別迥於見聞而故囿之脫乎嗜好而故安之拔乎儔伍而處之若昔絕乎天地而昏然如瞶群耕鑿而無餘心混漁樵而有遐樂去聲色貨利之習若濡焉不恥于人泯宮室輿馬遊獵伎樂之情未嘗絕人以樂讀書摹古作述猶人同文章華藻于詞林採博聞精識于碩彥倫物行誼德固嘗稱節烈功名業亦所重不攝於憂患而趨避如塗人不動于死生而去來無奇跡酷性于山水陵谷而忘其高深寄情於風雨雲煙而任其舒卷慕草衣木食而不知其所以然愛微言玄義而等若朝歌市語一日樂之百年如夢古之君子所為日徘徊于此終其身而不得其妙者也而又曰百姓不知不如聖人聖人知之不如百姓百姓知之失其百姓聖人不知迭乎聖人此又何說也惡其似也何似乎知之故似之也知其並生而安于男女知其共長而成于飲食衣服無異詞以為言無別軌以為行見聞因乎耳目而嗜好順其心思耕鑿愛其委形而漁樵取其絕志儔伍之中可以休矣天地之外何必求焉豈聲色貨利之可濡曾宮室輿馬遊獵伎樂之足易或倫物行誼或功名節烈憂患可避生死曷逃山川陵谷風雨雲煙耳目足樂遑顧其他草衣木食微言玄義身心無外言之弗及無有一日何謂百年此殆知乎百姓之不知者耶然而百姓之不知也固如是乎非耶故曰惡其似也夫百姓以不知而不能為聖人而以知失其百姓使苟悔其知之失而安于其初之不知以為聖人之所不如而亦不可以為道而道又終不離乎百姓之不知也抑難言之矣古人有言曰道在穿衣食飯處行住坐臥處迎賓送客處及其悟焉又蚤不是也在百姓方缺然其弗克悟及其悟而猶非之然則將何處此而後無弊哉孔子曰民可使由之不可使知之若孔子者殆所謂知道者歟抑或別有說焉而不得言其所以然者歟八椎魯椎魯之士可以合道而不可以為道也何謂合道為其有道之用有道之心有道之功而終不得自處焉故曰不可以為道也天下寒衣饑食而已矣我不敢知曰聖人猶乎人亦男女居室吉凶趨避而已矣我不敢知曰聖人猶乎人然而耕夫蠶婦衣食之外無所事飽煖之後無餘情行乎居室無所論其美惡接於美惡不能動其欣厭之亻愛不至於大寵憂不至于大辱苟有趨避脫然而止而無為預于先為善于後之計我固知其有道之用也有其用而不居其德亦不復知其不居之為是此其心即聖人猶難之而且遇君子而自不以為穢遇小人而自不以為潔聞一善言見一善行或亦咨嗟詠歎之乃斷斷然不得其取以自為之意及其惡惡也非有必惡之心故愛惡之情可以頓易轉移之處理義莫憑此則盡聖人百年之功而不及其一日之所行也惟是與物而不了遊聖人無礙之藩而不能以自有之而自處之遂終其身為椎魯之士而已矣然則或可為乎曰可得其人而師之明于其方而堅志定氣焉及旦暮遇之然後知其不可以告人者也九聰辯聰辯不可以為道也天下之士皆知聰辯不可以為道也而卒莫廢然置之而不用徒曰道不可以智知不可以識識耳果若是也則夫不可以智知不可以識識者又何為乎天地山川草木人物道之散也心思耳目手足道之載也此可知者也曰天何以高地何以卑山川何以流峙草木何以盛茂人物何以靈蠢心思何以睿智耳目何以視聽手足何以持行此可知乎以為不可知矣而安然以俟其一日之至道亦未可絕也而聰辯之士乃詡詡然曰天自高也地自卑也山川自流峙也草木自盛茂也人物自靈蠢也心思自睿智也耳目自視聽也手足自持行也其可知者百姓之所共也其不可知者聖人不容鑿也于是舉天下之道相率焉至於不可知之域而止而豈知即其知之所為變現者歟聲色可樂也亦知其不可樂也宮室輿馬園沼遊佚可樂也亦知其不可樂也玄言妙義識解意會可樂也亦知其不可樂也可樂者人之情也不可樂者返其情以合道者也人之不順其情而反之以為道者知之能事耳可恃乎寤可恃也寐可恃乎生可恃也死可恃乎且而巧託乎不知之域其心亦甚不安矣人有修髯者生以來適適焉矣詰者曰人之寢也必有覆也彼修而髯者覆內乎覆外乎其人忽而疑焉終其夕內外無所措或告之曰髯自昔矣而今乃疑何謂也知之故不能忘之也其人悟而廢然若假寐者達旦而不能復寢非其昔之所忘之也今之為道者非其知而疑則其假寐者而已矣以支那之人習支那撰述或一二過而誦成或五六七八過而誦成讀梵書則終日而不憶一字無所容其知識之心也使童子習焉則唐梵無別無所求其知識之理也以無知識之心合無知識之理久必冥契而天下之人之不能不容心其間焉而曰道難合也道難合也吾是以啞然而不能噤耳十非習非心識何生乎曰生乎習習何成乎曰成乎心心何依乎曰依乎識何謂生乎習曰人之始孩也啼與笑而已矣示之以白不知其為白也示之以黑不知其為黑也長而後黑白判然不可易矣原其初不過習聞乎人之所謂白者所謂黑者久之而遂謂我之能辯乎白能辯乎黑也於是更有以能辯者為心而不知其為識也既不知其為識而又欲使識與習遠是猶絕稻種而刈其根不知其傳于穀之所含而布者廣矣然則去習何道乎曰問其習之所成者而已語始孩者曰白怡怡焉耳何物乎語始孩曰黑怡怡焉耳何物乎此非黑白能易乎始孩之心也而非心則黑白終無所附乃人無端而黑白之始孩又無端而習聞乎人之黑白而黑白之虛妄相承窮千百劫而世間之名相牢不可破者萬法雖虛而持萬法之心不能虛也是故愚人除境不除心智者除心不除境境影也心形也形直而不得其影之曲形曲而不得其影之直人知影之曲直咎不在影也獨不知形之曲直咎亦不在形遂使除心之法與除境同功而天下之自以為智者究亦無異於愚人之所為此道之所弗可成歟昔華氏國有白象國之人犯罪則必令蹈殺之頃象廄為火所焚移置寺中數月耳付之罪人則鼻嗅舌舐而去國王怪而問之智臣曰此象近寺忘之耳移之屠肆當反其舊王從之其言果驗說者謂習之力所致也則何以習于廄亦可易于寺苟以為心之力所致則在寺之心當不復為近屠之心可易非習可為非心然非習不能不為習之所囿非心不能不使心隨所轉故曰依于識也而要所囿者終非習所轉者終非心則所依者終非識而古今之大聖人徒有俛首噤口焉此吾之所以不得言之也歟
