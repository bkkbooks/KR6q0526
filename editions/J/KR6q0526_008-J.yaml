body:
  text: 嗣法門人今辯重編問荅師問僧聲色樅然撥不是不撥不是你作麼生僧云我總不見有過師云見有過也不是見無過也不是畢竟作麼生僧無語師云何不問山僧僧如問師云快打茶來師指面盤問僧面盤為甚祇麼圓扇子為甚祇麼直僧云扇子自來直師云你為甚麼不直師問僧生死到來如何了僧云即今是了不了師云汝者句還抵當得生死麼進云本無生滅師云汝者句還抵當得生死麼僧直出師云咦僧侍立次師云者事無大難祇要不受一切拘束便得良久復云假如見得生也沒過患死也沒過患順境順境沒過患逆境逆境沒過患水裏水裏沒過患火裏火裏沒過患此人還受拘束也無僧云者便不受拘束師以手指著云咦又傍僧云只者見得便受拘束了也師云假如不見得還受拘束也無僧云不受師亦以手指著云咦僧侍次師云結制來利益多少僧云和尚喫豆著師云問爾利益多少進云和尚還知味麼師云爾卻伶俐僧良久師云情知爾不識好惡僧拍掌師便低頭師問僧佛法到十成不得其妙且道病在甚麼處僧云病在疑處師云疑又病在甚麼處僧擬進師便打兩僧侍立師云你兩人各道一譬喻看一僧云蒼蠅咬破鐵鍋一僧良久師云總欠一著師問僧你還識主人翁麼僧云識師云主人翁還有足也無僧云無師云為甚今日擔石去來僧云大死人有足為甚麼行不得師云你卻不是死人士參次師云朝聞道夕死可矣孔氏何嘗不論生死分明說聞道可死便確然有箇打發生死底道理止是當時沒有構機底人便教孔氏纔要露出卻又收起諸公還信得及麼只今且問諸公喚什麼作道士起請益師云明日再來士罔測庫僧求開示師云因果大要分明進云某甲於此卻甚明白祇是本分事乞師開示師云更要精勤著一事炤管不到便未免有不妥處僧罔措僧求開示師云爾好好地要討事作麼僧復求師打一拂子云會麼僧云不會師云參僧問一切眾生皆有佛性為甚麼不識不知師云大好僧禮拜師轉問云一切眾生皆有佛性為甚麼不識不知僧云腳蹋實地師云恁麼則諸佛為甚麼出世一切眾生畢竟作麼生了僧云當下歸去師云又爭得僧復舉離心意識參絕凡聖路學語未畢師便打僧禮拜云請師直指西來意師又打僧復拜云請師直指西來意師又打僧禮拜起師以拄杖橫一橫僧擬接師云者何等杜譔僧無語師云出去僧便出師云來來僧回首師云前日華首火燒山幾乎連累常住僧問承師教某甲不看話頭某甲靜裏返觀莫怕沈空守寂麼師云祇者怕沈空底還落空也無爾底道理爾底言說爾底思量計較者倒是空底去去來來唯有者箇在且道作麼生是者箇僧欣然作禮師云且退僧問生死到來作麼生了師云我者裏沒有什麼生死亦沒有了不了僧跪求開示師云且起作禮我總沒有祇麼閒家具與爾作障礙去僧禮拜復啟云某甲夢中多與俗人無異像者等作主不得師云既是夢爾要管他作麼僧禮拜退次早再啟云某甲昨承大師開示夜來果得妥帖師云爾恁麼又多事了便連聲喝出僧問除卻揚眉瞬目請師指示師云露柱燈籠進云既是露柱燈籠語未終師便喝云逐塊漢食粥次師語飯頭云今日粥不好食一僧云暹羅米師云既是廣州人為甚麼卻喫暹羅米僧云施主送來師乃笑顧眾僧云且道者僧會不會方丈榜聯幸汝不會會則闍黎無分全是山僧賴予未甘甘則山僧便宜辜負大眾師一日顧侍者云作麼生說箇未甘底道理侍者云世尊拈花猶未甘在師云汝伶俐者直出侍者呈麻三觔頌師看畢曰頌到用得他時若明此事上語錄且不必改易奈即今未了何者曰頌既用得為甚未了固求說破師云若說破即賺卻汝者屢懇師乃云有箇譬喻如人叩門尋非巖汝卻應云非巖不在者不測良久云然則來說是非者便是是非人師云作麼生處他著者又不測僧問大海水流時如何師云是什麼話僧云某甲不曉特來請益師云你不曉我更不曉僧復理前問師云還要第二杓惡水麼僧問識得恁麼事便放身捨命豈不是師云放身捨命阿誰道是來僧問此事不可以無心求不可以有心得不可以言語會不可以寂嘿通乞師指示值侍者進薑次師便食薑良久云會麼僧禮拜師約住云作麼生便禮拜僧云用開口作麼師拈起薑云且道者一片因甚置得僧無語師云杜譔禪和僧問世尊睹明星悟道求和尚下手工夫師云直下無下手處進云畢竟有箇著落師云且看腳跟下師問僧如何是你自己進云者部是書師云為甚麼福州人著賊卻來者裏受屈僧無語師云為什麼便開口不得僧問大耳三藏第三次為甚麼不見忠國師師云不是同床睡焉知被底穿僧進云畢竟國師在什麼處師云好箇國師卻被大耳三藏穿卻鼻孔師問僧父母未生時在什麼處安身立命僧云某甲日用中元無站腳處師云汝無站腳處卻有流轉處僧瞿然師又問一僧云父母未生時在什麼處安身立命僧云即今師云猶是已生時說話僧云不可別有師云父母未生時從何得者消息來僧茫然師問僧甚麼處是趙州勘破婆子處僧云何用趙州師云古今榜樣僧云趙州猶費足力在師云卻是你費口力僧呈偈師未及看以拄杖連打云會麼會麼僧云學人不會又連打數下云會取不會者侍者燒香次傍僧云今日彌勒佛誕師云彌勒佛在那裏者云火裏師云火在那裏者以香箸放案上師云大麤生師食柑次隨拈一瓣云不得喚作一瓣柑喚作甚麼語未畢侍者隨出一喝師云只管喝作麼者拈花瓶放左邊師云移瓶作麼者云供養和尚師便棒阿侍者隨喜舍利回問云聞真淨和尚舍利陷槌裏是否師云爾道陷底是舍利所陷底是舍利進云不可總喚作舍利師云未在更道進云衲僧從來不進者保社師云更道進云請和尚放下者栗棘蓬師便云何不道某甲終不肯隨和尚顛倒去石鑑侍者呈風旛頌云不是風兮不是旛僧繇摩詰畫應難日日與君華下醉不禁春色滿林間師看畢顧阿首座云此頌甚佳但中易一字汝道是何字座良久云當易禁字作知字師歎云信知此事有觔兩石亦躍然稱快師命一僧著圓覺經居一切時不起妄念四句屢不契乃云此語自大慧禪師頌後遂有將麻三觔乾矢橛等語和會竟成頇顢當究理始得僧懇師代著師著居一切時不起妄念云某甲自知去處於諸妄心亦不息滅著云終不向死地上求活住妄想境不加了知著云惺惺不是惺惺於無了知不辨真實著云懵懂不是懵懂僧問一大部般若盡是說心為什麼華首老和尚註心經說心是體般若是用師豎竹篦子云會麼僧擬進師打一竹篦子僧復擬進師以竹篦子指其口進云畢竟體用作麼分師豎竹篦子云者箇是體是用進云者箇體用不可得師云體用不可得你作麼生得僧無對師打一竹篦子僧復理體用話師喝出僧問有情來下種因地果還生無情亦無種無性亦無生意旨如何師云有情來下種未下種以前作麼生因地果還生未落因果以前作麼生你知此二句便知下句著落僧云恁麼則成佛後亦增減半點不得師云元不曾成佛僧問于今日用見聞覺知便是某甲自己麼師云若是見聞覺知是你自己如今一切人皆有為什麼又要悟僧擬進師云你若離了見聞覺知還更別有麼僧復問圭峰云作有義事是醒悟心作無義事是散亂心某甲依而行之還得麼師云喚什麼作有義無義僧擬進師以手掩其口僧禮拜師云汝若知歸則痾矢撒溺皆是義事若不知歸則供養三寶皆是無義事僧問承和尚有語云知痛痒底要他不知痛痒是何意旨師云還要拄杖麼進云不知痛痒底要他知痛痒又作麼生師云汝既解問前一句何復更問者一句進云畢竟作麼生師以手掩其口進云畢竟要和尚道一句師打云是一句是兩句僧禮拜云有意氣時添意氣得風流處且風流師復打云且打你者兩句一日師靠禪床有僧在床下靜坐師云汝與麼靜坐好還是出去亂走好僧云都好師云何不道都不好僧無語頌古世尊初生愛君頻喚君不敢避君瞋瞋則從他瞋知心能幾人世尊睹星悟道盡道睹明星悟道誰知從此事如麻縱饒捉得瞿曇敗也是除他空裏華祇為貪他一粒粟卻來誤了半年糧月明千古無人識夜夜山頭空斷腸女子出定美女當危樓聊為一引盼顰笑本無心醉殺窮酸漢出定不出定缽盂上安柄一隊閒鬼神向女子乞命梵志持花供佛雙手持華供養佛一呼一應豈徒然直饒內外都教捨依舊從前梵志仙舍利弗問月上女昨夜秋風到簟涼梧桐葉墮帶微霜浮雲吹去復吹住明月炤池兼炤窗蕩蕩漁舟紅蓼遠行行鴻雁碧霄長涅槃無路休尋覓青黛蛾眉獨著忙殃窟摩羅傳產難語美女尋芳出畫屏繞欄縱目不勝情侍兒恰似解人意多折梅花貯淨瓶文殊荅奄提遮女生死流轉話生與無生是甚麼徒勞特地問如何文殊因病聊施藥直至如今錯會多修山主荅進山主生死流轉話特來平地鼓波瀾縛得獰龍自在還好手為他點眼去一聲霹靂羨掀翻歸家更不問程途夷險安危夢裏殊夜半一聲山犬吠醒來明月照棲鳥傅大士法身頌雲近蓬萊常五色雪殘鳷鵲亦多時為君舉似鋤頭偈莫當唐人兩句詩六祖風旛杜鵑啼遍春山嵋啼得血流總不知驚起石人輕一拶從今不笑鷓鴣兒風旛不是有來因只要當人認得親行者無端輕拶出至今無地可藏身非風非旛亦非心眼見如盲不可論隨流認得波全水依舊寒潭深又深昨遇耕田人說道雨水多山僧只管笑總不奈伊何永嘉參六祖非意由來不是無任從天下強名模無生直下猶回顧兔去徒勞更守株忠國師勘大耳三藏攜手西川觀競渡天津橋上又相逢行行不覺秋江晚共入蘆花深港中丹霞謁忠國師萬仞洪崖不可躋到來山日與眉齊啼猿唳鶴尋常事多少行人路自迷百丈再參問荅分明大用酬震威一喝有來由果然百丈聲三日直使聞言心已休夢裏疆場金鼓忙分明記得已還鄉重圍直透春雷動不解征衣困在床殷勤畜得鳳凰兒棲老梧桐賽畫眉無端一陣東風起吹入雲衢總不知百丈野狐老漢全身墮野狐千年點雪付紅爐虛空有鏡難藏影霄漢無形莫強圖五百生前真面目一朝巖下舊皮膚泥牛入海無尋處空見時流日打模殘橋斷壑日聞猿十度經商九不存遊冶豈知山路阻夜深騎馬過前村南泉斬貓兩堂元不是他人舉起貓兒本有因大眾一時遮過眼快刀千載不生塵提瓶挈水尋常事蹋磴搴藤分外春慚愧趙州能救得草鞋頭戴又重申兩堂未必是無言利刃從來命罕存惟有趙州知此意夜深乘月過前村南泉玩月相逢盡欲到皇都親到皇都自不誣白馬銀鞍新貴客澹粧素質舊名姝富來不羨金珠貴貧去終歸公族殊蕩蕩無言真古道令人相對意全孤南泉荅僧遷化話百年身後向何去異類中行王老師圈內不驚頭角別溪邊誰問東西馳重雲深樹笛聲近淺渚平沙鼻孔垂更有一般奇特處日常水草盡知時南泉指庭前牡丹示陸大夫一體同根不易論鏡中頭面豈為親夢來花鳥渾忘我覺去聲香似隔鄰若箇暗銷芳草綠為誰辜負洛陽春多因貪看天邊月賺卻風前獨立人本是同根無二體反因肇論卻顢頇分明指上重拈出豈較時人夢裏看南泉牧牛買華不買葉帶葉影參差愛他長若此倒插王軍持南泉智不到處話智不到處切忌道再徵行履作麼生僧堂直入無回顧異類中行尚問名明月已隨流水去白雲猶向故山縈動容古路今仍在道著依然頭角崢亮座主參馬祖心意俱非覿面逢講經不信道虛空平田淺草難藏虎古澗寒潭有臥龍明月萬山人影絕落花深院鳥聲通一從去後無消息留得長松待曉風趙州庭柏趙州老漢絕囊藏一句明明直舉揚更擬將心明箇事雲煙滿目便郎當金剛寶劍當陽拔千里神光透體寒也只儂渠腰上物等閒礫破眼睛看趙州勘臺山婆子五臺古路日曼曼猶憶還家夢正寒杜宇啼殘風雨暗海棠落盡霧雲團何曾鑿破溪山色長此登臨天地寬惟有趙州能解意葛藤留得到今看李四奪人牛卻被張三截若要太平時除非賊殺賊不賊不殺不殺不賊腰間有劍定難饒切忌街頭逢孟八賊賊虧心不畏老婆知哮吼還他獅子兒百萬雄師全背水漢家原是漢旌旗十斛明珠顆顆圓拈來信手絕廉纖三舟各見原同月不使清光過別船單騎直入百重圍猛將當關失卻機氣蓋乾坤豈兵力不勞血刃立全威趙州洗缽盂喫粥了也洗缽盂趙州此語總傳虛若因僧悟生和會百劫千生枉繫驢分明直下自天真悔卻從前擬效顰信步不知溪澗路舉頭方覺霧雲身洪崖凍積千年雪寒燄初回萬戶春慎勿更隨人語後趙州牙齒覆朱唇趙州鬥劣不鬥勝蹋遍羅浮深又深山花如血柳如金到來谷口層峰出轉入雲根曲逕陰松韻蟲吟留過客澹煙微月戀荒岑柴扉獨掩和衣睡為許何人問此心趙州無兀兀崔巍萬仞蹲白雲無路月無痕曾無野鶴歸華表卻有殘紅出洞門去去碧峰煙渺漠行行流水日潺湲拼教身世埋空谷不作逃名高士論望得郎歸不見郎恐因喜極易成狂晨宵一處無疏戚中冓明堂自有方趙州勘二菴主將軍制勝遠從征要斬癡頑賀太平生殺但知歸主德臨機虛實豈能明乍瞋乍喜欲何為八十參方鬢欲絲面目不堪重舉似機關輸與老頭兒溈山水牯牛溈山老漢不知羞卻道山前變水牛開口已遭明眼笑可堪到處覓人酬劉鐵磨參溈山十年戰罷一征衣知己相逢意不違岐路已過應共慶故鄉猶恐未同歸老將相逢話別離故園攜手餉東菑一回提起疆場事刀箭渾身淚便垂黃檗大唐國內無禪師擇乳鵝王豈鴨群洪波浪裏解投身眉毛眨上懸千里碧眼胡僧認不真臨濟參黃檗絕世風流人不識未經題破十分嬌無端撞著癡憨漢添得深閨聲價饒千兩輪錘劈面來不由分訴可憐哉他時狹路如相值決定遭他者一回臨濟三玄十方八面絕遮欄面目堂堂日往還一自頭陀微笑後等閒留得與人參飛雲頂上鐵船浮海底泥牛吼未休驚起梵王眠不得一聲霹靂滿天愁李四張三笑臉開風前沈醉浩歌回寒鴉夜半啼枯木古殿鐘聲撼落梅三要生鐵蒺藜纔舉起卻教照用一時休夜來寒月十分醉恨少泉聲兩澗流露柱懷胎千古恨追風木馬至今奇波斯碧眼難窺測一任神歆與鬼疑水邊林下看無盡市尾街頭喚不醒莫訝世間奇特事威音王後未曾明洞山過水睹影一回瞥地始相應悔卻從前影裏行渠我于今休用覓堂堂大道出常情洞山五位帶月攜鉏下石門綠畦深淺半依村從來錯過田家樂依舊寒塘鳥雀喧正中偏綠楊處處解征鞍舊路新花盡日閒莫向河梁探水影滿頭如雪淚空彈偏中正男兒仗劍走平原望望疆場志氣存散盡千金功未立英雄誰向此時論正中來風流休問客鄉心高館銀燈酒滿斟今日相逢須盡醉不堪重唱白頭吟偏中至國破家亡但此身茫茫宇宙可誰鄰桃源未是深藏地醉臥長安不見人兼中到睦州露柱困步步相隨沒後先暫時岐路便茫然循溪蹋遍無尋處夢斷雲山人在船中邑獼猴睡著還同未睡時六窗相見作家知可憐老大婆心切失後忘前卻為誰六窗喚俱應熟睡成寱語相見夢中人不待聲絕處長沙本來人生死根本即是其人一呼一應有喜有瞋不須息妄不用求真若問箇中端的信青州衫子重七觔霜天如洗萬峰晴月浸寒潭徹底清莫怪夜深山犬吠元來竹外有人行長沙黃鶴樓題詩此事自來無語句亦無一法與他人龜毛舉起咍咍笑千古重拈面目新投子大死人卻活話真箇恁麼不恁麼堂堂露露勿懡㦬還家不蹋來時路依舊門前長薜蘿曹山三墮一雙孔雀立芳池飲啄飛鳴不自知無端照影頻回顧卻似難如往日時類墮岸柳江聲鎮日將五陵年少不還鄉漁人瞪目空相笑肯信人為春事忙隨墮九重深鎖鳳樓寒御苑鶯啼花自殘盡說官家高臺座一群獵馬出樓蘭尊貴墮如何是類墮處處銷歸者一箇渾身拶入沒中邊舉目不知誰是我如何是隨墮不守儂渠高枕臥橫身打破聲色關正眼看來猶是錯如何尊貴墮倚天長劍當空掉直入千峰深又深垂簾熟睡纔一覺興化打中間底名花新月滿羅幃又向幽林去步遲豈謂嫌他春富貴清光不欲使儂知興化打維那興化嫡稱臨濟子克賓從此號賢孫親承痛棒重遭罰千古流通教外傳德山參龍潭親到龍潭不見龍分明獨踞妙高峰雪消千丈巖層出雲散長空桂影叢明暗分時開正眼紙燈吹滅定吾宗劃然截斷千差路南北東西腳下通德山今夜不荅話三十棒頭振祖風霜飛凜凜絕雷同新羅衲子親承令贈得臨場鼓一通德山托缽須知吾道有長處佛法從來不可傳大小巖頭重說破教人特地哭蒼天峻嶺平坡步步同千人不見一人逢各尋雲鳥啼處始信山山有路通高亭簡隔江見德山招手橫趨不用疑儂渠直下露全機等閒無限漁家樂多少癡人坐釣磯大隋壞沒巴鼻有來由梧桐葉落天下秋離鉤三寸少人酬隨壞于今作話留壞亦壞兮隨亦隨一枝紅杏出牆來通玄不是人間世滿目青山長翠苔石霜不壞大千俱壞渠不壞灰燼煙銷天地青莫向風前頻獨立溪雲山月妒人醒玄沙三種病人用盡心機種牡丹種成擎出與人看尋春時過石橋北一望紅雲十畝殘盲啞聾人滿大唐紛紛錐劄費商量一回搕破髑髏額始笑諸方技不長僧請益雲門三種病人傳道雲門武藝閒相逢狹路轉身難誰知紅紫枝頭別到底春光一樣看雲門東山水上行非思量處莫思量枯木龍吟音韻長搏浪沙中逃萬死原來祇是舊張良如何諸佛出身處向道東山水上行慚愧雲門關不住話頭傳得到于今南院啐啄同時纔云啐啄同時用一棒當頭認不真蕩盡煙波無歇處回頭只在把梢人夾山參船子果然一笑縛獰龍橈下分明絕異同他年便解興波浪特地溪山雲月中首山竹篦子歌舞當筵明月空華枝搖曳笑春風忽然觸起心頭事豎盡寒毛眼底紅汾陽參首山此事雖無大不大幾回信了幾回疑誰知影落澄潭遠舉目寒光總未移洞山麻三觔娉婷獨坐不勝情簾外何人錯認聲細語微吟聽欲絕呼郎一字最分明跨海凌風入大唐山呼萬歲見君王無端認得捉刀者未出關門已受傷百丈恆參法眼於外道問佛話悟旨腳跟處處絕追尋又向白雲深處行把住要津無路著全身已到月華心雲峰悅參大愚芝乞化堂司僧本務實無佛法與人論于今末世難分辨瞎眼阿師卻認真黃龍三關我手何似佛手黃面瞿曇不知有橫穿鼻孔倒騎牛一生不著隨人後我腳何似驢腳一步一步頻蹋著紫陌荒岑獨悄然人前切忌崢頭角生緣在何處不是上天堂定是地獄裏若更擬思量劈口打殺你兜率悅勘僧三問秋山寒月淨無瑕貪聽溪流路漸差最是夜深猿切處一回腸斷淚交加分明一箇佳公子日日煙花醉未休搭得斷頭華子艇順流乘興下揚州十字街頭孟八郎殘年臘盡不還鄉去秋曾在湘江水昨日人傳到汾陽高峰枕子墜地無夢無想無見聞南山下雨北山雲莫隨流水分涇渭蹋倒溪橋恥見君壽昌大好山大好大不好悔蹋菩提路人人盡說解翻身含元殿覓長安路博山參壽昌悟由從來活路少人知上樹何如樹下時父子激揚空有話得便宜處失便宜先長慶參博山機緣不落宮商調已傳萬牛難挽箭鋒前兒孫縱有千鈞力爭肯推爺向裏邊婆子燒菴寒巖枯木自朝朝俗漢何曾負阿嬌春色暗藏關不住一團紅燄至今燒枯木寒巖端的事燒菴趁出好知音莫將意氣論賓主埋沒儂渠一片心一回抱住問元因二十年來舊主賓箇話不堪提起處知心原是負心人倩女離魂倩女離魂事亦奇嬌嬈蓋代少人知拈來勘破山中衲真假虧他一頓思淫怒癡即戒定慧春到雪消江漢碧夏來荔擘水晶團活計在君君自用莫教眨眼受人瞞塵勞起而佛道成妄想興而菩提現荷葉過風香十里梅花遜雪白三分從他起也從他倒佛道塵勞總賴君一念之中得見十方諸佛千念萬念非別念相看特地更尋誰若於離合有無處說得分明錯過伊
