無量年今日總過去未來一切年今日即是今年今日融通三際圓滿十方諸人且什麼處見老僧祇是眉橫鼻直眼深口闊順之則喜逆之則惡喜不喜惡不惡入海麒麟三隻角天風夜夜撼琅玕月落寒潭無處撈摸信手拈來七花八萼會麼小參舉竹篦子云阿那箇不見阿那箇不聞與麼會去祇是箇解空尊者且道宗眼在甚麼處解制小參今日解制解亦一任住結亦一任去去去住住總是當人且不干棲賢事老僧隨例顛倒與汝諸人證明彌天花雨祇在目前擲地金聲且歸腦後須知更三十年亦有人為老僧證明小參祇與麼不可總作與麼商量從上先德殫乃機致要詮注者箇道理不出不知佛殿僧堂早已道了也更教老漢鼓兩片皮豈不取笑識者然雖如是爭奈今時小參舉真淨偈云石門路險鐵關牢舉目重重萬仞高無角鐵牛衝得過毗盧海內鼓波濤阿那箇是無角鐵牛毗盧海在甚麼處夢裏何人歌白雪覺來元是偃溪聲小參譬如明夕是中秋向今夕說是想底即向明夕說亦是想又如鏡裏像說像不是鏡常在光中說光是鏡且非像外然象不礙光光不到像彼此不相知內外無前後既非功分豈關本有即今老僧與諸人老僧說諸人聽香爐蠟炬露柱虛空把斷咽喉拈卻心目試道一句看小參浩劫之與剎那毫端之與沙界得其總持且不入甚深三昧而當時當處總有文殊普賢境界昔雜華會上普賢菩薩住如來前去寶華王座不百萬人天欲求一見了不可得此豈神通妙用祇是當人自住自地識相不生舉起則匝地匝天放下則非心非物彼既丈夫汝諸人何不己躬下一回著到一回決定只管挨門傍戶有甚麼了日小參道人行處祇是自知自了蓋動靜一多因心所置心源深穩力不憑他體盡妙明自委傷觸逢緣不借任運屈伸汝若生心取證則沒溺自宗更或放曠無拘不免翻身魔外但能血脈不斷動靜之境無虧無願無求一多之情頓絶良由根本見徹不入方便之門差別行圓豈踰一真之界步步不躡前後心心豈滯暗明真智無見不妨物象交加真理恆如何用虛靈湛寂如月印川水光不透如石投海燥濕懸殊以之自為功位齊彰以之為人主賓回互東西溪之水草隨分五臺山之勘破有由大法無遮當人諦審小參舉竹篦云向者裏道一句有甚麼難不向者裏道一句始不為易難易因人過得荊棘林是好手師誕日小參老僧今日在長生路上與諸人相見了也諸人還識長生路上事麼流泉是生湛寂是事望如恬靜不是事流急不覺不是生若能徹底掀翻不妨千波競發即一亙晴空一亙晴空即千波競發用挾體以全彰體含用而俱寂以此作供是真供養以此受供是真福田三輪體空一真法遍因齊慶讚福慧兩嚴雖然如是大火聚裏一莖眉毛倩誰拈出以竹篦擊案一下小參甚深理境無路追尋大智現前回頭即是一切三昧枉自周遭動轉施為本無能所能所既絶取捨何從一種平常言思莫及上揆千聖下合群萌曠大劫來猶如今日小參生死本際涅槃本際一二之理難分迷悟之情各別深達法源行於事物而不見其異安住心海處於夢覺而不知其同祇為理封千聖之域不羡白牯黧奴情絶三界之因何矜寶几珍御蕩蕩乎冥冥乎法界豈有知見水草寧問東西知馬影之非他洵牛鼻之在手元旦小參日月如環旋轉無朕就中取一月一日曰春王元旦朝廷草野競起謳歌上祝聖壽下慶民生人間鼓文章禮樂之風猷我法闡一乘三乘之祕典莊嚴法界點綴太平豈不猗歟盛哉人事既畢依舊日月如環旋轉無朕求其起伏真俗二諦了不可得有人於此指出宗由契佛心於言外開凡品於劫先可謂因時赴節獨妙全提老僧且款款向伊道惡情悰小參去冬結結箇甚麼今日解解箇甚麼摩尼不墮五色明鏡豈有去來結收從來昏散之心入爐中陶冶解去今時知見之習向劫外屈伸大小皆宜深淺獲益老僧權作社長聊滿一期諸人無忘師資勉圖後徑小參承當箇事大須徹底掀翻莫存知見語默動靜柔和其心若猶聖境凡情人非我是即使悟得了無過患亦非古人行處既不相應終難成立不見道微言滯於心首皆為緣慮之場實際居於目前翻作名相之境何況更粗聲前響後待汝回頭轉腦已是失候移時箭既離絃誰論及之不及結夏小參九十日以前三十棒少一棒不得九十日以後三十棒少一棒不得正當九十日內且道還有喫棒分也無老僧年邁忘前失後亦須痛喫一頓始得若是諸人自領出去小參近代禪病流為聲名師家圖門庭熱鬧不管學人了得了不得祇要他口手快便施設得來學人亦不求自己性命著落祇要師家印可聲名藉重成褫他一副虛張才氣以取世資似者等心行亦說擔荷如來還得麼今時人所謂法身邊事祇是箇見聞覺知食底穿底迎賓送客底折旋俯仰底將為是和會著在眼曰見在耳曰聞在口知味在鼻嗅香在手執持在足運奔知者喚作佛性不知者喚作精魂者是古人語大有來由教你在那裏皂白不是教你作死馬醫山僧說不知者喚作佛性知者卻喚作精魂何以故好好地只要會他何曾踏著那箇消息既不許會是你拍盲得麼又如今時人所謂法身向上事也祇是箇見聞覺知只是不許他認著喚作掃蹤滅跡玄虛大度無著真宗大衆去去來來是箇見聞覺知不過換過一條題目者等窠臼正是千年貼體汗衫大衆汝既沒真正悟門日用自然闖到差別境上是汝不知慚愧還說箇一切處不是別一切法不可得大衆既是一切不可得踏他機境作甚麼者是可得不可得楞伽云受貪嗔癡性已然後妄想計著貪瞋癡性非性若不取有性者性相寂靜故大衆一切法皆由心生你心不曾到無生田地而謂一切法不可得一切法如幻無有是處大衆是則是一切法如幻亦只是你見得處你若迷情不了全身在幻化裏不覺不知流將去猶更牽引道理回至偷心流轉大可畏懼大衆就是你得箇真正悟入也要踐履明白他後方有成立若只虛知虛解生死海裏無你躲避處不見文殊菩薩問法首菩薩云如佛所說若有衆生受持正法悉能斷除一切煩惱何故復有受持正法而不能斷者隨貪瞋癡隨慢隨覆隨忿隨恨隨嫉隨慳隨諂隨誑勢力所轉無有離心何故受持正法而復於心行之內起諸煩惱法首菩薩答以頌云佛子善諦聽所問如實義非但以多聞能入如來法如人被水漂懼溺而渴死於法不修行多聞亦如是如人善方藥自疾不能救於法不修行多聞亦如是大衆莫道者是教乘即我達磨大師亦說行解相應名之曰祖後有僧問古德云如何是頭答曰大須知有如何是尾曰盡卻今時有頭無尾時如何曰終是不貴有尾無頭時如何曰雖飽無力溈山大師亦云大須識乾識若不乾敢保輪回去在敢保啼哭有日在佛祖痛切提誨祇要你行得去方到無事道法是一是你們各人根器不同是你們習氣深淺不同所以頓中亦有漸漸中亦有頓只如你們於者一著子上有箇入處見得現成殊不知多生習氣各人都是有底因緣相湊一時拋向面前只靠著些子知見一回按過了又一回有甚麼了期須是有決定方便始得者豈不是頓中亦有漸大衆修行一著亦有差別我宗門下卻不如二乘始教費許多無間解脫由一地至一地你若是箇人一剎那頓伏煩惱祇要善用方便一切時劫限量不得此豈不是漸中亦有頓所以道用少方便力疾證菩提道又云他得底人他自知時修與不修是兩頭話你若沒者一椿習氣只管作意加行尚不可說知時何況習氣深重謬意為不可得而俱生種子時時發起現行難道自己蒙昧得只是粗心硬差排過他時後日大作禍在大衆今日同住一處都是擔荷如來大事切須從自己做出一箇後昆榜樣如今禪道佛法敗壞至此非口舌能爭須是我輩深山窮谷在自己腳根下立得穩不為時氣所動令天下後世謂末法時代尚有者一種倔僵人所裨法門多矣久立解夏小參一夏來不曾與諸人講話其聲如雷諸人還聞麼聞則諸人不如老僧不聞則老僧不如諸人老僧與諸人亦能成褫天下人亦能誤賺天下人萬丈峰頭切忌錯足小參上是天下是地東西南北峰巒盤結林水蔥鬱溪聲徹晝雲影彌空谷中之景老僧所見如是諸人所見亦如是須知有一人所見不如是此一人是在衆中不在衆中在衆中舉目不見不在衆中豈不聞有一人所見不如是小參一切衆生流轉生死一切聖賢留滯方便皆由所知之心今時只管向思議不及處言說不到處以為過於精明圓湛明眼人覷破喚作自欺欺世饒汝遍坐道場說法如雲如雨彌勒下生未許有話會在而況下焉者乎汝等諸人須識好惡小參舉一不得舉二放過一著落在第二驀豎竹篦云早已落第二了也作麼生說箇舉一道理遂擲下竹篦除夕小參今日獵盡一年事業向此夕終終必有始一年事業向明日始始即始其終底終即終其始底如環無端如幻無實諸人到者裏作麼生了梅花香似麝野火勢如龍切忌作麻三斤會打汝頭破莫言不道元旦小參今日春王正月元日與麼承當即堪紹隆佛慧普度含識唯有竹篦子不在裏許既可紹隆佛慧何故竹篦子不在裏許竹篦子不在裏許還該得佛慧麼該得即不是竹篦子不在裏許不該得竹篦子是箇甚麼該得不該得不該得該得又是外道矯亂論議畢竟合作麼生不妨更疑三十年小參信位不道全無人位只是罕見所以黧奴白牯獨露全機十聖三賢難辭藥忌古人三登九上喫盡生受只為者一著子不似時流穿州縣入保社築得滿肚皮禪將來日用如冰似炭長生路上有甚麼交涉何不初終後夜勤勇念知一回喫攧始信從前虛過只今大唐國裏能有幾人所見盡是噇酒糟漢將知此事當不容易
