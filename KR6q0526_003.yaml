body:
  text: 嗣法門人今辨重編小參臘八小參豎竹篦子云不道大衆不睹祇是時節有待一旦頂門豁開到作家前為什麼還未良久云老聃不是姓李小參最明白最簡易為什麼祇管難將去都為向明白裏簡易裏何異東行西馬首盡大地皆以無心得之祇是不曾點眼盡大地皆以有心失之祇是不曾錯腳所以費人許多診候用補用瀉大須識藥忌始得元旦小參大新年頭不可不與諸人說佛法祇是不得錯舉似人小參元宵燈節鼓樂交參士女駢闐分明下下打著步步踏著為什麼祇作世諦既不作世諦豈更作佛法畢竟現前事作麼生楚雞不是丹山鳳劍峽徒勞放水鵝小參豎竹篦子云汝諸人終日推是度非欣真厭妄還出得者箇麼何不向者裏一切永息雖然如是截斷天下人舌頭則不無爭教無舌人解語以竹篦敲案云無舌人解語也汝諸人還聞麼小參者箇猶不是況復張三李真空與非空將來不相似了了如目前不容毫髮擬豎拂子云可惜許小參大衆此事無有形段亦無指示汝但不於一切境上起分別心一切時中不為諸虛妄覺想流轉應事接物不庸安置亦無自見之地到者裏祇要你自甘自休此自甘自休一切人天二乘所不能窺諸佛諸祖亦奈何不得是你自受用三昧還肯麼歸堂除夕小參臘月三十日來也諸人作麼生卓拄杖云歲月已窮人事暫息見聞不到思慮未萌到者裏將謂別有安排處豈知清明端午中秋重陽錯過了多少如尚不悟且待明朝從頭看去元旦小參梅柳喜迎初歲景幢鈴長繞去年人光天寶炬隨潮遠匝地祥雲捧日新大衆是什麼卓拄杖一下小參知客出問昨日是今日不是向上一機請師垂示師云昨日曾有人與麼問來進云和尚幸自尊重切莫帶纍別人師云老僧亦與麼舉進云客司某甲自為不敢干冒和尚師云再舉也何辭知客一喝師便打進云長老峰舵盤巖龍尾石海螺墩總與麼分付去也遂禮拜師云瞎卻僧出禮拜師云大衆看第二員戰將進云大日當空即不問人牛不見是何物師打云將頭不利帶纍三軍問照見五蘊皆空度一切苦厄便恁麼去時如何師云緊峭草鞋進云若空是見既已成見何者是空師云寬大箬笠進云若物是見既已成見何者是物師云一般都有只是用不著進云舉手所之縱目所觀無上法王是真實語師云雖然用不著卻也烜赫見聞僧禮拜師乃云大衆只管將問來問腳跟下一片地浮逼逼地古人才開口便知落處豈一棒兩棒總不回頭有什麼交涉饒你置得千百問不消老僧一條拄杖子打發了也還會麼卓一下云若向者裏開得一雙眼堪與人天為師復卓一下云若向者裏瞎得一雙眼堪與佛祖為師擲下拄杖云且道堪作什麼若無舉鼎拔山力千里烏騅不易騎知客復出拾拄杖云大有人不肯和尚與麼道舉拄杖云且看拄杖子在某甲手裏和尚當奈何師一喝知客擲拄杖歸衆師云子細著臘八小參我佛世尊昔年於此夜睹明星悟道悟則不無爭落第二頭如何是第一頭以拄杖一時趕散大衆復云悔悔便歸方丈除夕小參古人烹露地白牛與大衆度歲丹霞老漢久矣沒有者箇且道將什麼供養驀豎拄杖云飽一任飽只是不許得味一卓中秋小參今夕是中秋桂影婆娑清光萬里盡大地人俯之仰之左之右之要難躲避殊不知總是水裏底且道還有不是水裏底麼卓拄杖一下云天上無明月天下無明月解夏小參豎拄杖云今日夏便解了且道拄杖子解即是不解即是眨上眉毛好痛與三十卓拄杖一下云白雲萬里無人見祇見門前草漫青中秋小參今夕中秋雨濛濛雲黯黯且道月在何處以拄杖作圓相云明如漆黑如日尖相既隱圓相亦無汝若覷著即瞎汝眼然折旋俯仰要且躲避不得卓拄杖云咱合錯過小參老僧適在方丈才聞鼓聲蚤有一人出衆問道今日臘八適值上堂還許弟子伸問否老僧道四衆俱有問話分安得不許他乃問云弟子是殿前樹神前日承西堂大師見示要弟子遷居業已從命祇是有一疑盡大地是箇道場如何偏要拆毀弟子房舍老僧應聲答云你既知盡大地是箇道場何處不可居為什麼又執著他卻笑云偏是你禪師家會講話我才說箇盡大地是箇道場為甚要拆毀弟子房舍老和尚就說你既知盡大地是箇道場何處不可居為什麼又執著老僧見他說得俊快喚他進前老實說與他云樹神你底房屋老僧亦有分我底殿宇你亦有分只管分彼分此作什麼樹神聞言噤口懡㦬而退大衆你道者樹神是什麼人他也解問話祇是不會討便宜若是老僧待殿宇告成一直搬進去住了是箇韋馱菩薩殿如何樹神亦得住還知麼不是同床睡焉知被底穿諸人若不會且請到殿裏問取者睹明星悟道底老狐看卓拄杖一下結夏小參得底人原無體格祇為不將人家屋裏事當自己事所以腳跟下活鱍鱍地佛祖所有他亦有有之不以為重佛祖所無他亦無無之不以為長何以如此他腳跟下有力不隨人轉然要轉便轉覓其蹤跡了不可得到得祇麼田地尚不是好消息豈況還未然亦非論年論月祇要你是者箇人具決定志保你九十日內構去若不是者箇人不具決定志縱使一百箇九十日亦沒交涉大衆海日漸長幸然無事大須努力珍重小參明明者一椿事為什麼特地難將去你諸人每日噇了兩頓上來下去有什麼蓋覆處忽被人問著便擬開口祇對早已白雲萬里我宗師門下祇為慈悲之故乃有語句若一向天三地四你向什麼處撈摸歸堂小參眼識等所行非色境界色等所現非眼識等境界良久豎竹篦子云見麼復以竹篦子擊案云聞麼打鼓弄琵琶相逢一會家有亦不管無亦不拘觀世音菩薩將錢買胡餅放下原來是箇饅頭擲下竹篦子云一隊總是無孔鐵椎小參此事如五夜燈火如神鐘社鼓如士女酒筵茶席於此若會一任出沒生死非佛眼所窺然須知三家村裏猶有一人不肯到得此人喫棒有分臘八小參數千年陳腐公案一回提起慚惶殺人你諸人各有眼睛俯仰照燭為什麼往往被人喚作瞎漢祇如盲龜跛鱉還有佛法分也無無則法界不周有則宗乘混濫到者裏須還芥菴老漢始得除夕小參過此一夕又是一歲你諸人作麼生放開則日月推遷捏聚則乾坤頓易便與麼去有甚了期萬象無體玄之意聖人有會物之心笑倒孟八郎信步張三李至道無難情窮乃現卓拄杖一下元旦小參卓拄杖云年年祇與麼月月祇與麼日日祇與麼為什麼又要老僧從頭舉似大衆有一人受舉似舉似不中用有一人甚得舉似之理卻不受舉似且道那箇是親那箇是疏分疏得下新年頭無虛棄底佛法以此啓佑當時不為世諦卓拄杖一下小參王老師云不是心不是佛不是物可謂驅耕夫之牛奪饑人之食然雖如是者邊千句百句不如那邊道取一句且作麼生是那邊一句桃華開處春風暖黃鳥歌時柳絮飛切忌道猶是者邊話情知汝在者邊模索要向那邊著到小參舉僧問雲門如何是正法眼門云普又僧門風穴如何是正法眼穴云瞎妙喜云二尊宿答一轉語還有優劣也無若道有優劣真箇瞎若道無優劣真箇普若是歸宗即不然若道有優劣瞎裏錯過若道無優劣普裏錯過畢竟如何三餐稀粥扣門拙二百殘僧計日禪小參舉趙州云有佛處不得住無佛處急走過三千里外逢人不得錯舉師云作麼生是有佛處祇如不得住住箇什麼卓拄杖一下喝一喝作麼生是無佛處祇如急走過走向那裏亦卓拄杖一下喝一喝復云大衆說便說了也須悟始得你若悟師姑不是女人做小參鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後古人只此四句已無剩義老僧有箇譬喻喻如流水前滴不到後滴後滴不從前滴滴滴圓滿不相假借而相引相排江河流注似生相續又如火與火前焰不是後焰後焰不是前焰焰焰相推至於燎原祇是者一星子者一星子亦無自性於此會得許你做得箇座主大衆前說已無剩義為甚麼又說會得止做得箇座主蓋為汝解會不解不會小參不著世間如蓮華常善入於空寂行達諸法相無罣礙稽首如空無所依大衆作麼生說箇空寂行空寂行又如何入聽取一偈此心此法本如然遇直逢灣絶後先與汝相知解相信雙雙攜手醉花前以竹篦擊禪床云會麼小參此事如擎滿鉢在獨木橋上過稍錯足即喪身失命過此以往康衢大道土曠人稀到者裏切忌瞌睡卻似不曾有恁麼事小參錦上添花易雪中送炭難錦上添花卻似不曾多些子則易中亦有難雪中送炭忽然撞著箇性燥漢挈過冷地上則難中亦有易寒暖無方難易失準是汝諸人作麼生去就良久云滴水滴凍臘八小參所睹非境能睹非心箭鋒相拄啐啄同時正恁麼時還有出身之路也無金雞啼午夜寒月落前山雖然如是若作睹明星悟道入地獄如箭射小參開罏以來風晨雪夕與諸人所談何事若在言說上薦豈不動涉根塵若在無言說上薦豈不靜沈死水若在言說上得無言說之機豈不事屬向背若在無言說上收言說之用豈不理存本末若總不與麼則百姓日用得失兩衡畢竟合作麼生梅花初綻萼榆柳未舒芽小參以竹篦擊禪床又望空一揮云敲空作響擊木無聲不是神通妙用亦非法爾如然事理俱捐全身迸現豈待臨機作略方露布於吹毛正使樓閣門開開而復閉猶存終始之端所以曠大劫來至於今日當念瞥然都無前後何消老僧深言淺語直指旁敲直饒句下明宗聲前得旨前廊後架錯過多時復豎竹篦云會麼會則全盤翻卻黑白兩忘佇機停思白雲萬里解制小參諸方解制有底向長連單上指出箇解作活計有底向長連單上指出箇破家蕩産惟有歸宗拄杖子一時按過總教他眉橫鼻直齒白唇紅他日向孤峰頂上味雪餐風十字街頭呼張喝李十字街頭底孤峰頂上放行孤峰頂上底十字街頭把住祇是不許撞著老漢為什麼千般武藝皆傳盡一拳留得打兒孫小參說事說理說根本說差別說者邊說那邊曲為今時都無實義若是箇人自知好惡汝若會露柱燈籠是你兒孫汝若不會廚庫三門是你宗祖且不關老僧事小參豎竹篦子云多少人在者裏開眼行不得多少人行得卻不開眼總要喫歸宗痛棒咦亦是奴見婢殷勤小參現成公案教老僧作麼生說便與麼會朝打三千暮打八百何況昧略然雖如是相似昧略智者不言本際法中無存泯故浴佛日小參生生不可說不生生不可說生不生不可說不生不生不可說到者裏還拆合得麼拆合且置祇如歸宗今日劈頭一杓惡水是為悉達扶弱是為韶陽助強良久云欲得不招無間業莫謗如來正法輪小參十方諸佛在衆生生死裏涅槃而衆生不覺不知六道衆生在諸佛涅槃裏生死而諸佛共見共聞故知生死是涅槃家生死涅槃是生死家涅槃而生死自生死涅槃自涅槃不隔毫釐遠若霄壞祇如老僧與諸人即今是生死是涅槃易分雪裏粉難辨黑中煤踢翻湖裏落星石吞卻庭前下馬臺會麼小參於本無有處立一切法法法誰名於本無無處說諸法空空空何狀踏翻關捩轉向上頭爍迦所不能窺檢點將來猶在塗路何如歸宗寺裏石女生兒驚起四大天王目瞪口呆投奔無路是汝諸人作麼生躲避小參境因心境心因境心心不知境境不知心何曾動著日用森羅寤寐安然不行鳥道證寂滅於繁興之內了名相於一實之中安住無明將錯就錯真鑰不換笊籬木杓小參去年結冬冬行春令今年結冬冬行秋令從春令薦活了死猶難從秋令薦死了活較易難易且置如何是活右邊卓拄杖一下如何是死左邊卓拄杖一下復云若識死活句許汝參得歸宗禪然雖如是死活不到又作麼生月上長安公子鬧雲封谷口老僧閒小參佛法在行住坐臥處飲茶食飯處阿屎送尿處迎賓待客處所