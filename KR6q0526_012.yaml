body:
  text: 嗣法門人今辨重編雜著放生文五戒首戒殺者何謂也天地同根萬物一體初不欲自相戕賊也好生惡死情之所同棄命捐軀恨何窮已以是終不敢為不解之怨也故上古之世禮樂揖讓絶不言兵中古不得已用兵而深抱慚德惟後世口實時懼至於國有常刑將以勷道德之所不及而猶曰功疑從重罪疑從輕歷代帝王常切切然毋或過者生與殺之大柄也乃孔子曰善人為邦百年亦可以勝殘去殺矣孟子亦曰親親而仁民仁民而愛物而卒不言其故者有待於大聖人而後詳之也不知其故而不為害人之事者天下一人而已知其故而猶為害人之事者天下亦一人而已夫殘忍之積上干君父仁慈之極下及禽魚當其迷也而不能求其毫髮之悟當其悟也而不能求其毫髮之迷知其故與不知其故耳知之則漸漬為仁人不知則將流于忍人天下皆然也所以我佛出而為三世之論詳因果之理使天下昭然識死生終始禍淫福善不於其鬼神而於其人心人心不可得而昧也覺範禪師曰舉手炷香而供養佛其心自知應念獲福舉手操刀恣行殺戮其心自知死入地獄或殺或供一手之功而召業報罪福不同因果從人心而生也心之慈與忍輕而緩則罪福之報亦輕而緩心之慈與忍重而疾則罪福之報亦重而疾世有終身為善終身為惡而或感報現世或不即現世通三世而論準純雜而觀而後知確確不爽者心之分齊必不可得而昧也是故大聖人取其不昧之心而不使暫與忍習懼其漬而終於君父也而要使漸與慈接引其端而始於禽魚也所為補帝王刑政之窮通儒者死生之說以出世之道而收治世之功柳子厚曰陰翊王度是也天然道人日以其道自為又不但以其道自為也凡肯與道人親者道人不得避則始必言戒殺既不使其漸與忍習繼言放生復欲其漸與慈接果如是也從日至月從月至歲事也而理求之端也而類竟之將見去忍如湯之沃冰養慈如益薪於火人欲淨盡天理純存鳥飛雲布水流花開其為物相遇乎其為同於物乎過此以往未之或知也若曰守戒寧如定慧則將應之曰但盡凡心別無聖解若曰放生何似無生則將應之曰如來即慈慈即如來豫與諸公但如是發心如是精進如是久遠而不中廢則荒山破院之間若僧若俗啞然相對生意滿腔不必更有奇特事矣法華云終不以二乘引導於衆生道人今日其尚無過歟否耶元旦合寺禮千佛疏竊惟背覺合塵之後染法相應棄俗趣真以來緣心未歇揆之道尚在乍合乍離涉乎情未免時欣時厭一念相續遂成生死之河百慮縈回難破蓋纏之網尚有事在未可隨緣大須識乾方堪保任自能見過庶免左于他非事以漸除乃終同於理頓適當首歲慶厥好時仰千佛之大慈作衆生之弘護洪名舉處等十方三世於異口同音如幻滅時識境無心無于低頭舉手此香此燭共作證明乃目乃心同歸解脫伏願衆等廓佛心于知見入性海以益深銷習念于色聲當出生而滅盡無罪而懺罪謙和慣自回光安心于無心萬物何妨共繞以此功德普及群生凡諸有情畢證此道初發究竟不捨薩埵之心果徹因源終滿菩提之願華首空和尚新語録序崇禎壬午之冬刻華首語録成承和尚特遣人命某為序某謹再拜稽首而言曰某烏足稱道和尚哉雖然聞之知弟子者莫如師某六七年親承訓迪所費和尚熏淘涵育若或於揚眉瞬目若或非揚眉瞬目其為之也既奢則意其遇之也必浚將俾某之躬遭目接以示天下後世之為某者此則某之弗敢辭也憶某甲戌知有此事來循覽天下彼時胸中惟黃巖天童兩老而已及一到黃巖便絶志行腳非謂天下無人也一山坳老漢日堆堆地無長技奇識而乃窮歲月而不得竟其所至是用焉往邪目今門下士唯某不慧餘皆瑰琦俊偉出可為人天師隱亦堪作山林典則而且逐逐焉營營焉如有所戀而弗去非愚且狂夫孰為是是則天下後世亦大概見矣至於提持向上則古之百丈黃檗足以當之語録具在知音者可辨也若乃讀其書而思見其人則祇今華首山坳依然日堆堆地無長技奇識耳親之而一無所與遠之而若有所棄遊其宇者如人飲水冷暖自知幸毋當吾世而坐失也此某所以告天下後世也然終不足稱道和尚也吳中三子詩序道也者情之至而歸焉者也情也者道之反而寄焉者也詩也者始乎情而終乎道者也是故情不極則不能言逮言窮情盡啞然自喪始知樹聲禽韻風動雲起相遇如故知相合若水乳高人韻士往往與道冥合而不自知其或至也吳中曹公匡石許公深野龔公在田遊覽至粵多所吟詠一日袖詩過豫索序豫乃得而誦之夫曹之清古許之艷異龔之壯麗以詩而論各擅其長而細而味皆不能無慷慨淋漓之致豫世外人終不知其所感何事所傷何心然大抵文人慧業未免有情情積乎中言發乎外其忽動也如雷其霪也如雨雷轟雨霪無所從來雷收雨歇去無所至以問三公初不知其何以至此乃言盡情竭日星朗然面面相覷如在鏡中將為故知遇乎將為水乳合乎竟亦不知其何以止此也故曰詩也者始乎情而終乎道者也三公日在道而不自知其或至也啞然自喪得所未曾三公寧無意乎是為序侯若孩詩序夫詩得之天者十一得之人者十九然天定勝人山僧嘗謂李太白於詩中聖蓋自字句法脈之外別成字句別成法脈使人知其妙而不知其所以妙即太白亦不自知其所以妙全乎天而不用天也能用天者如王摩詰云興來每獨往勝事空自知只此二句可以起悟然亦但能言此但可言此甚則行到水窮處坐看雲起時如是止矣故又曰偶然值林叟談笑無還期謂當作何語耶大抵太白不知其所以然摩詰知之而亦不能明言其所以然說者謂不知較勝亦最後語耳當令太白讓摩詰一步地方能坐勝摩詰也侯子若孩志務當世而慷慨激烈情過乎辭故其為詩高邁風逸殊有言外之旨山僧以摩詰遇之而侯子乃以太白應始知讀者與作者各自為而皆相得於天知與不知不妨忘乎至極侯子今還中州行將公此於天下他日匡廬頂上更有好相見勿遂以為最後語使人謂山僧當面放過不止於詩則又山僧忍負侯子不可不說破也心經直說跋圓覺云智慧愚癡通為般若又云諸戒定慧及淫怒癡俱是梵行修多羅奧要微義指人於一切凡聖法中得決定正位此可與證者道不足為粗識言也詎意狂禪撥無者反藉為口實宗門流弊今日為甚究其始皆由浮慕之士不從生死發心以大道為名聞之資以名聞為利養之實持此心行未有不錯會古人向上之語謬謂無凡無聖無古無今明撤藩籬暗滋情習不知凡聖既遣今古混同此一著絶大總持誰為承當誰為轉變決了慧用甚深難辨正謂以少方便疾證菩提從聲聞緣覺以迄菩薩佛地皆不能忘般若之功也大慧云擊石火閃電光引得無限人悟將去傳將去有什麼了日圓悟為之吐舌曰祇要契證若不契證終不放過以此觀之則圓悟所謂契證者證何等事耶永嘉曰無明實性即佛性幻化空身即法身會者曰衆生根本無明即是諸佛不動智且詰之曰何為不動智曰淫怒癡何為根本無明曰不知淫怒癡審爾則能知淫怒癡者不可謂非般若也乃有境緣相逼若或與不知者同一流轉即不然安之與勉順之與逆亦人各自知始知理不能該事悟不可當證合斷德以成其智舉一般若而三德具備豈乾慧之足言哉是歸自棲賢趨侍吾師得捧讀心經直說可謂深救禪病因乞流通以示來學復承命跋謹述見聞所欲言願與吾人同具擇法固不自知其淺昧也刻牟子辨惑敘豫少從事魯誥囿於見聞曾不知世外復有大聖人能過孔孟間從浮屠家多聞因果事輒指為虛誕以是數年可否不肯作決定信一日過友人案頭得首楞嚴讀三四卷雖不甚解為何等語然理趣深玄業面熱心折遂攜還終十卷所見十習因六交報一一皆從心生不由外鑠乃不敢以虛誕及淺近事誣謗因果自此由教乘入宗趣歷八九稔始識向上一路因回憶初年多是不遇其人不讀其書疑信相奪徒賺歲時後入匡山掩關歸宗閲藏本至牟子三十七篇益以童年不早得此為恨約出關必圖鐫出以告同人比隨華首老人入羅浮明年開法訶林未幾徙居小持船又未幾移入雷峰自雷峰復度嶺歸匡埠受棲賢今年春從粵人之請又自棲賢抵雷峰因小病掩室復閲藏至此乃記二十餘年宿約命侍僧發梓大都吾輩初入學孰時依父兄師說深入功利才稍長得自有聞見每為宋儒理學所誤遇苾芻輩未必皆入理之士甚有傳述大顛韓愈事加以誇誕反為伶俐少年笑怪寶藏祕函又深渺浩瀚學者懶習深中兼之先入之言橫梗胸臆輒一目棄去昔豫從此中來同病相憐興懷忽忽惟牟子辨惑辭簡理辨可破群疑是不能無望於天下英哲也放生文放生何謂也生不可斷斷之而生滋甚生滋甚則殺亦滋甚生殺相滋則世間無窮期世間無窮則出世間窮然出世間之道不可窮而窮之何謂也謂夫世間之相無窮世間之想無窮世間之心無窮彼無窮則此窮何窮隱而不能顯之謂也出世間之道即在世間而為相所覆想所覆心所覆覆則隱隱不可終待時節而後顯也何謂世間之相生相也何謂世間之想生想也何謂世間之心生心也天地萬物無有生也依相而生不知相之為幻也而實之以為實而不能已於情也則想生想成乎念明了憶持此六道四生執為我心我體出入生死而無有盡者也因相緣想因想緣心心復緣想想復緣相生之所以茁茁也然則斷生何害也曰生不可斷也斷之滋甚謂不得夫生之集性不得夫生之集性而斷之斷之即生也自為斷而且不可而況斷他乎由夫斷他之心依生而有依自他心而生憎愛愛己憎他而殺之機兆兆而不能自斷則殺之因成因成則果成終不能免乎苦繫也然他亦不可斷也所可斷者五蘊中色陰多分之一也其不可斷者愛己猶是憎他猶是依彼因而成此因因成則果亦成是以衆生同游於並生並育忽而有不可知之殺機相向苦繫不能逃也然則放之說何謂也放之者順之也順其生而不相害則殺因斷而生因亦斷何謂生因亦斷也生無有生之性也迷似有也似有而非實有迷故以為實也似相而以為實相非實有相生之性也不能了此則想生非實有想生之性也想生則心成非實有心生之性也知其無有相性則想不能生想不生則心不成心不成則漸漸乎可以言道耳雷峰道者也欲與雷峰前後左右之信雷峰者若緇若素將日進乎道也特以放生始謂究其生之集性而顯無生之理也時節為之也非但息殺運而以生之說進也壽文玉何公七十一初度敘天下之人以年壽賢者以德壽大聖人以道壽道壽者絶思慮之所至超聞見通神明而不得其數量者也道降而德賢者得自以操其柄而不受衡於造化尊聖人之明教澄一神慮流潤營衛無所希於久視之效而理足以貞故哲人達士亦樂稱道之而不區區於延促之間也今人不慕久大之業輒侈言生理此其以年壽者耳高者守中卑者引導最下煉金石服草木以幾一日之成此千百十而不得一人一人而亦未必遂千百歲苟其遂數千百歲也吾以為猶蟪蛄朝菌耳此習成於秦皇漢武而弊流於今薦紳先生所為延一日之富貴而不知其適足以喪德敗度耳今人所貴乎永久於世也其道足以自贍而推之足以贍天下及後世不然存心良易制行純白處一鄉一鄉蒙其澤居一國一國嚮其風一日而有百年之利矣江門文玉何公生長公族身為薦紳廉約自處仁恕被物中年醉心竺墳今過七十厥志不衰其胤嗣宗黨尤能廣其所好多從雷峰游雷峰道者以是得聞之其素履也所謂以德壽者也於其初度也謹為之序千山剩人和尚塔銘噫真發心出世為前聖後昆荷擔斯道當國家全盛出豪貴才華中岸然獨行無所盼睞始見千山剩人和尚其人也余與剩人明崇禎間先後出師門如左右手聞訃趨芥菴與老人相向啞然其徒之在廣州者露頂跣足再拜稽首而言曰非師莫銘吾師也余曰諾弗敢辭老人復顧余曰然非公莫銘若弟也余起立曰諾弗敢辭翼日返雷峰其徒復至長跪曰某將以是秋奉銘出關門矣吾師光明全藉師筆端照耀塞外塞外人千萬祀知有宗門自吾師始某為吾師請抑為塞外現在將來諸昆弟請言畢泣下稽首不能起余感而諾曰弗敢辭於是載筆為辭曰師名函可字祖心別號剩人惠州博羅人本姓韓父若海公諱日纘中明萬曆進士官至禮部尚書諡文恪母同郡車氏誥封夫人師生聰穎少補諸生有聲性好義豪快疏闊有貧士冤獄自分死師密白得免士方德有司廉斷久而知韓公子所為嘗獨出里門為市兒所窘識者報家人追至將赴理師遽止曰彼惟弗知故敢爾豈有吾輩不能忘人誤犯其豁達愛人類如此文恪公捐館舍京師師奔喪往返萬餘里哀毀未嘗一日間逮歸閉戶絶交游悒悒無生人趣聞梁孝廉未央好道力致為諸弟受業以此得深知余歸自匡山師亟入廣州一見輒曰長齊數月矣專以待公某先文恪生兄弟四人某長未嗣若了此願梵行終吾身余笑曰此白社諸優婆塞事寧區區屬望耶師面赤辭去明日復來曰某妾已孕幸而育得上報先人抑無所憾即不幸亦不復願為俗人矣余曰此吾儕緒餘若為艱言之更有向上在師自此始一意且拉余住止園凡兩月值老人至東官乃相見東官因僧問諸識義老人曰我者裏無五識六七八識僧曰祇麼則枯木寒灰去也老人曰枯木寒灰爭解問話師從旁不覺擊節老人顧余曰此子根器大利指示參趙州無字有頌曰道有道無老作精黃金如玉酒如澠門前便是長安道勿向西湖覓水程從此微細披剝無虛旦夕兩踰歲復聞舉勘破婆子話更豁然識古人長處老人曰子今得不疑也即隨入匡山剃落登具命掌記室還住華首又命充都寺甲申之變悲慟形辭色傳江南復立新主頃以請藏附官人舟入金陵會清兵渡江聞某遇難某自裁皆有挽過情傷時人多危之師為之自若卒以歸日行李過城閫為守者擒送軍門當事疑有徒黨拷掠至數百但曰某一人自為夾木再折無二語乃發營候鞫項鐵至三繞兩足重傷走二十里如平時江寧緇白環睹咸知師道者悉含涕不敢發一語後械送京邸途次幾欲脫去感大士甘露灌口乃安忍如常逮至下刑部獄越月釋發瀋陽師自起禍難至發瀋陽兩年於此與縶維同參法緯迄諸徒共五人外無一丘傍然內外安置極細如獄中一飲啖一衣屨隨意而至如天中人師當時所能自為者順緣耳庸詎知己有人屬某緇屬某素甲事若此乙事若彼開士密行不令人知何擇時地然師所以獲是報者豈非平生好義暗中銖縷不爽諸如道在人天且當作別論也師初至瀋陽觀知根欲因達藏主閲藏普濟先為諸苾芻疏通義學時講席漸散多集座下講師師乃領大衆趨教如學人講師意始解自是瀋內外護咸仰師寬大益篤信宗門開法之日元旦喇嘛率諸遼海王臣道俗稱佛出世清法譴僧屬掌教亦極力推轂自普濟歷廣慈大寧永安慈航接引向陽凡七坐大剎會下常五七百衆江南同謫諸大老若大來左公吉津李公昭華魏公龍袞李公雪海郝公天中季公心簡陳公始以節義文章相慕重後皆引為法交師自處孤潔與人慷慨多意氣匪深於師平日鮮不以才氣相掩以故法海深闊向非凡器所能搆嘗有書抵余曰門下龍象如雲若得專一人來使某得盡其夾輔之力則曹源一滴長潤塞下噫余於此知師為法求人之切豈無所見顧再易裘葛耳忽一日曰我後十日必去集大衆告誡皆宗門勉勵語搜丈室無長物平日所畜衣拂如意杖笠悉分付侍僧孑然一身從金塔趨駐驆囑行後全軀付渾河示偈曰發來一箇剩人死去一具臭骨不費常住柴薪又省行人挖窟移向渾河波裏赤骨律祇待水流石出衆環跪乞留肉身哀懇再三乃默然遂端坐而逝瀋之人迎龕入千山建塔蓋順治十六年己亥十一月二十七日也師世壽四十有九坐夏二十得度弟子今育今匝今曰今廬今又今南皆江南人師住瀋不輕為人雉髮有乞戒悉命禮天顯律主師未開法時嘗為顯作闍黎及說法顯請入室師亦命第一座更為傍通華嚴梵行凡戒壇仍使主之惟宗門提唱無少假然皆一目同人衲子能具精誠隨機大小各有所被故十年相依如正遇恥若磬光湧光作麼若而人咸受益焉是宜銘銘曰山川奇秀蔚為異人意氣雲蒸公族振振儒門淡薄歸復能仁溯洞水源沛流潺湲出華首嗣為博山孫如溈之嚴吾師有言慧寂者誰實難為昆嗟大樹叢宜蔭南宗天龍等視匪法運窮愍彼遐方啓拓關東彼土惇直惟經與律拄杖撥開別傳甫及七住道場萬指林立天資雄邁波瀾澎湃上下左右不知其在巍巍堂堂曷云誰至泉日方中忽然西逝道俗涕潺湧塔千山為存為歿松鳴珊珊朔方少室今古斯一般若心經論梵語般若此云智慧以智慧解諸法空而至于彼岸是矣又曰心經何謂也華首曰心是體智是用體則通凡聖而皆遍用則分迷悟以各成天下無無用之體體即遍而用安得不遍歟曰遍而迷悟異致故曰各成各成則不可均言智慧矣此所謂本覺則聖凡無二迷本為妄悟本為始妄與始無二體而有二用也當其迷也見色而不見空乃至見受想行識而不見空行于日用欲求其毫釐解脫而不可得矣及其悟也即色是空更無別空即空是色更無別色乃至即受想行識是空更無別空即空是受想行識更無別受想行識行於日用欲求其毫釐凝滯而亦不可得矣是迷悟之用各異而皆原于本覺之心固無有異也通凡聖而無有異故曰體也自無始來無佛名無菩薩名無二乘凡夫名唯渾然藏識而已藏無自性不覺成識識成而根身器界名相臚然而藏性不失識滅而三明六通智證詣極而藏性不加所謂無生滅之謂心無垢淨之謂心無增減之謂心此心空相本自如然而非深于般若則未有能徹見而返本歸源者此三世如來所讚歎尊重無異旨也般若生于本覺而要迷情淨盡然後現妄覺亦生于本覺而要當體知歸然後泯故知翻其妄而自照之為智智生即無妄妄成智也智解諸法空還其本覺之無動搖之為心心返則無智智盡心也涅槃三德非縱非橫而悉始于明見佛性融根本差別而一至于是所謂佛性為因而涅槃為果也由是而造焉之謂經也雷峰山海雲寺放生碑文萬靈一體苦樂同情惑業為因生死異致以其因也群倫成有漏之趣以其體也聖人起無緣之慈故慈者人心之所共也孺子入井惻隱無疏戚之殊尊俎在前匕箸失禽魚之痛此匪心之稟受弗同也形骸各睽情窾自分業感攸招在彼有難逃之苦繫在此有俱生之愛纏欲從中來習由俗近仁人之士既不能動殊類之悲名教之林始益深人禽之視源流漸遠疾苦難通雖湯王有解網之仁孔聖懸射宿之訓而所以大人主浩蕩之風著聖賢及物之素澤被豈不甚弘而不知其所同也哀愴豈不極剴而不知其所異也不知其異則恩及禽獸祇益深慈而物之所以待救者未必引為前車之戒乃有於物之情欲奢而于人之情愈嗇此天下所為易於見恩而難于懲忍也而不知夫忍者正物之所由異矣不去其所由異則百慈而不能易一忍慈與忍亦交相奪耳是以仁人君子能為順情之恩而不能為逆情之恕皆不知其異而推之以為同者也同一知樂故樂欲其俱受同一知苦故苦欲其俱蠲人與物皆然也若夫有不可滅而為無彼不能化而為我雖質謝神散往若渺然而謝必有乘散仍復聚昔所為受人樂即今所為能豫人樂者也昔所為能豫人苦即今所為待人蠲苦者也萬物之變化有常即一物之升沈無定觀變化而識因地之岐悟升沈而得體性之合所以大聖設教止有一心隨品類之弗齊應機亦恆多轍靈靈匪昧苦樂何殊念念弗移貞淫自究痛泥犁于逮憫鱗羽之現前形本暫寓神固受傷妙覺隨生無明共滅惑綱不與報盡而俱冥則貪愛未彩割此聖人所以護萬物之情而言慈心于旦夕其後報人息其現流一事而有止情達性之道也茲丹霞以無生導上哲之歸源而以護生發初機之物見物非物何所不容當生而不生即方便以明余也身坐萬峰之上心入人群之中真機寥廓偕萬里于無言有物有恆等平觀于庶類在處蘭若用扇惇風三十餘齡殆無虛日顧茲白社志慕上乘集我同人深維厥旨念過化之所存紹成規而再振豈人天之盛事實大覺之帡幪道齊物外心切并包神而明之已見其人撤器而觀誰安形下欲垂永久廣募生田敬丐長辭猥以人重機感一揆海嶽同風遠貽斯文昭爾後裔遍行堂集敘吾徒淡歸釋子于其將梓遍行堂集編而上之老人老人讀而擊案曰人之有言如其有心也夫心之不能遁于其言亦猶言之不能遁于其心也不能遁于其言故天下之言為可貴不能遁于其心故天下之心為可貴也蓋自言可貴而天下相爭出于文章機穎之塗亦夥矣忠臣之文憂以遠孝子之文柔以慕仁人之文恬而切義士之文方以捨得志者其詞壯失運者其詞悲入理深者盡曲款而弗誣獲真悟者極淺易而絶人以無行地此言之可貴貴以其心而與天下後世發揚于易地同時快古人之先獲我畏古人不及見我其為樂未易一二數也然亦有貌似憂而念起于近名勉為慕而情生于循理恬以文刻捨以任氣壯而流為淫悲而傷于怨曲以極微而弗覺其板滯以為絶人行地而不知腳板已弗底于四楞此又言之可貴而反成于甚不可貴于是天下真聖賢真才智遂有置文章機穎而求人于淵默自存之地言與心乃判然分為二致而不知實有不能相遁者豈但悄然于為言者之心亦自釐然于觀言者之心抑已久矣夫人于無念而忽有念獨知豈不甚明其為念善而以善言出之不可遁也其為念不善而以善言出之其為念善而以不善言疑之或始善而終不善或始不善而終于善其心皆不能自昧此所謂言之不能遁于其心者也苟其昧于善與惡而不能自覺則亦無所掩著于為言之日矣若果不能自昧人之視己如見肺肝此正心不能遁于其言又可與不能遁于其心者互相發揚以見天下之言為可貴天下之心為可貴也淡歸固貴天下之心者而與天下共相見于其言老人亦亟欲與天下共觀于其所言也雖然人之有言如其有心也是言固心也言而唯心唯也言而阿心阿也引而準之言而善豈心善歟言而惡豈心惡歟言而幽心固匪幽言面顯心固匪顯言而正心固匪正言而旁心固匪旁心匪旁言豈得旁心匪正言豈得正心匪顯言豈得顯心匪幽言豈得幽又曠而推之鳥獸亦有心啼號何云天地亦有心日月星辰何說山川陵谷何說熾然于晝與夜而略無間歇者置淡歸此集于其中孰多孰少為有為無此自淡歸事老人與天下後世且得瞪然觀勝拙矣書自書法華經後嗣祖沙門丹霞比丘釋函是謹竭誠頂禮佛前書寫妙法蓮華經盡七卷已而作念言我函是二十七歲始受持是經至今三十五年領衆以來已二十八年竊謂如來大事因緣微妙章句難信難解蒙師開示幸獲悟入以此自信自修即思與衆共信共修一奉如來明訓為人宣說詎謂懈怠之性僻處窮谷敢忘謙下忍辱之心而多病之軀精力易疲殊失誨人不倦之意所訓之衆成就者少退者多或聞而弗信信而弗篤或利根而忽于究竟或力弱而怯于擔荷或少有所得而惑于岐塗或可望有成而限于壽命或樂于自為或弛于多嗜浩大久遠之程未易克終而信師慕道之懷終難勿變睹四衆而大哀反一己而益切年運雖邁始願未衰勉力自書猥以見志願從函是以訖十方一切解義說法之人性智明決色身堅固各于菩薩行處菩薩親近處盡法行持無所愧悔以普賢行廣興流布庶幾仰追先轍免蹈時習凡在聽衆聞說歡喜夙夜思惟始必有終大而勿小尤伏懇佛菩薩大慈普及衣以覆體光以照心不致辛苦生疲逐物成惰少智之士蒙光聰敏底于大成薄福之徒承願增益毋為中匱更願所書經卷直待慈氏法華會上忽爾現前我願如是諸佛證明信此一心必無虛棄倫宣明使君釋騷序天下有至性然後有至情有至情然後有至文文所以達其情者也情所以極乎性者也天下未有人而無性者也亦未有性而無情者也依性達情而文生焉故文所以自見其性情者也人生當世終身而不得一見其性情之事夫豈獨無性情哉性不至則情亦不至也情不至則文亦不至然所謂至者有天道焉有人道焉天者言乎其本具也本具本不具本具而不能自徹是必有徹之之理理徹而體現體現而用廓放乎四海收之方寸知剛知柔知進知退感乎物而得其至當所謂人道也古之聖賢皆以人道而合乎天之至當備諸一身行乎當世使君臣父子兄弟朋友皆惇然有至性行乎其間故能善用其情發為文章冠履天地爭光日月此孔仲尼所為萬世師表者也仲尼事魯魯之君臣不能用其道退而作春秋傳周易正雅頌此善用其情而不流乎激烈以自例於孤忠奇節之所為所謂反其情以合道者也後之君子師其周流列國不遑寧處出而筮仕一不見用則悲涼凄惋無以自容卒至於死嗟乎楚之三閭大夫是矣三閭事懷王被讒去國至襄王復遷江南終不見用憂憤自絶古之奇忠無過三閭者此率其本具之性以為情用情窮則中亂中亂則無以自托于世宜乎其為辭悲傷憂憤俯仰古今號泣鬼神為人臣子事類情同必出於此千載而下讀者傷之傷乎情之無所抒也志士感其遇之不可逃聖賢惜其情之不能返故賈誼之吊長沙也以一己之所遇仰附昔人其辭悲劉長卿之過賈宅也睹昔人之遺蹤顧傷新轍其韻苦是皆感物興情情極則傷傷而不能自已則死死何愛乎惟是人之至性稟乎天成乎人而乃以粹純精一之體遭逢不揆遂終為孤臣孽子之行而於反情合道之理無聞焉此賢人君子所為太息也南康使君宣明倫公遭康殘破適丁艱報上官以其才能戡亂疏於朝廷奪禮治事寇退民逃四五年招𢯦修備百廢具舉一旦遭讒被檄無以自白閉戶讀騷咄咄發言有類乎古之孤憤者書成示豫且請為序豫感其情而愛其文拱而復曰公之情與文無遜古人然屈平賈誼而上尚有師表萬世之康衢廣轍所謂退而自為善用其情而不流於激烈以附於反情合道之大聖人則繹騷一帙聊當一時壘塊韓昌黎謂物不平則鳴亦吾儕通習吾宣明夫固有以自命也夫許九環集序星子令許公逸林宰官中具法界眼而不為法界之量所限者也蒞任星子適余避地入廣南從廬嶽僧已識其大概去夏還山初晤郡齊益信其所傳不謬數往來山中恂恂如久在保社妙喜之子韶東林之無盡談吐旋折數百年人物曠然目前張燈夜話輒以礙膺之物為憾余訝而叩其所從來則而翁九環公之卓有淵源也九環公少讀書能文數折去遂慨然有陶隱居之志夫名淡而後慮清慮清而後知所以返始游戲風塵泡幻軒冕濡首而弗染轉足而高步天下一人而已幾見於早淡而知歸十猶一二面未若九環公之決至乃薄於世味而啓發如故人淺於道味而資深若夙遘有大音為之引端有天隱為之究竟良友相扶在法海漩澓如盲龜值木而實操券於當人暗中摸索絲絲不爽是安知九環公之確然行於其前不更有逸林之悠然武於其後見幾於早淡而知歸何如游戲風塵泡幻軒冕所謂青出於藍吾故於十之一二而佇觀夫天下之一人也此集之鐫也逸林不忍其先人之生平無所聞於世而乞敘於老朽老朽猶不忍其後人無所光大故為之敘而歸之庶幾逸林因余言而勉力以慰而翁則子韶無盡不專美於昔而余之物色殆弗虛乎郡齊一見矣文章高妙作者共見而超然於世而外無所干湛然於道而中不他隸求之今之曲彔床上恐猶恧然汗下則九環公之可傳又豈在乎多也歟是為敘青原嫡唱序頌古聯珠歷代知識借他人酒杯洗自己壘塊同一醉態而婆婆和和各為吞吐雖語不成文傍觀者亦自可以意得故詩與偈不同者詩見情乎辭中偈發悟於言外辭不妙則情難見言弗巧則悟不真豫歎今時說法多以辭障頌尤甚焉巢鳴上座且法兄真子有血性以沈摯痛快之資為吾宗擔荷念洞上機緣散失與其同門安公遠奉師命為採捃之役復以餘力遍搜頌古於殘山剩水別成是集因過豫乞序豫曰頌可以見人乎不可見人則古當無頌遂可見人則今非無頌非謂古可見而今不可見也古與今皆在可見不可見之間殆於頌焉得之則何妨同此醉中而有語無語總以供醒眼一場盧胡是又各人壘塊各不自知豫與巢鳴且作旁觀豈暇顧更有旁觀將以豫為醉中語耶可以見不可以見請持是序歸白而師當有以復我也佛事護伽藍安座石樓高出鎮山門把斷群巒勢獨尊護法檀那全賴汝還家一路待兒孫兒孫且從父祖一句作麼生卓拄杖云侍者扶老僧歸方丈奉華首空老和尚入龕法幢倒矣法梁墜矣佛祖誰託人天誰依哀慟良久云大衆老和尚平日絮叨叨地為什麼到者裏無言指示還知老和尚始終相為麼如或未諳且看不孝子為大衆報恩去也拈封云覿面提持還不妙免令人見更風流祭剩人和尚至靈座前燒香畢拈起祭文云生也不道死也不道為什麼不道生滅門中不曾有者箇消息然既如是即今又作麼生與師弟相見以祭文打圓相付侍僧云且代宣讀一過讀畢復云師弟靈几前神光萬里者一著子今日正借全提愚兄特為人天作禮遂拜下大日菴荼毗老師太八十年來秖是一句阿彌陀佛老師太非但八十年盡十方三界亦秖是一句阿彌陀佛老師太山僧與汝情關天性所藉報汝生身之恩秖是一句阿彌陀佛老師太汝鑒我人子之心始終諦信亦秖是一句阿彌陀佛老師太汝平日在一句阿彌陀佛裏折旋俯仰語默動靜今日亦秖就一句阿彌陀佛裏辭娑婆生極樂見佛聞法證無生法忍老師太汝自示疾夢寐之中嘗睹慈容投蓮胎以此百念俱清一心不亂臨欲命終顏貌光澤身體柔和念佛之聲絶口而化半日已過頂相猶暖山僧用是少慰諸四衆人亦咸感發老師太西方此土實無岐路惺惺底惺惺懵懂底懵懂總教向者裏一爐煬盡不妨各起化儀老師太還委悉麼以火炬打圓相云南無阿彌陀佛遂爇華首老和尚諱日師禮拜起顧左右云且道六年前是今日底時節還是今日是六年前底時節拈香云香煙繚繞浮雲外秋葉紆回古檻前金輪舍利塔設供獨耀靈光非法非色表如來之堅密作衆生之福田比丘函是忝主此山敬禮塔前用舒誠悃願以餘歲盡法行持與十方知識共維古道與天下後昆一洗時習少有名聞利養之心不為天龍八部之所呵護然雖如是諸供養中法供養最即今蔬品陳列阿那箇是法供遂舉香云虛空有骨萬像無形現在聞見不是目前併絶色聲而非劫外到者裏作麼生折合顧左右喝一喝為即覺闍黎舉火事我草年惟一行再參千里始知休兒孫正理還鄉調踏倒機關向上頭復云即覺全身向上無人會會者還他碗躂丘舉火炬云看看為知即離直歲舉火多年勤苦吾知汝曠劫因緣汝賴吾一點靈光休自昧他生相待在香爐知即且道與麼時以何為驗以火炬打圓相云唃唃呱本師天然是和尚行狀嗣法門人今辨述師諱函是字麗中別號天然嗣長慶空隱獨和尚法博山無異和尚長孫也俗姓曾名起莘字宅師番禺望族父字本淨母林字智母俱出世年八旬以念佛終師初生墮地破紫衣胞而出六歲出就外傅一日覺身若隕虛來無所從大哭還家熟睡乃已如是者兩度年十三擬注周易質太極之說于孰師孰師依文解釋師曰此名言耳畢竟太極為何物且兩儀未生太極從何來兩儀既生太極還存否孰師不能答其精研至理發自齠齡性好施有僧欺之再四遂不喜見僧十七補博士弟子員即以斯民為己任偶與同學薦亡友入寺見一老宿語及持咒能致功名師漫應之出語陳全人曰吾輩功名豈假咒力耶曰隨人志願耳求功名得功名求慧性得慧性師然之晨夕持誦苦念慮不靜於心性中始生疑異久不自安一夕靜坐忽覺向所擾者當下冰釋讀圓覺經與己見合就十二菩薩法門各作一頌示諸同學無不推服及閲傳燈録不解其旨并失卻從前所得疑情大發懇親學出世法親曰汝欲出世待名成償所學未晚師遂研精世典克成通儒年二十六登崇禎癸酉賢書明年公車還至吉州臥病金牛寺醫不下藥師起坐禱十方佛曰倘得不死即一心學道自為為人於諸聲利無所圖也是夜感異夢汗透重襟而病頓愈還家後斷欲長齊參究彌切衣不解帶者兩月大悟玄旨向所謂傳燈語不解者如數黑白時粵中談性宗惟東官張孝廉二果相得甚歡丙子冬北上同見空和尚於匡山之黃巖往返叩擊針芥相投示以偈曰風幡一頌解投機千里同風事亦奇三至黃巖問端的實知野老不相欺還粵熊制府心開延請問道待以師禮時值發南漢王冢株連甚衆有厚饋求轉懇免罪者師婉辭不納聞者服其清高己卯有詔行保舉之法師為大司馬方伯特薦當授郡守師掉頭不顧蓋所貴不在此世無知者是年冬辭親北上祝曰此行當官帽榮歸師曰帽子到有一頂只恐不是烏紗比舟泊南康詣空和尚求剃落于歸宗有三十年影不出山之願辛巳隨空和尚住羅浮之華首首衆立僧耆宿為之敬憚壬午省親穗城陳宗伯秋濤率諸紳士請開法訶林空和尚授以傳法偈有訶林重豎風幡論卻幸吾宗代有人之句道聲遠播緇素參尋戶履常滿師苦於送迎諸紳士曰吾輩交方外所少非送迎者由是雖住城中足跡不出戶外甲申國變意切遠遁以二親在無可代養就城東結宇顏曰小持船以便往省逮亂日棘徙白雲西樵及雷峰間丙戌清兵入粵明諸王孫多見疑被戮尸橫于野師遍拾骸骨別建冢以瘞之不封不樹後有議聞行在者師止之曰吾盡吾心耳復何圖哉戊子再住訶林古蹟多所興復庚寅還雷峰闢小院而成名剎平南尚王折柬相招屢以病辭不允勉出以賓主見禮意殷隆次日不辭而返師之倔僵大率如此癸巳重入匡山愛棲賢山水幽勝居頽垣敗瓦之下窮苦異常晏如也戊戌因粵人戀慕請歸雷峰歷坐華首海幢芥菴丹霞諸大剎備極莊嚴竟不易匡山初願辛亥受歸宗請諸剎弟子稔知高遁情深不敢堅留未幾移隱紫霄峰之淨成緣郡守以世法繩諸山飄焉入嶺養痾雷峰有床頭休問菊花期之示及秋終於丈室親書偈別衆曰生也如是死也如是是如是不是亦如是是不是亦如是星宿經天霜風匝地汝諸人到者裏大須仔細七十八年老道翁翻轉面來不知是我是你信手拈來猶較些子師生于明萬曆戊申歲十月十四日亥時示寂於清康熙乙丑歲八月二十七日酉時世壽七十有八僧臘四十有七明年丙寅夏四月六日塔全身于丹霞對岸佛日山師之著述有各剎語録楞伽楞嚴金剛三疏禪醉焚筆似詩諸書行於世得度弟子多不勝紀英靈鐵漢死心相依一時稱盛承記莂者海幢阿字無棲賢石鑑覞丹霞淡歸釋雷峰西堂仞千壁皆先師而逝餘則或隱或顯今高隱鶴鳴峰訶衍摩即師之羅睺羅也師生平古道自持壁立千仞提唱綱宗眼空今古婆心為物至老不衰於門庭設施悉任外緣意合則住不合則行未嘗一字一語仰于豪貴吾粵向來罕信宗乘自師提持向上縉紳縫掖執弟子禮問道不下數千人尤喜與諸英邁暢談窮其隱曲以發其正智於生死去就多有受其法施之益即一闡提與自負奇才而不可一世者見之無不心折且師闔家出世在盛平時生我同生所生以至妻媳捨世緣如棄敝屣不讓古龐公故父子兄弟相率剃染粵中為多云師暮年為法求人心焉益切每談及先宗淚即沾襟期諸後起如地藏之遇清涼圓悟之得妙喜庶幾無憾故法道隆替雖繫乎時逆撐洞流志無少屈足見護念佛祖慧命亙萬古而不磨也今辨才短筆拙僅能述其大概若道眼圓明行德高古詳諸録中世所共知無俟煩言爾天然是和尚塔志銘司馬總憲南豐湯來賀撰禪師名函是字麗中別字天然華首獨和尚法嗣也初六祖滅後派衍五宗其一曹洞凡三十二傳至博山無異異傳華首道獨獨傳師及函可可以罹難化導瀋陽師既得法歷住江右粵東諸名山大剎說法度生踰四十載康熙乙丑八月二十七日示寂雷峰明年四月諸大弟子奉龕建塔於丹霞佛日山麓又明年丁卯法嗣今辨以書狀來請銘豫與師道雖不同然曩宦粵時已心儀師後復遊粵訪師于東莞芥菴為豫言儒佛異同之旨比入匡廬又訪師於淨成豫於師固淵明之與慧遠也其敢辭銘師本姓曾世為番禺望族初名起莘字宅師生而胎胞紫衣墮地始出六歲出就外傳自覺身若隕虛大哭而返如是者再十三思注周易問太極相生於孰師為依文解說師曰此名言耳太極究為何物且兩儀未生極從何住兩儀既判極從何去孰師不能答十七補諸生輒以康濟為己任或教之持咒可長智慧自苦心念不靜遂起疑情如是有年嚮所擾者頓如冰釋及閲傳燈録不會厥旨併喪所得乃大疑懼遽求出世父母曰汝欲出世當俟名成師體志懋勉蔚為名儒年二十六舉崇禎癸酉鄉試榜發日方歌鹿鳴坐念功名富貴與己無預上甲戌春官歸塗病劇感異夢而愈自是斷欲絶葷參究益力衣不解帶者彌月大悟玄宗丙子冬謁獨和尚於黃巖往返叩擊針芥相投獨示以偈曰風幡一頌解投機千里同風事亦奇三上黃巖問端的實知野老不相欺己卯公車復上舟次南康值獨和尚移錫歸宗詣求祝髮先是詔行保舉師以大臣交薦當得美官乃謂選官不如選佛棄猶敝屣壬午省親廣州宗伯陳公子壯率諸人士請開法訶林師以文人慧業深入真際直見本源斷諸委曲全提正令大闡綱宗行無等慈目空千古緇素禮足凡數千人率皆有叩則鳴無挹不注甲申後避地雷峰旋徙棲賢更歷華首芥菴海幢丹霞諸剎所立規矩整肅森嚴一切外緣視若塵垢當平藩鏡粵敦請再三至不獲已以賓禮見次日不辭而返師雖處方外仍以忠孝廉節垂示及門以故學士大夫從之遊者每于生死去就多受其益甚深締信抑且為法忘軀競相落䰂紹隆聖種弘贊宗猷師師濟濟一時獨盛緣師穎脫塵勞正當韶年得志父母妻妹子媳先後俱著條衣實有以作觀感也晚年退居霄峰之淨成猶孜孜汲汲為法求人每一言及先宗輒為隕涕時佛法濫觴惟師門風孤峻與諸方異有宰官欲以世法繩諸剎乃返雷峰既而示疾預去期臨行手偈示衆端坐而逝距其生萬曆戊申十月十四日亥時壽七十有八僧臘四十有七所著有各剎語録楞伽楞嚴金剛三疏禪醉焚筆似詩諸書嗣法弟子海幢阿字無棲賢石鑑覞丹霞淡歸釋雷峰西堂仞千壁皆先師入滅餘各分化一方其高隱鶴鳴訶衍摩則師之羅睺羅也銘曰三教同源等無異惟茲杓人乃二視儒門淡泊世交喪誓向空王豎赤幟諸見既滅覺照空得無所得住圓位一毛頭上現全身大千拋擲同游戲從上窠窟盡掀翻瓦礫生光無剩義目空今古道風孤世出世間扶正氣八坐道場四十秋龍象蹴踏誰能企南天佛國賴重興洞上綱宗終不墜我無生滅隨因緣道樹忽枯涅槃至恆沙劫壞塔巍峨如是如是亦如是詠梅詩序言天然老人以名孝廉早謝舉子業入選佛之場其事在鼎革前非他有托而然者倫也老人為博山之孫乃建立其宗旨于廣南一時道望之高從遊堵益衆會下淡歸師豫同年友也羊城平定之後安集為難豫鞅掌為俗吏曾再通淡歸信不及訪因不及一謁老人老人曾從平藩請一入城豫適有他務羈不得見茲去粵有日矣念此常為歉然有客以老人梅花詩示者云淡歸致言索豫序嗟乎豫不見老人今得附名于其詩使老人見我乃豫之幸也夫詩之一道本非禪家所貴然而古德多為之其詠梅未嘗沾沾于梅也原風人之意如河鳩淇竹非為比即為興大都偶感于物以寄其懷云耳若必詠物之體求之將曲肖其形質微寫其性情博徵其事實非切而能工不以名執此評諸詠梅者林逋暗香疏影二語而外可稱者寧有幾哉然而昔人詠梅往往多百篇今老人之作亦百有二十篇嗟乎吾知老人之托意深矣夫佛之妙法取之蓮老人之微旨取之梅以例之柏子草頭老人之詠梅未嘗非說禪豈可以詩觀之耶然即以詩觀之此老人諸作其格高矣其趣合矣其詞為雅馴又豈他百篇者所可及哉同時有名孝廉美周黎公與老人俱以大法自任美周前在揚州有詠黃牡丹詩十首盛行于時夫牡丹之黃者特表異于繁豔而梅寂守其清寒各有所取之他日美周以節烈終從世間法老人常逍遙于方外遊嗟乎豫于茲詠梅詩得之矣賜進士出身通奉大夫山西布政司王庭拜撰天然是禪師梅花詩門人今辨重編五言律一東白花輕一放萬壑盡春風蜀客相逢處何郎寡和中煙荒村路斷人去水流空卻憶霜零後雲山望欲窮二冬荒榛迷遠道絶岸一相逢漂落非殘雪橫斜傲古松目空煙暝色跡混獵樵蹤自顧同寥廓隨雲隱亂峰三江寒溪疏影瘦夜靜水淙淙雪重從衣薄煙深帶月降不因驚碎玉何處覓枯椿四望江山暗泠泠獨倚窗四支獨秀一林悄寒山薄暮思風煙愁見晚桃李恨生遲觀世疑空劫論交與古期莫云春漸暖應記未開時五微倚空寒夜月林靜鳥聲稀一自逢人少方知與世違雲煙籠不住泉石好相依香入初風醉臨崖悲採薇六魚春愁看不極空谷此情疏地僻先明月天涯遲素書立殘三尺雪坐老一園蔬豈待東風至雲中香有餘七虞催人頭已白朝夕共躇蹰踏雪香非遠尋香雪又無歲寒傷一折春入老千株村路溪橋迥垂垂清影殊八齊晚雪風初細花開山鳥啼易寒迎日近難見故枝低獨樹紆樵徑叢芳狎釣溪名園多蔓棘聊傍石橋西九佳故園黃葉盡風雪舊生涯孤壑春先醉同人月在懷抱香矜獨處殘夢怯寒蛙道路雲煙渺尋芳到古崖十灰去年為春落今日為春開萬里誰相識白衣人又來望窮雲鶴影愁斷杏花杯一自幽香動群芳夢欲回十一真不到空山裏孤標恐未真嚴枯今日景初蕊百年春江店煙中樹荒臺月下身平生信幽節寒夜自無人十二文荒原人影寂孤鴈不堪聞惟有一枝秀乘風寄白雲王塵初夜靜素色曉霜芬珍重冰稜意前山日未昕十三元幽根不可拔歲歲老蓬門絶俗臨危石依人傍遠村有花應有雪堪對不堪論愛爾疏斜影寒山知獨存十四寒一從秋色老寂寞倚欄干花發春何限春來花欲殘不因傷歲暮能得幾人看為語禁寒者楊州興莫聞十五刪別有凌霜意枯榮從去還不堪橫卻月以此到廬山草色催人老幽葩空自閒春風能解凍零落豈須攀一先灞橋春色早迢遞到窮年韻落江城杳香流古澗前一峰新雪月千里舊山川翹首人間世寥寥共遠天二蕭寒盡花初發相逢慰寂寥遙知日照處不與雪俱消閉戶來春色隨鞭過楚橋古今情未已江國正蕭蕭三肴孤山空自放豈問歲寒交但得香在石何妨露滿梢葉凋深見月鳥過不棲巢最是幽人意誰當共結茅四豪萬卉休窮臘孤芳此獨勞枯藤發寒焰春色動林雪暗光逾滿雲低影自高蕭條生理別方嘯北風號五歌不入芳菲徑棲心當若何獨辭春日短因共白雲多素色和煙老疏懷逐鴈過秪應同靜者零落在六麻漸覺朔風急疏林日影斜悲時同落葉積素獨呈花寒坐三冬促春光一夕賒少陵忘卻恨應負此心遐七陽非關衰世意皎皎一凌霜愛我不嫌白憐人秪自芳幽懷如有寄孤放若為狂但到春深處悠然思共長八庚涸落知誰世危危獨向榮為憐衰草色不盡倚寒情泉石何曾暮煙霞餘此生疏斜如可似真悔一時名九青欲折不堪寄晴窗香一瓶寂寥須此鑒消息可誰聽愛雪驚同色和煙混獨醒更饒窮臘韻孤鴈下寒汀十蒸籬落難為色山寒情不勝素襟堪對石幽韻卻疑僧凍臘他年恨春光昔日曾霜中誰可念令我獨憑陵十一尤獨出群芳後凋零感暮秋吳宮花草盡漢苑晚香留白髮宜松老閒情共竹修月明風露滿無事到春愁十二侵舉世渾如夜何人問素襟空山曾有夢秀色自成林已辦窮年計寧愁曉露深夕陽流水處古韻日沈沈十三覃立雪終何極深寒亦自堪誰當尋素侶知不到茅庵此日雲中趣千秋石上談大庾花信捷春色滿江南十四鹽離離孤影絶因月到疏簾尚有餘香在殊增老衲嫌暮雲旋欲合朝霧不曾霑獨倚寒巖醉無人韻更添十五咸濯濯寒逾潔惟當老碧巖幽心矢霜雪疏影托松杉山靜雲千樹僧歸月一帆無人知此意長詠付琅函七言律一東乾坤渾灝鬱巃嵷物化承陽氣候通萬彙初回先素色群芳未綻暗香叢風飄雪蕊隨煙散月凍溪明一樹空慚愧梁園覓不見獨留孤韻古今同二冬笑抱閒情自一峰東亭何處見春容相期深谷惟明月不畏巖寒共老松帶暝坐醒初夜夢倚空愁破五更鐘生來傲骨慚煙火半落溪橋濺短笻三江聊將春信渡寒江映雪清姿色未降零落風煙同白鷺蕭條形影對銀缸夢回香遠人何極望入雲端眼一雙萬紫千紅看若此解衣誰與臥虛窗四支孤芳無地足棲遲木落溪寒又一時瘦骨且隨巖壑老素香不使水雲知濛濛太古幾忘歲寂寂空林欲待誰倚石自憐霜雪意百年春色正相期五微一圍寒玉影離微獨坐山頭夜不歸曉露未乾窺石室夕陽初下映柴扉似憐高士埋空谷猶聽孤猿欲攬衣夢斷羅浮春尚早北風吹雪雨霏霏六魚寂歷空山清夢餘一枝斜映六窗虛幽人抱鏡臨秋水老衲憑松讀梵書坐石不知寒夜永聞香方覺朔風初春深正恐無尋處珍重衡門影自疏七虞曾和積雪暗前途雪裏聞香風味殊萬里煙銷春信達閒亭玉立客心孤影沈寒水空無鴈光浸長天月在湖終古離披君不見臘窮人散獨躊蹰八齊山寒石瘦暮雲低一道晴光混不齊萬古鴻濛自今日何年開落到西溪孤松鶴立煙霞老野渡舟橫樵舍迷我亦危危人影外凌風臺上笑相攜九佳一翻寒徹影參差撲鼻餘香韻自佳晝共白雲連絶巘夜同明月醉空階為慚芳草遲春陌獨許梨花到石崖是處江城吹欲落泠泠古調可誰諧十灰含章花事已成灰為愛寒溪帶雪來一望白山人穩坐數聲清淚夢初回多情且共三生石好月相尋緑橘杯歲歲凌霜君自惜莫教憔悴北風催十一真開遍江南未是春春光辜負隴頭新幽姿濯濯清霜月道韻森森白髮人松柏無香須憶我溪山依舊可誰倫豈因舉世慚珠玉顧影寥寥亦自親十二文荊南似雪恨空聞地老天荒始見君霽色同人能悟物正襟危坐若無群離離疏影先春動皎皎寒光後夜分一擔枯藤探不盡朝煙暮月為誰醺十三元斜壓疏籬秪自存香風冉冉入黃昏獨翹天際渾無色漂落空潭不是痕雪映高低疑近遠冰懸日夜自乾坤朝滋夙露何勞問多少衝寒到石門十四寒高放嶒崚天地寬幾枝清瘦自輕寒只教雜雪披靈苑不共含桃薦玉盤落葉滿山光璨璨亂雲深處影團團羽衣皓首空相對錯比華嵩石上看十五刪聊傍雲峰共掩關霜清月白一僧閒秋風不折凌霄骨臘雪逾深老鶴顏寒涕垂膺憐懶衲龐眉坐石傲西山匡廬頂上湖千頃慚殺當年漢苑還一先佳氣隆隆萬象妍靈根曾植古皇前謾隨晨霧舒寒焰識得春光是舊年湛湛清姿和瞑醉稜稜丰骨帶雲眠無勞支老買山隱儘有疏斜庾嶺邊二蕭隨風遠度自迢遙到處生涯香一瓢紫陌無緣花欲老雲山有恨雪中銷看殘蘭菊甘籬落聊共松杉冷灞橋皎潔自驚寒色異春深依舊緑條條三肴永夜空濛月一梢泠泠疏蕊破荒郊只愁終古無春色獨抱寒香共石巢逸士踏餘三徑雪老僧長傍半間茅孤榮卻為群英早但到芳菲笑落匏四豪姓名終不入離騷留與雲煙援彩毫巖壑何曾有霜雪春風吹落盡蓬蒿幽葩吐處陽和動素蕊殘時青草高自是韶華乘代謝遐心無耐聽松濤五歌飛空帶雪影婆娑落落幽巖亦自多千樹凍雲銷不盡一溪寒月又如何光凌北斗疑長劍鴈叫清霜當浩歌古寺森森鐘磬外有人含睇在山阿六麻煙暝繽紛落日斜五衢寒盡一枝花我憐素色禁殘雪誰愛餘香坐晚霞但道影疏南浦月豈知春在野人家幽光處處都相似況是荒岑韻更賒七陽獨厭容長異衆芳出來素質欲凌霜坐銷色發林秀引得春風滿草堂愛此清芬先墮葉卻憐憔悴暗生香不妨共對連宵迥千古幽懷在石床八庚玉質冰操共此情歲寒惟見一林清雪霜滿地誰堪白桃李開時但有名飄落且隨流水去孤榮又傍碧巖生臨風欲和還應笑何處關山無笛聲九青萬象沈沈醉不醒微雲淡月倚山亭若憐凍臘為先放更喜春寒尚未零容易珠離千顆白曾同柳色幾枝青幽姿我亦慚相失夜夜溪頭戶半扃十蒸山徑橫斜好共僧孤雲野鶴碧崚嶒相看石上寒如此坐到花殘春未曾淡影情疏應似我曉風人外若為朋紙窗竹屋凄清處一片禪心不可勝十一尤黃花落盡獨憐秋便放寒山倚石樓佇望白雲歸洞壑坐看孤雁下滄洲影同雪色惟堪賞嘯入春風不可留一自參軍吟欲絶疏鐘微月夜光浮十二侵雪裏窺人雪不侵淡香孤影百年心一梢煙月看同昔去日春光又到林吹落為摧羅袖色高低空笑白頭吟菟園上苑多憔悴別有幽根在石岑十三覃輕寒殘雪暗江南曙色幽香尚帶嵐潔白不傷行路意疏斜終欲老雲庵似催萬里還家信猶伴浮生半日談卻笑武陵溪未穩年年春夢付癡憨十四鹽雪中香色水中鹽夜夜看花味欲兼不是我來寒徹骨枉教人醉月明簾孤山影碎千叢玉萬里傳持一素縑幾度因風聊寄贈恐驚頭白易生嫌十五咸滿林秀色映松杉西竺先生經一函雪嶺開殘迂凍臘早春疏影到千巖山中有客堪餐石月下何人曳素衫且抱閒情恣幽賞香臺雲外共喃喃五言絶一東葉盡花自發正當寒山中山寒人見少花發年年同二冬花在寒雲裏看來隔一重路傍猶落落況復到高峰三江枯樹望空白回頭香在窗一時聞見靜使我夢魂降四支寒色擁千樹尋香只一枝何因重攀折欲識樹上時五微心知花在樹望月影微微不到寒香入終然此意違六魚高樹花開盡低枝蕊尚疏近人情熱處留取暗香餘七虞望裏花疑雪近看一語無全身在香國頓使野情孤八齊多少寒山子相看在小溪不知香冷處終日對花迷九佳有時寒雨過生怕素香差細看枝頭濕方知濯更佳十灰遊人欲多折要傍小瓶開不知香在手更覓一枝來十一真花香花不覺都付賞花人人散香同歲泠然太古春十二文獨立荒煙白不驚寒鴈群秖因春夢斷夜夜但空聞十三元香暗隨風度飆飆不欲存聞香意何限花自到黃昏十四寒幽豔曾無歲尋香人自寒一般清冷致終不悔衣單十五刪獨舒寒壑日紅紫一時刪暗香酬客意誰會到花間一先春色有無處但觀寒臘前迥臨村路上來往白雲邊二蕭覓花花不見雨雪空蕭蕭認得枝頭穩何須待雪消三肴秪為花開處偏令雪上梢春風吹落盡不見雪空巢四豪走馬春郊早探花問凍醪花醒人欲醉笑殺五陵豪五歌一枝三五朵疏處月明多舉頭見寒月不覺暗香過六麻日出雪消盡泠泠一樹花焉知寒日落香色未曾差七陽月下花容隱雲中花影長坐到無花處時聞一陳香八庚縱白何如雪疏寧似竹清若無香撲鼻猶逐倚寒名九青晨起到花處不知花已醒但憐寒歲見莫惜露零零十蒸莫道寒偏妒多因花欲凌一自同於雪方知雪不勝十一尤薄暝易相識月明何處愁分明枯樹裏望絶白雲頭十二侵寒夜無藏處花枝共月深清光才一半休向月中尋十三覃好處非關月重煙不著嵐疏斜泉石裏看盡古今談十四鹽欲寄成何字天涯滯尺縑相思與相見語默一時兼十五咸風雪猶未已花開自碧巖欲知寒蕊意遙指隔林杉七言絶一東色共梨花香不同千山煙月有無中立殘孤影君須認看去春林溪欲紅二冬長橋低岸好相逢多折偏憐落客蹤遙望白雲溪路滑幾枝殘雪老孤峰三江翹首南天意未降毿毿白拂豎寒窗曾從黃姓同蘄路一棹蕭蕭夜度江四支洗盡鉛華欲付誰風煙凄斷月明遲莫愁春到先搖落更有深春搖落時五微白玉條條映落暉雪中春色正依違天涯苦恨知何限獨立空山待客歸六魚荊榛荒沒露零餘天北天南影共疏花發寒空愁更落冰田長欲帶雲鋤七虞昔日玄都花滿衢看花曾數暗香無菟葵燕麥凋零盡回首寒山樹一株八齊標實無期望欲迷可憐道路獨栖栖誰同素影千巖秀潑盡寒灰落紫泥九佳影同寒月印空階錯愛清光掩素懷夜夜枝頭看似夢踏窮殘雪惜芒鞋十灰木落煙深孤鴈哀南枝憔悴北枝催從來春色應無住空自撩人花繞臺十一真大漢將軍六代人披星臥雪舊風塵相看灞上終何姓憶得雲中老鶴身十二文成都高臥影紛紛誰謂晴光獨映文放出餘香應十丈為憐人共木犀聞十三元臘窮人不到柴門花落花開總莫論雪色自嚴香自遠更無形影待王孫十四寒高寄空山天地寬素香初蕊足盤桓莫將白髮輕寒意都作春愁對月看十五刪丁丁伐木響雲間才入春風鬢已斑認取幽香付他日臘殘寒盡待花還一先為誰帶雪到春前幾度相期雲水邊過眼不堪人意盡一枝零亂又殘年二蕭春光林下共迢迢百納雲衣覆石橋道是聖僧猶不似何當香逐美人飄三肴片片新花發故梢隴頭流水一間茅壽陽宮裏如相覓為道于今共石巢四豪難知休訝一枝高出手何辭待雪勞花落更應期子熟莫教人羡武陵桃五歌暖處難逢寒處多幾生魂夢付藤蘿花光長老曾摹此何似親從庾嶺過六麻一本分攜度嶺斜只今方見歲寒花山中獨秀無人問狂殺清江舊酒家七陽謾道生來欲傲霜相投應亦惜名香多情索共巡簷笑爭較高眠怪石旁八庚雪滿江邊花氣清垂垂一樹古今情悲歡閲盡宣城眼聊托詩人天下名九青蜀郡名園畫掩扃佳人笑語尚亭亭風前玉立何生夢猶自題詩醉未醒十蒸高處憑空折未能連雲帶月影崚嶒誰當錯比仙人萼李白親傳自老僧十一尤寒倚欄干映日浮高樓胡笛滿天愁北風衰草蓬蓬盡任是初年亦白頭十二侵四望江山共一林百年春色雪中深勸君莫向枝頭覓風起隋堤何處尋十三覃錯落雲煙傍草庵繁枝應許赤松參春風暖處如相憶數盡霜中一月談十四鹽萬彙凋傷花意嚴煙漫漫又月纖纖傳聞勝似吳門兒名姓終慚薄世嫌十五咸顆顆離珠月欲函洛陽歸去寄松杉幽花不作凌霜色萬古香風自一巖雪詩敘古來詠雪者多矣撒鹽舞絮其失也纖縞帶銀杯其失也豔剪水飛花其失也幻教粉堆麵其失也膚以及鹽虎玉龍之句鶴毛蝶翼之章擬議雖工愈失本來面目矣余謂天壤間最高潔者惟梅與雪蓋其性厭塵凡境耽孤寂與深山老衲似有夙因故其形之詠嘆不啻現身而說法也天然和尚舊著梅花詩百二十首清曠絶倫讀者已超然天際矣茲所作雪詩亦如其數不事鏤冰刻玉而觸想成言真有萬壑空明千山皓白之致此固胸中自然流溢非風雪驢背推敲者所能效其咳唾也顧嶺南之雪未易多見乃師甫入丹霞而瓊林瑤樹忽與筆花墨瀋翕然相遇于几杖之前殆猶豐山之鐘別有感應而豈地氣所能囿哉抑聞師是集不三宿而脫稿想其揮毫落紙如天花之旋舞于空中而不知其聚散所自擊鉢詩成起視門外雪深幾許又與披雲見月同一光明境界也恨不與侍立諸公同聲而讚誦之當湖弟子今亙陸世楷拜題天然是禪師雪詩門人今辨重編五言律一東二月嶺南雪梨花間雪中影浮難似月力弱不關風片上青衫色繁飄白浪空千峰今夜夢迢遞濕歸鴻二冬春泥看易盡空谷自為容覆葉深藏鳥繁花不惹蜂暖沈朝市影凍塞虎狼蹤漸見蓬蒿滿川原何處逢三江停舟煙樹白沽酒對寒江古驛無嘶馬孤村有吠尨近墳埋土壘遠火暗山窗誰復能同此棲蘆鴈一雙四支龍山驚險峻雲路慎擠推壓頽愁地軸飄落念天涯低易填溝壑高多折幹枝看窮殘臘景茅屋欲深移五微陰景去何促陽和轉尚微若將虛夜色無復擬朝暉熱處終難待寒中初易違且尋峰頂侶雲霧共相依六魚卻似雲中日朦朧曙色初耐寒興獨早愛暖步還紆篩嶺樹邊犢迷江榜上魚何人重回首凄斷老樵漁七虞彌天光共滿薄景照偏殊關塞愁征戍屋廬凄腐儒濕吹連曉角寒斷一冬鬚莫以千峰色都同暗夜珠八齊峰峻疑懸布玲瓏逼漢低徘徊驚曉鶴厄喔誤宵雞竹摧陰壑影猿斷北山啼沃土候春暖攜鉏分夜畦九佳啓戶皚皚積觀林密密排冥茫應自合緯繣不成乖帶露胎春雨連雲澤凍荄氛埃消欲盡冷豔此時諧十灰高低看落處淅歷竟何來積坎非邀厚知危不受摧借暉分鷺翅倚素入瓊杯千里何辭遠層巒夕曜開十一真暖席不堪近寒溪好作僯豈嫌青草陌欲傍白頭人隱霧迷深谷乘風度遠津年年似荒月來照不萌春十二文陰結先成霰蕭蕭自遠聞入山青易見到水白難分惜暗夜籠月停光畫薄雲晴簷澌欲滴宿鳥啄微昕十三元寒波泛不極瓊路易迷源積曜夕沈壑微光曉在門遮空時欲下舞屑忽成繁深谷無炎熱層冰豈自存十四寒一夜鳥飛絶千峰影到欄莫將銀世界空作月明看對爾皆憐白何人不畏寒浮雲滿原隰遮莫悔衣單十五刪朔風不到海寒氣早歸山玉露當秋委瓊花向暮斕潔堪窺漢淨輕得御雲閒幽望成何似皋禽斷續還一先通朧光燭地浩蕩渺連天照豈分高下汙從落市廛年華休見晚曉氣欲爭先不待陽和動微風散玉泉二簫慘冽紛晨影凝華凍晚朧連光搖暖幌含曜落寒潮不借投虛隙何勞映碧霄一回幽對暇寥廓靜塵囂三肴薄照掩寒日漁舟凍欲膠大江沈遠岫枯樹覆空巢鼯鼠歸無路雲僧蓋有茅莫愁紛糅下千地一深坳四豪砌上埋黃葉雲中揮白毫落瓶珠萼細籠樹玉山高未暇裁寒練何曾失寶刀飄零愁背日回照莫成勞五歌枯涸逢人少荒茫失路多泥塗鋪紵練珠玉委江河染亦因風力光疑入鏡魔無心信芳潔寥落夜如何六麻嚴飆隨遠近須到野人家拂岫迷青黛回江走白沙漉渢投闊直迂曲入欹斜巧拙無藏處空山對落花七陽一宵星月落萬戶暗扶桑鳳閣浮香粉華山起白羊路岐增浩歎雲合漫飛揚瑣散成朝暮河山空漾洸八庚閬風連夜發綏颯到平明狡獸雲間斃飛禽海上驚寒威驅霧翳霽色帶霜清庵裏復何事危襟坐五更九青錯落空中映蕭疏象外泠溪清不可見雲暗欲全醒坐對無昏晝行吟過戶庭煙深孤鶴影寂莫擬身形十蒸萬頃看同縞憑雲降復升到江知是水近日不成冰花落疑春妒光流向夕澄沍寒人欲暮皓皓自千層十一尤素質輕如羽悠悠經暮秋投窗空見影積石暗聞流擬作瓊瑤跡翻憐溟渤漚連天捲山霧迢望轉成愁十二侵千株開照曜一夜滿庭陰擬㨖雲霄上寧愁溟壑深夏凌堪鎮嶽春水欲鳴琴漭沆思林澤魚龍未易尋十三覃浩渺成高厚冰壺秋水涵蘚苔低見覆梅李側多慚去鴈迷煙渚饑鳥啄草庵繁絲停暮色鬚髮入寒潭十四鹽玉塵連朔漠飛墮水中鹽萬灶無煙火千峰入素縑樹寒鶯語怯石凍梨花淹倒照雲中色晶晶對夕檐十五咸一天冥海嶽萬岫失松杉極目空中素回頭人倚巖壓沈雲外路微濺石邊函渺渺開襟處春融見遠緘七言律一東陰陽凝散碧煙中飄落何勞問異同飛絮隨風空自白寒爐終夜為誰紅深山擁被憐東郭野店憑鞍笑謝公凍殺亦饒清氣在人間天上一無窮二冬憑軒迢望欲攜笻濯濯江山千里從白盡不曾誇素色晴來猶自覆青松暖消石室一杯茗寒入峰林幾夜鐘試問重裘驢背上護生堤畔肯從容三江紛紛裂素映山窗萬壑千巖色盡降轉霧驚風朝不避輕雲蔽月夜無雙愛同野鶴投高樹不畏飄蓬入大江一種縈光隨去住枉教人自對寒缸四支永夜沈沈聞折枝空山如在百重圍佛鐙初暗紙窗白香篆將殘磨衲知十里江樓寒吹蚤孤舟沙岸苦吟遲因茲憶起平生事萬慮銷停鬢已絲五微天南漠北雨霏霏誰掩峰頭明月扉祇為縈空慚夕照卻憐落樹似花飛板橋風捲馬蹄滑江樹雲繁驛路微看到晴巒春漸去鄉關何處待人歸六魚寂寞何人映讀書窮簷衣薄逼年除幾多陽豔寒中過豈有光華霽後舒撒空未許隨風盡含影還堪擬月初回首莫愁雲路隔白茫茫處是吾廬七虞藹藹浮浮散五湖寒庭孤嶼惜驪珠傍巖妃子元名宓仗節孤臣本姓蘇淡若肌膚疑玉粲皓然鬚髮蘸冰壺飄颻更有回風處淺渚荒原照碧蘆八齊河梁匹馬晚凄凄奕奕浮光拂樹低驛舍官梅花濺路酒樓衰柳客如泥雲連古岸沈牛跡影隔千峰無鳥啼空濛上下知何極谷口聞鐘野寺迷九佳霏微暮色鎖清齊久住峰頭路不埋愧倚晨曦光自滿更嫌晚彩影誰諧龍泉暗溜千行石牛火頻燒品字柴寒徹始知魂夢隔何人吟望在天涯十灰同雲遍野朔風催萬頃晴光一夕回慘憺莫愁寒日處通朧只在暝煙堆坐久不禁成獨往夜深常覺有人來春明未必能相似誰遣繁花寂寞開十一真積照微茫絶四僯望中誰是陌頭人落花滿院疑無樹拂草連天暗度春一室冰稜應自惜萬峰珠錯豈全貧分明共對羲軒上更待晴暉恐未真十二文寒風超忽白紛紛兩岸瓊崖一水分畫裏合離難著素空中興滅不成文影沈池上千重玉光覆樓頭六出雲便向歌筵分酒力容華銷盡到斜曛十三元萬樹梨花暗寺門愁雲冉冉滴寒原今年到地未盈尺幾日遮天長似昏近水無聲空入澗遠峰不見卻聞猿凄清共是此時節猶憶匡山五里村十四寒蒼茫江霧濕征冠萬井蕭條行路難黃竹有歌愁宋玉蓽門無路臥袁安梅逐餘香須早落羽慚輕質不勝寒雲中信有凝春樹向日微微出石欄十五刪散漫川原自雪山龍沙迢遞鴈門關千林玉樹三春失萬頃瓊田一钁閒銀象難藏身外影素娥不耐月中顏誰云埋沒河山上指點樓臺落照間一先幽靜多懷對遠天飄零猶自憶前年潔清亦許隨芳穢流亂何從數後先幾家依樹籠荒月一鴈迷煙下暮田已覺光芒疑夢裏泠泠石澗水流邊二簫衡陽委絶白迢迢衰草荒原朔氣驕自有流光遲曙色卻無形影到春潮縈回古渡愁歸客蕭索空山泣去樵風景依稀還世外人間何事苦招搖三肴繽紛繁鶩沒空郊獨向層峰伴鶴巢活水滿煎三峽茗斷松斜壓一間茅龍潛大澤寒猶蟄虎踞深林凍不哮掩戶且高殘臘枕漆瓢腰繫萬年梢四豪糝粉輕飛二月高撲空如湧海雲濤瑕銷白璧全欺趙色擬麻衣卻笑曹不薄青蘿凝夏谷定飄紈扇濕春袍暖堂何似寒巖迥夜夜風簷映玉毫五歌浩蕩乾坤平布澤霏微物象自婆娑蘆邊立鶴朝曦亂樹裏藏鴉夜色多入地定能銷碧血彌天已見倒銀河南洲到海猶炎熱坐對泠然發浩歌六麻飄搖縞帶總隨車隔絶門庭入徑斜透隙卻疑搜鼠兔翻空真似攪龍蛇池中有水偏投影石上無根亦著花瑰屑不堪寒到眼縱橫難掩碧籠紗七陽白霓遠近啓山堂欲濯塵氛淨上方江浪到天應浸日瓊花著地不聞香千峰倒影入寒瓣萬屋平漫泛夕陽借問年華真個晚細看春色動遐荒八庚雲外何因見素情玉麈風滿淡然生寒絃人向深堂調凍屐誰同傍石行望遙天末山應在踏近溪邊水更清勝事大都成寂寞兔園空有惠連名九青白練千條入鏡清輕繁欲向夜窗聽憑高且遜尖峰出就下還尋絶壑停華表鶴翎迷舊郭豐城龍劍擬新硎攢天一倍臨風急卻似倣徨廣漠庭十蒸濛濛萬象獨憑陵何物光芒積素凝面目冷然遺草澤肝腸如見托崚嶒若為熱處偏成水不耐寒多竟作冰自是野人茅舍穩斷橋孤岫一枝藤十一尤臘窮泉涸絶溪流河海雲生杲日收一夜似風吹敗葉五更疑月滿層樓卻回寒焰榮幽桂豈為凋林感暮秋遇物淪形歸大冶高低平泛曲江頭十二侵重輪掩抑畫沈沈顧影難為薄曙襟世上相尋皆桂苑人間何處有山陰去留不是迷源客深淺誰論將策心看嶽共驚雲勢湧低空不覺夜堂深十三覃委積徘徊散薄曇先春有信到江南常行淺砌猶疑別欲過前山祗自諳當晝連煙昏遠樹無燈通夕曉寒龕但知掩日韜霞意始覺幽暉萬景含十四鹽萬丈煙波撲巨炎名模鎔盡絶廉纖無端虛室能生白誰向空中擬撒鹽芳潔逾慚高士愛嚴寒不畏世人嫌一從凋落黃花後夜夜峰頭寫素縑十五咸誰鞭天外白珂銜勢盡雲駒萬里帆欲湧波濤翻日月不留蒼翠覆松杉食餘藥嶺千牛草寒有青州一布衫莫笑繁絲倚枯木衰顏窮望上江帆五言絶一東細看重雲裏分明不是空夕寒光獨遠憑化委長風二冬春色在寥廓沈煙蘸玉容縞衣輕似舞乘夜上高峰三江愛松埋鶴影背月照寒窗最是無人處生憎嗥夜尨四支玉塵散林薄半上古松枝枝壓愁將折塵消曾幾時五微千峰一夜白先照野人扉似月望高樹溰溰濕衲衣六魚皎潔侵寒陌氛霏二月初梨花香未散隨影落吾廬七虞因風消蠟炬無影落澄湖寒熱一時盡清輝何處殊八齊渢渢連夜動起舞似聞雞冰合知寒極瓊花踏作泥九佳白髮鏡中落真同近暮懷但知寒色迥隨處得生涯十灰雲裏望何極紛紛撲素埃江山同一色不見鴈飛回十一真雲暗非關暮花飄豈是春晴光應十丈不為住山人十二文濯濯霓裳濕何人倚白雲莫將雲裏影空向陌頭分十三元浩渺疑空劫霏微向暮原思歸歸不得洞口已迷源十四寒嚴威生大漠萬甲擁雲寒何處刀砧急朦朧向夕攢十五刪落樹烏成白催人鬢欲斑輕質何曾定浮沈煙雨間一先迢遞長征路倣徨欲曙天最憐清素影撲落馬蹄前二簫山光不是曉半夜過危橋一似聞生客千峰失寂寥三肴狂吟月下客門外任推敲深夜寒侵榻誰憐樹上巢四豪鳥絶山霧起日沈雲影高微風吹玉屑不上懶瓚袍五歌三聲溪路絶一壑同雲多寒光幽處近形影托青蘿六麻階砌葉初上雲山路轉賒掃門殘影亂千里望貧家七陽枯根覆已盡殘夜滴寒塘人在空山裏山空人影長八庚日落山路合林寒霽色明梁園人盡醉那識此時情九青帶寒汲遠澗片片落雲瓶水凍還成片何勞煙霧停十蒸陰風吹白羽皎皎雲中澄誰謂終非水人言不是冰十一尤終歲滿林白重煙隔上頭定教寒裏見不遣入春流十二侵瓊花散丹石掩映臨江陰誰知枯落後更有白雲深十三覃倚樹繁衣袖流光向夕含何人能到此撥火共癡憨十四鹽不分光浮地還函明鏡奩寒輝殊未減春色夢中兼十五咸帶雨瀟瀟下江寒落遠帆峰頭一回望望久沒松杉七言絶一東灑盡平原萬里空橫江沙捲馬頭風寒雲已沒斜西照更勒金羈卻向東二冬欲向冰霜慕遠蹤藍關何惜馬蹄封已甘朽骨埋江瘴猶恨秦雲千萬重三江乘風昨夜叩山窗慚愧華亭尚隔江莫道驪珠容易見乖龍左耳割難降四支漠漠同雲向夕垂千門萬戶鎖寒炊落花一片能潛化何況芳林絶路岐五微堆壓橫橋山徑微寒林霽色一僧歸閒殺五陵貴公子醉騎白馬去如飛六魚鴻飛不到百情疏阻闊江山煙霧餘飄落盡歸寒沒處暮林空見野人廬七虞松根一夜撥寒爐燒盡秦灰入玉壺萬古河山只若此瓊樓歌暖漫呼盧八齊崩騰未可凌高嶽繚繞還堪隱別蹊一望風煙迷古洞長安爭似晚峰西九佳平沈山嶽影參差深夜同誰步玉街萬丈光寒看璨瑳回頭人自隔天涯十灰誰催千里集瑤臺朔氣蕭蕭映玉杯銷盡豈如隨霧轉有時飄墜碧崔嵬十一真皎皎輕飄桂葉春影娥池畔趁芳辰凌空更上無棲處卻笑人間醉玉塵十二文日暮驚沙薄楚雲雲中江樹影紛紛香爐飛瀑三千尺猶較衡陽白鴈群十三元黃雲白日暗寒原鴻鴈無聲度塞垣自古客行愁道遠紛紛薄木鎖侯門十四寒千騎獵馬出樓闌不見飛禽落日寒風起平沙天路白角聲吹入朔雲團十五刪莫愁殘臘滿頭斑絳色偏能駐老顏更有銷寒誇玉馬定教丹石勝常山一先新住寒山緑玉川連光曉映卜豐年已堆萬戶千重璧誰靳沿門一個錢二簫篩空萬里不封條未到春林慘氣銷誰道凝陰能掩素瑤花偏逐朔風飄三肴千山寒落蔭重茅擬作明珠誤水泡一任曉風驚復息不教殘凍掛空梢四豪練絲千縷何勞泣逵路茫茫真欲號拼教寂寞山頭望不是楊雄誰載醪五歌眼前浩潔凌晨早傾耳希聲清夜多漸入春郊花氣暖寒庭誰解泣銅駝六麻破衲蒙頭老歲華寒深時亦動長嗟古來甲子朝門外亦有幽蘭哀日斜七陽寢跡窮年樂未央萬山璀璨引風長聽殘簷溜添寒絮不臥仙人白玉床八庚凜栗忽驚溪路明峨峨千里共雲平藐姑山裏知何似寒夜相逢莫問名九青白盡千峰峰頂青空濛之內有人醒寒飆忽起從空下不信瑤華滿夜庭十蒸因高纍仞看容易息影憑空力不勝荒月自來還自去更無人待碧崚嶒十一尤琉璃殿裏泛虛舟光湧層波天際浮深夜泠然照牆壁忽疑身在碧雲頭十二侵寒飄玉蕊散高林弱木頽枝凍已深更向陌頭雲裡望豈堪凄切暮猿心十三覃環丘山上覆冰蠶作蘭絲成五彩函若使海人獻巢許不將霜質伴華簪十四鹽遙空直下水晶簾照見鮫人夜織縑無端一陳寒風急吹落紈絲散作鹽十五咸棲老雲中碧玉巖經春猶自托松杉人間未必能知此遮莫臨風寄素緘板存嘉興楞嚴寺般若堂
