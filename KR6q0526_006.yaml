body:
  text: 嗣法門人今辨重編室中垂示六祖大師云何期自性只此四字便見悟徹根源于今人都是會底不是悟底即如聞即心即佛渠也會得非心非佛渠也會得不是物渠也會得假使有人道才與麼便不與麼渠也會得殊不知蚤相隨來也何不回頭捉敗討箇親切去討箇省力去若到者裏方好見人須知更有相為處邇來禪有兩種大病一者以日用穿衣食飯見聞覺知為主人翁只是不許認著恐落窠臼二六時中但只仍舊不得動著聖亦不拘凡亦不管無生死可出無聲色可避人問著話東答西如云如何是佛答云我昨日從開先來畢竟如何答云明日卻往圓通去或云廚庫三門或云鐵稱鎚或一喝一掌以為本分呈似亦謂表遮同時亦謂獨脫一路一者離一切善惡境念然亦不同于木石一段澄湛圓妙推亦不開就亦不得久暫寤寐打成一片便稱徹見本性已後只須踐履將去如習念一起便不隨之日遠年深便登聖位喚做結果收因其餘或認箇不名不物或空空洞洞或昭昭靈靈或潔潔淨淨或現成無事大約大同小異要不出兩種變換學者根器伶俐多中頭一種病篤厚之士多中第二種病噫去聖時遙真悟人少學者無所適從聊為識之以便中毒者知所易弦也豫素喜白雲頌語明淨透脫凡寓目必玩味不忍釋拈花頌尤喜其類已因用韻並載焉頌曰盡道拈花微笑是不知將底驗宗風若言心眼同時證未免朦朧在夢中和曰拈花微笑何曾是帶纍兒孫立下風白雲雖具超方眼也只惺惺在夢中且道既是惺惺為什麼卻在夢中參蓮花峰祥菴主二十年嘗以拄杖示人曰古人到者裏為什麼不肯住凡答無有契者乃自云為伊塗路不得力今人尚不曾到者裏說什麼肯住不肯住縱饒到者裏也錯會他不肯住之旨何不看他道為伊塗路不得力乎復云畢竟如何以拄杖橫擔云楖栗橫挑不顧人直入千峰萬峰去須是與麼始得若到與麼田地渠且不是與麼人何故生平用盡心力祇圖識得者些好惡臨濟大師云大凡舉唱宗乘須一句中具三玄三要始得古人立法將以防僞誰知後世反滋傳僞病在不求者一句端的著落卻去辨別甚麼是玄甚麼是要如此豈不是傳僞又有云祇如庭前柏樹子麻三斤乾矢橛者便是那一句了如此豈不是傳僞不見德山云但參活句莫參死句若是死句下薦得千生萬劫沒你出頭分所以汾陽深明斯旨乃頌云三玄三要事難分得意忘言道易親一句明明該萬象重陽九月菊花新分明向道得意忘言道易親區區髑髏邊覓甚麼汁你若觸著便省不妨轉死為活便無許多藥忌便見古人立言之旨以此供養三世諸佛亦何愧歟談宗家往往開大口抹殺教乘殊不知渠實落做處尚不能及教乘極則祇如楞嚴云根塵同源縛脫無二識性虛妄猶若空華又云由塵發知因根有相相見無性同於交蘆又云知見立知即無明本知見無見斯即涅槃今時人果能與麼會得到得者田地麼直教會得到得尚未是宗門下事況猶在依稀間耶余嘗向人道達磨未渡江如清涼寶志公諸聖賢亦曾闡化一代書冊所載清涼心王銘寶志公大乘十讚四料簡十二時歌未嘗不道盡為何初祖復來故知他大有長處所以世尊四十九年說法度生臨末梢頭方才拈青蓮花目顧人天云吾有涅槃妙心教外別傳付與摩訶迦葉正是此意後來祖師亦云三乘十二分教何曾露者箇消息趙州亦云我尋常祇是以本分事接人若要隨根上下自有三乘十二分教在他時遇明眼人亦不道老僧辜負伊于今末法將來為宗師底痾淥淥地恨不得學人會去趁門庭熱鬧殊不知儘他說得傳得尚不是教乘極則更要學人會箇甚麼且何故知他不是教乘極則為他教乘極則亦須有箇悟處既悟得又復行得所以世尊在世時凡依教修行各各皆有所證不徒解了便休于今宗師痾淥淥地且不管學人悟不悟行不行祇要他會早晚叫入方丈低聲細語道甚麼是今時甚麼是劫外如何是得體如何是得用者樣便是獨脫一路那樣便是結果收因學人不知以為宗門事祇是如此一任橫說豎說且莫道把學人悟門一塞塞斷就是恁麼說底傳底謂與達磨西來之旨有分毫交涉否須知此事大是貴悟若遇沒量宗師自爾規模高深絶不容你作解作會直待你打翻時節方才與箇本色鉗錘從古大老門下一箇箇悟得便是徹頭徹尾如臨濟三度問佛法三度被打濟不會便辭檗檗亦不與說破但指往見大愚濟後在大愚處言下打翻始回黃檗檗見便云者漢來來往往有甚了期及濟述前因緣檗復云大愚不識好惡待來好痛與一頓你道善知識鉗錘何等妙密靈源清云今之學者未脫生死病在什麼處在偷心未死耳然非其罪為師者之罪也如漢高紿韓信而殺之信雖曰死其心果死乎古之學者言下脫生死效在什麼處在偷心已死然非學者自能爾實為師者鉗錘妙密也如梁武帝御大殿見侯景不動聲氣而景之心已枯竭無餘矣諸方所說非不美麗要之如趙昌畫花逼真非真花也豫嘗讀此合掌稱古佛曰今時代安得復聞此言耶夾山云目前無闍黎此間無老僧聞師家近來都重此話以為極則殊不知到者裏更須有轉身一路始得不然總是挖肉生瘡或曰鎮州蘿蔔青州布衫庭前柏樹子正是他轉身一路若作恁麼見解他時後日喫閻老子鐵棒有分在真正禪流切須仔細學者最忌打頭悟得箇明淨清白絶言絶慮底後向日用中銷鎔泯合謂之從體識用或從日用中悟得箇無過患底後於動靜起滅處豁然踏著自己謂之從用得體若墮在者窠臼中必然自己認真雖有善者亦無如之何矣可不慎乎即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分據此偈徹見根源今人一般讀了解了總沒交涉下流不用心者不必論即如老宿自稱悟道也只作透脫道理會去不得自己受用此其故何耶祇為古人業有恁麼話若稍不識去就便著著俱立下風如此有何了日因別一偈為真參者助緣全貴當人轉變不然也是出得醋甕卻入醬缸耳偈曰見見聞聞妙入神聲聲色色沒疏親箇中誰了誰不了賺殺從來學道人類隨尊貴譬之畫龍逼真鱗甲濡動著一墮字則破壁飛去矣人多不得墮字之妙徒向鱗甲中覓縱饒覓得亦是蛻底或曰假如識得墮字還有差別否曰有何故正如人看畫指點山水樹木亭臺人物之妙一一賞鑒殊不知自己現前一幅尚要塗污人筆墨耳此事似聰明伶俐人方才構得然聰明伶俐人往往解了會了拋置一邊一任猢猻子𨁝跳都以為不是別底至於佛法身心打做兩橛尚不自知被明眼人簡點渠也不伏止因渠信得平日悟處堅僻或搜古人淆訛所在一一和會便不疑他人更有長處所以生死到來多是打退鼓若未到生死且不見得以此看來又似全貴至誠老實一有所悟便能腳踏實地不肯自己瞞昧此是第一種好處然往往多作實法會恰似有者般事聞人說話不復玩味盡以自己所見和會亦不信他人有特地過量事所以盡其力量不能深達法源底畢竟但成箇修行人而已若論吾宗真沒量大人方能擔荷不然且教依教修行或深信淨土免虛度光陰錯足旁途良可怖畏讀白雲端蠅子透窗偈曰為愛尋光紙上鑽不能透處幾多難忽然撞著來時路始覺生平被眼瞞和曰活計埋頭影裏鑽此時退步灼然難分明腳下虛空闊只為貪程卻自瞞又北斗藏身偈曰五陵公子遊花慣未第貧儒自古多冷眼看他人富貴等閒不奈襆頭何和曰公子遊花無傲骨貧儒意氣自來多若知富貴窮中足緩步高原且奈何問寂寂斷見聞見聞作麼生斷答曰若要斷除是機關木人始得六祖所謂斷者非斷滅之斷也即今同在堂中上棟下宇外山林內椅席風聲禽韻種種見聞何曾與你作聲色會你欻起一念云者是棟者是宇者是山林者是椅席者是風聲者是禽韻方才有種種分別便是種種分別也是你本性靈妙了不可得你念未起諸法自如你念欻起諸法亦如你若當下了卻便解獨行獨步決定無有少法可得你若一向斷滅見聞更教阿誰成道所以永嘉云誰無念誰無生若實無生無不生喚取機關木人問求佛施功蚤晚成圓覺云知是空華即無流轉亦無身心受彼生死非作故無本性無故彼知覺者猶如虛空知虛空者即空華相亦不可說言無虛空性曹山亦云從緣薦得相應疾就體銷停得力遲瞥起本來無處所吾師暫說不思議請深思之此事若一向不出則失人出而不知去就則失己失人者減己之德失己者瞎人之眼唯過量人自己腳跟下步步生活就如人慣為客商一出門吉凶利害自知去向又如將兵討賊先有定謀然後奇正相生著著不入死路所以學者從此薦得盡是活底不是死底祇為善知識具大方便於諸方便而語不失宗乃能入水入泥移高就低不然悉是釘樁漢為人不得毗婆尸佛偈云身從無相中受生猶如幻出諸影相幻人心識本來無罪福皆空無所住只此一偈後來諸佛諸祖總跳他不出祇為道絶有無永離邊見所以永明禪師讀龐居士語云空華落影陽焰翻波嘆其不落有無之句正契斯旨學道之士須得到者田地方許與佛祖契同不則悉滯權位不道全非祇是化導邊事卻與那人無干即如古德云知得恁麼事拋置一邊卻來者邊行履此亦大有來由人都不識拋置一邊是甚麼道理乃謂來者邊行履便是盡卻今時底事既恁麼事且拋置一邊還有甚麼今時不今時所以天然常云須是那人始得不然掘地出空止益勞纍噫此所謂不落有無之旨歟靈雲見桃花偈曰三十年來尋劍客幾回葉落又抽枝自從一見桃花面直至于今更不疑玄沙云諦當甚諦當敢保老兄未徹在洪覺範頌云靈雲一見不再見紅白枝枝不著花叵耐釣魚船上客卻來平地摝魚蝦豫喜洪覺範頌因作偈以廣其旨云靈雲一見已無端又怪玄沙此話傳痛憶少林枯坐後被人呼作達磨禪若論主人翁于今當人一切時中說是說非底豈不是做好做惡底豈不是至如寤時底夢裏底惺惺底寂寂底散亂底靜定底思惟底無記底開眼人看來總不是別事只是一向不曾知有遇境逢緣妄生計執古人云卻物為上逐物為下所謂逐物者皆由不識真心妄認六塵影像為自心相處處流轉如狗子啖枯骨自生津味不知一切境界緣慮總沒有一毫頭許與我計執若能從此省得亦不用離他他本無有恁麼事離箇什麼既不用離他亦不用自生珍貴若生珍貴何異逐物蓋以無始劫來悟不曾得迷不曾失只是暫時自信不及便有許多分別許多疑慮既有分別疑慮以故究竟無成畢竟有苟非大徹大悟一回到親證田地雖則龜毛兔角一時遣他不得此中稍稍自昧便易放過每見時流開大口說過量話徒以些須聰明和會道理如云心外無法法外無心及夫日用事無別惟吾自偶諧等語以為識得主人翁便一切法都不可得惟有主人翁獨行獨步此豈不是絶頂之談然祇是說底會底學士大夫見識灑脫見他出格痛快不得不傾心相從殊不知就裏大有差別何不各人向自己生死上打算一翻如謂主人翁畢竟到生死時還是作得主還是不用作主者一段直下明白底作麼生銷繳又如說是說非時做好做惡時得不分別麼寤時夢時得恆一麼惺惺時寂寂時散亂時靜定時思惟時無記時總無走作麼假如有頇顢佛性撥無因果之流作何辨白到此慎毋儱侗于今說底會底多是儱侗所以佛法身心打做兩橛暗地裏有許多不相應處人前又開大口貽羞佛祖魔魅後昆莫此為甚須知者椿大事實實有箇徹證時候天下儘大深山窮谷未嘗無真實親到之人不似于今時流稱楊稱鄭不識因果自欺欺人決招地獄告汝學人慎厥去就毋遺後患金剛三昧經偈曰法從分別生還從分別滅滅是諸分別是法非生滅此正緣起無生之旨也所以云一念緣起無生頓超三乘十地而學者多忽之不知佛祖相傳唯重於此法華諸佛世尊唯以一大事因緣出現於世又云諸佛世尊欲令衆生開佛知見悟佛知見入佛知見道故出現於世此意最為幽遠以故後文復露本懷云如來兩足尊知法常無性佛種從緣起是故說一乘是法住法位世間相常住夫唯諸法無性所以佛種必藉緣起若一向那邊又誰知有與麼事但末世凡夫智量狹小知得與麼事卻又奈一切不何以此不得不推遲八刻殊不知總非他事圓覺云譬如雲駛月運舟行岸移楞伽云諸法無法體我說唯是心不見於自心而起於分別若能見自本心滅諸分別所滅既滅能滅亦滅正當是時如夢被驅而忽覺還觀所夢心境俱盡華嚴云如是自性如幻如夢如影如像悉不成就圓覺云如人自斷其首首既斷故無能斷者又云諸幻雖盡不入斷滅棗柏曰但使自無情見大智逾明萬法體空無轉變相以此觀之十世古今不離當念無邊剎海不隔自他良由衆生妄生分別故有彼我久暫若證知一切境界皆佛境界無淨無穢無成無破無古無今無我相無涅槃念念如法法如則法華所云諸法住法位世間相常住不其然乎雖然凡聖一真猶存見隔執藥成病不覺不知不見道諸佛智慧甚深無量其智慧門難解難入起信論亦曰當知一切法不可說不可念故名真如學者耽於隨順不知離念而欲得入是猶擬東行而西向也悲夫此事本非甚難但得不變易便休若要不變易除是作得主宰曹山云若作得主宰即是不變易若作不得主宰便是變易又云但是菩提涅槃煩惱無明等總是不要免乃至世間粗重之事但知有便得不要免免即同變易去也乃至成佛菩提涅槃此等殃禍不小因甚麼如此只為變易若不變易直須觸處自由始得噫天然嘗道不得硬作主宰為甚麼又道要作得主宰祇為構他去便是硬作主宰便是變易假如菩提涅槃煩惱無明等總是還構箇什麼到者裏免與不免總不要構他若向者裏如箭離弦如門落臼如薪盡火滅始有自由分方是作得主宰不是硬作主宰雖然若非箇人就使與麼也是平地起波濤所以云癡人前說夢不得今之學雲門者徒見其上大人扇子𨁝跳及占波共新羅鬥額等語以為出格獨脫便任意揣摩遞相傳授殊不知他家大有來由何不看陳尊宿當時才見門來便擒住云速道速道門愕然州托開云秦時𨍏轢鑽門於此大悟他後每見僧來便顧著云鑑待僧擬議便云咦古今相傳皆謂雲門顧鑑咦三句之旨正從此來所以渠語句自有著落不是胡亂道得即臨濟大師亦云大凡舉唱宗乘須一句中具三玄三要始得後來雖善知識亦不敢與他家事此雪峰稱為古佛也噫師承之妙非可勉強而知然不以不知而遂損視今之頇顢之流為何如哉洞山偏正五位大有濟上風味而直捷之與精密各自成家乃知解之徒謂曹洞不及臨濟皆因汾陽已悟洞上之旨復疑臨濟有長處後見首山果獲大徹此固實録也殊不知因緣時節大有原故是不可以一人而咎法時節未至即如汾陽先悟玄要後見洞上尊宿亦安知不更有大徹耶所以此事唯貴真悟悟則事同一家自知差別端的不悟則千頭萬緒難以湊泊即如偏正之旨唯親證乃知親證者從自己胸中流出與古人契合始為相應不然盡力摹寫寫得逼真也是刻舟非愚則狂耳偶憶原頌賞極玄旨因用韻和之録原頌後以識古今同風之意原頌曰正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷昔日嫌偏中正失曉老婆逢古鏡分明覿面更無真休更迷頭猶認影正中來無中有路出塵埃若能不觸當今諱也勝前朝斷舌才偏中至兩刀交鋒不須避好手還同火裏蓮宛然自有沖天志兼中到不落有無誰敢和人人盡欲出常流折合還歸炭裏坐和曰正中偏一路樵歌南陌前千年積恨甘心也暫爾猖狂且莫嫌偏中正面目分明何用鏡大家女子解含羞豈學嬌嬈來照影正中來雪裏虛空絶點埃皇風皞皞非關帝慚殺春秋天下才偏中至雪擁藍關無躲避不風流處也風流有氣志時添氣志兼中到言思斷處誰能和石中無璽復何云堪笑雲門解穩坐八門總說曰混沌未分元無彼此一爻才動始兆暗明執相迷心良由真如無性分明建化暫斥背覺合塵法法真純落遍計而成差別心心體合循分別以鑑源流入契證之門自知體非對待冥心知之路方識道絶有無全貴得魚以忘筌欻然情生而智隔似乎頓中更有漸門究竟心外終無少法所以云萬法唯識識如夢幻方才信三界唯心心本涅槃瞥爾打翻暫回頭而猶錯擬將修證知下劣之難忘何似踏破玄關向那邊放行把住卻來闖入聲色就者裏坐臥困眠本自不涉要玄何名真智從來無有驚異豈羡狸奴婆婆和和更潛行而密用不清不濁雖易見而難知自昔如來權披垢弊為茲大事不廢從緣入此門中須知去就勿迷方便始解入廛今日天然以楔出楔用報佛恩唯願仁者不聞而聞永傳斯旨標指見月權立八門若遇知音毋勞貶剝何以故尚有一門無路入大家杜口於毗耶八門圖總頌曰黑白相維混沌中一陽初兆事全通森羅萬象有無意類絶玄明語默融歌頌未忘虧主德桑麻平實自民風無聲一曲隨高下攪動滄波作吼龍分頌黑白相維混沌中隨流且喚作西東金毛跳入野狐窟為愛當塗底事通一陽初兆事全通借徑還家路不窮端的要知遊子意相逢猶在夢魂中森羅萬象有無意蛇在杯中弓影異荊棘林深衣絮行橫身三界全巴鼻類絶玄明語默融腳跟無線轉如蓬頭陀衲子稱貧道直入千峰與萬峰歌頌未忘虧主德茅簷不剪意深密三皇五帝但垂裳皞皞民風在今日桑麻平實自民風老幼嘻啼盡日中萬派漚和如不駐移舟別棹又沖溶無聲一曲隨高下拈起拂子驀口打出入有無不可詮交參主伴成話杷攪動滄波作吼龍人家驚犬吠哄哄賊面是人人面賊是非同異幾時窮深證之士於一切內外有無性相如以五色彩畫耀嬰兒目正恁麼時色與空等見與盲等而亦不入於斷滅如水中樹影如虛空焰如石裏火如夢中人如幻師所作幻事設或有人欲一一指陳其名義性相則愚甚矣夫以五色彩畫耀嬰兒目其理為若此也而終不能窮知嬰兒自證之處故楞伽經云隨入自心現量種種相外性非性言說妄想不顯示第一義噫非深證其孰能語此僧問南泉遷化向甚麼處去泉云山前檀越家作一頭水牯牛去僧云某甲隨和尚去得麼泉云汝若去須銜取一莖草來豫偶憶此歎王老師到祇麼田地真箇理絶情忘非凡可測古云皮膚脫落盡唯有一真實特地可憐唯證方知若非親證縱使悟得說得要與古人把手同行猶太遠在因與頌出以俟知音頌曰堪笑南泉老牯牛隨時水草足優游不禁忍俊婆心切特地人前解按頭底事風流不可傳崢嶸頭角已成顛甕頭黃葉慵收拾惹得知音卻共憐有述耕夫生平怕鬼一夕張燈野田捕蝦蟆偶與同事者談鬼同事曰設有鬼何以辨之耕夫曰傳聞鬼無下頷同事曰汝試看我耕夫舉目視之已無下頷遂怖走里許遇一人問之曰何忙耶耕夫述見鬼狀其人曰汝試看我耕夫視之亦無下頷徑奔還家正叩門次鄰人見其疾遽失聲趨問其故耕夫乃以兩次見鬼告鄰人曰汝且看我看之亦復如前所見豫因語大衆云昔城東老母生平不願見佛一日遇佛以手掩面五指頭盡皆是佛且當與前一段話並看可以起悟一日阿字無侍者因閲時師有論價祖過水偈并五位之旨疑其牽合請質於師師曰今時人易知耳祇如古人前後悟處并五位著落之旨能無疑乎無出禮拜起云洞祖幼時讀心經起疑到南泉已解答有伴即來話後參雲巖於無情說法處得箇穎脫何為至良久云祇者是又復涉疑乎師云悟即不無悟而遂至大休歇安樂田地萬中無一何不看趙州初參南泉泉問有主沙彌無主沙彌州云有主泉云主在甚麼處州近前鞠躬云仲春猶寒伏惟和尚尊候萬福可謂千真萬真矣次日泉上堂州出問云如何是道泉云平常心是道凡師家說法無不從向上一句子任學人因緣到即推門落臼不則亦令其發起疑情或從前依倚處恬適處就一句子下一回逗漏一回倒斷不見趙州云還假趨向也無噫分明逗漏了也泉云擬向即乖只一揮不由你不著忙州果然云不擬向爭知是道豈不是平日依倚處盡情吐露所以南泉為人為徹更云道不屬知不屬不知知是妄覺不知是無記汝若深造不疑之地猶如太虛廓然無礙安可強是非耶州乃大悟若因此便謂前仲春猶寒語尚未會在則依語生解矣人固有應機無滯悟非不真而向背之情未泯歡喜之心未忘明眼人前終不謂向後無事所以當面相欺背後著楔不為無故學者心誠諦信便見親切縱使強作主張當下錯過而師家亦無相負處又如大慧在湛堂時拈偈作頌業為鏡清無盡諸大老賞識渠未甘者方丈裏有禪方丈外便無禪下單來有禪才上單便無禪以此切切然不肯放過及向天寧薰風話一時冰釋已得快活自在而圓悟謂其坐在淨裸裸處夫以大慧之天資無所不透其不肯自欺者心窠裏毛髮疑礙而已既得冰釋快活自在豈不是千真萬真又其悟在薰風自南來殿角生微涼句下皆殺活全提語從何得墮在淨裸裸之說及乎相隨來也一句了卻始知前之快活自在微細依倚尚須一回所以道喜識盡時消息盡當人那辨濁中清最後一錐大有時節也價祖悟無情說法偈云也大奇也大奇無情說法不思議若將耳聽終難會眼處聞時方得知偈固的的也及問邈真話而雲巖良久云祇者是猶自涉疑後人遂疑其偈語未過量又疑其難得不相見話未當故雲巖以良久銷之豈不是依語生解大凡學人未到大休歇田地自是趨向難泯或當師家鉗錘妙密一回拽脫或當師家當陽正答忽得自由夫雲巖良久云祇者是亦當陽正答耳而價祖遽自涉疑所謂做賊人心虛及至睹影始知從前猶有依倚故偈云切忌從他覓迢迢與我疏正是一回被虎咬切忌上山行也從前捨今時向那邊將謂更有第二人到此特地知非全身裏許故有我今獨自往處處得逢渠之句既處處逢渠則渠不住渠而渠正是我我不更渠而我不是渠到此始知南泉云三世諸佛不知有狸奴白牯卻知有又云一切師僧須向異類中行始得而價祖當時答南泉云和尚莫壓良為賤一句此時方用得著所以云頭頭上明物物上顯不喚作尊貴當知尊貴一路自別正深得我今不是渠之旨也我洞上宗趣全重於此今時人稱洞上宗師即渠我二字尚自著落不妥甚且以我今不是渠為我今正是渠則尊貴之旨何在又安能復論宗趣無怪其五位杜撰矣價祖立五位正偏要不出此偈一一全備悟者觀正中偏偏中正正中來偏中至兼中到十五字便自炯然可以意得也無遽出作禮云正中偏偏中正偏中至兼中到之旨無嘗于偈中四句頗有融會獨正中來一句尚屬影似不敢效今人杜撰乞師指示師曰夫偏不滯偏則必至於正正不守正則必至於偏然當不守正而猶未至於偏處試一著眼便可神會若必有句楷模則所體會者盡成訓詁不堪紹旨矣總之此事大須徹底若徹底人自然合他古轍不必逞聰明湊泊若逞聰明湊泊即使十成完具偶一二處古人意到而句不到或句同而意別或句別而意同一時比量不及便自逗漏所以聰明人稍有所窺不曾遇真正作家未免杜撰今時人往往蹈此不可不慎無禮拜而退僧問高峰落枕因緣師曰此事唯貴悟不貴解若真實悟底人渠自然一切時一切處絶諸滲漏逢人問著便露現箇消息生殺縱奪盡有回互盡有出身師家相為亦不是先有箇極則處要到恁麼田地若有箇極則處教學人到恁麼田地便有實法與人一箇箇皆有領會汝諸人若欲了生死須實實求真悟實證始得如高峰當時正是箇求真悟實證底學人雪巖正是箇教人求真悟實證底師家彼此誠實自然縱奪可觀如雪巖見高峰有箇省處也不消問渠麻三斤乾屎橛香嚴上樹不消共渠商量向上向下者邊那邊一棒一喝但只問日間浩浩作得主麼者一句子探竿任你絶大伎倆也要在他面前吐露果然高峰云作得主者一句已有五六分收下然其中有親有疏所以雪巖亦不肯向渠道破又問夢裏作得主麼高云作得主者一句又有七八分收下然其中亦有親有疏所以雪巖一路逼拶直至無夢無想無見無聞主在甚麼處渠便一些氣息都無從前二關不言可知矣直至枕子落地錯腳踏翻始知向來得力一點也用不著然亦不在無夢無想無見無聞處著到于今師家提唱有兩種病一種老實底謂高峰睹讚時業已悟得主人公雪巖更欲看其向上事所以一問二問就渠悟得做得處按定方才以無夢無想無見無聞一奪奪翻直要渠到無巴鼻處翻轉身來便是向上關捩咄山僧且要問你既是睹讚時悟得主人公為甚麼無夢想無見聞時便去不得既無夢想無見聞時去不得則日間夢裏作得主底還用得麼一種杜撰底謂雪巖問日間夢裏作得主麼已是一副紙棺材果然把高峰一載載了然後教渠就無夢想無見聞處放身捨命咄山僧且要問你祇如曹山云大須作得主宰不要免免即成變易去也不可恁麼作得主宰更教渠就無夢想無見聞處放身命麼山僧在訶林時有僧一日呈偈數十首山僧接得但放案上便問無夢想無見聞主在甚麼處渠答云正是學人放身捨命處山僧向渠道據你此答定謂會得落枕子時消息了也我更問你祇如第一問第二問還過得麼渠便謂尤是學人疑處山僧不覺大笑云今人勝似古人古人第一問第二問過得惟過不得第三問今人先過得第三問第一二問反過不得豈不是會得底與身心全不交涉究其流弊始於師家有箇極則處教學人會就如高峰因緣渠便教人向無夢無想無見無聞處會取把日間夢裏一推推乾謂不用作主宰十二時中止要人將無夢想無見聞一合合去如黑漆桶相似以為得大總持以為向上巴鼻殊不知癡狂兩頭走總不曾向真實一回悟得是以今時師資說處儘有若到做處蚤已逗漏出許多生滅解嘲者謂其踐履未到已自可笑無慚愧者更謂你作生滅會麼如此狂解不至盡大地人滅卻慧命不止我輩稍有擔荷便當向深山裏钁頭邊實實求箇真悟真證切忌隨流過日自取誤賺亦乃誤賺他人久立珍重從上祇一心而已真極故迷以真極故不知有自己不知有自己則不能內守真極故不知外無法不知外無法則不能不外見不能內守則真心流轉不能不外見則境界似生以似生之境界惑流轉之真心逾遷逾遠從迷至迷無有窮盡處無窮盡生死之中疲極思脫不須更疑境界境界元無以不知無故似生相續知其本無則全身在境界中如夢如幻即極癡人決不謂夢幻之能繫縛雖知其本無如夢幻之不能繫縛然無住足之地則暫無復有如凡夫禪不難使妄盡以至於不動以不曾發明本心故滯於色界更差別則流為無想極於無色皆識心變現所以我宗止貴見性於生死中直下悟取本原心地直下不受一切境界之所惑亂雖處至紛至紜而真心不昧如摩尼珠映於五色頭頭上明物物上了到此方知二乘雖會無我之性尤非大自在究竟之處得到此處尚有我宗門棒待有日喫在
